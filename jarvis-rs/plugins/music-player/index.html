<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Music Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Loading indicator (shown until JS init completes) -->
    <div id="loading-screen"><div class="loading">Connecting to music server...</div></div>

    <!-- Setup screen (shown when not connected) -->
    <div id="setup-screen" class="hidden">
      <div class="setup-card">
        <h2>Music Player Setup</h2>
        <p>Enter the music server details to connect.</p>
        <label>Server URL
          <input type="text" id="setup-url" placeholder="http://localhost:8765" value="http://localhost:8765">
        </label>
        <label>Auth Token
          <input type="text" id="setup-token" placeholder="Paste token from server terminal">
        </label>
        <button id="setup-connect">Connect</button>
        <div id="setup-error" class="hidden"></div>
      </div>
    </div>

    <!-- Main UI -->
    <div id="main-ui" class="hidden">
      <div id="sidebar">
        <div class="sidebar-header">Library</div>
        <nav id="nav">
          <button class="nav-item active" data-view="artists">Artists</button>
          <button class="nav-item" data-view="albums">Albums</button>
          <button class="nav-item" data-view="tracks">All Tracks</button>
        </nav>
        <div id="search-box">
          <input type="text" id="search-input" placeholder="Search...">
        </div>
        <div id="sidebar-list"></div>
      </div>
      <div id="content">
        <div id="content-header"></div>
        <div id="content-list"></div>
      </div>
    </div>
  </div>

  <!-- Transport bar (always at bottom) -->
  <div id="transport" class="hidden">
    <div id="progress-bar">
      <div id="progress-fill"></div>
      <input type="range" id="progress-seek" min="0" max="100" value="0" step="0.1">
    </div>
    <div id="transport-controls">
      <div id="transport-left">
        <button id="btn-prev" title="Previous">&#x23EE;</button>
        <button id="btn-play" title="Play">&#x25B6;</button>
        <button id="btn-next" title="Next">&#x23ED;</button>
      </div>
      <div id="transport-info">
        <div id="now-playing-title">No track loaded</div>
        <div id="now-playing-artist"></div>
      </div>
      <div id="transport-right">
        <span id="time-current">0:00</span>
        <span id="time-sep">/</span>
        <span id="time-total">0:00</span>
        <input type="range" id="volume-slider" min="0" max="100" value="80" title="Volume">
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="player.js"></script>
  <script src="queue.js"></script>
  <script src="app.js"></script>
</body>
</html>
