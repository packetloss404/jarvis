<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Jarvis Assistant</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: transparent !important; border-radius: var(--border-radius); overflow: hidden; }

body {
  background: var(--color-panel-bg);
  font-family: var(--font-ui);
  color: var(--color-text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: var(--font-ui-size);
  line-height: 1.5;
  border: var(--border-width) solid var(--color-border);
  border-radius: var(--border-radius);
  transition: border-color var(--transition-speed) ease;
}

/* ================================================================ */
/* HEADER                                                           */
/* ================================================================ */

#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  border-bottom: var(--border-width) solid var(--color-border);
  min-height: 32px;
  flex-shrink: 0;
}

#header-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-muted);
  letter-spacing: 0.02em;
}

#header-status {
  font-size: 11px;
  color: var(--color-text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--color-success);
  animation: pulse-dot 2.5s ease-in-out infinite;
}

#provider-select {
  background: transparent;
  border: var(--border-width) solid var(--color-border);
  border-radius: 4px;
  color: var(--color-text-muted);
  font-family: var(--font-ui);
  font-size: 11px;
  padding: 2px 4px;
  outline: none;
  cursor: pointer;
  transition: color var(--transition-speed) ease,
              border-color var(--transition-speed) ease;
}

#provider-select:hover,
#provider-select:focus {
  color: var(--color-text);
  border-color: var(--color-border-focused);
}

#provider-select option {
  background: rgba(10, 14, 20, 0.98);
  color: var(--color-text);
}

#close-btn {
  background: none;
  border: none;
  color: var(--color-text-muted);
  font-size: 16px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  opacity: 0.4;
  transition: opacity var(--transition-speed) ease,
              color var(--transition-speed) ease;
}
#close-btn:hover {
  opacity: 1;
  color: var(--color-error);
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ================================================================ */
/* SCROLLBAR                                                        */
/* ================================================================ */

::-webkit-scrollbar { width: var(--scrollbar-width); }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(200, 204, 212, 0.3);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(200, 204, 212, 0.5);
}

/* ================================================================ */
/* MESSAGES                                                         */
/* ================================================================ */

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: rgba(200, 204, 212, 0.3) transparent;
}

.message {
  max-width: 90%;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: var(--font-ui-size);
  line-height: 1.5;
  animation: msg-in 0.15s ease-out;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.assistant {
  align-self: flex-start;
  background: rgba(255,255,255,0.03);
  border: var(--border-width) solid var(--color-border);
  color: var(--color-text);
}

.message.user {
  align-self: flex-end;
  background: rgba(115,208,255,0.06);
  border: var(--border-width) solid rgba(0, 212, 255, 0.10);
  color: var(--color-text);
}

.message.system {
  align-self: center;
  background: transparent;
  color: var(--color-text-muted);
  font-size: 11px;
  padding: 4px 0;
}

.message.error {
  align-self: center;
  background: rgba(255, 68, 68, 0.06);
  border: var(--border-width) solid rgba(255, 68, 68, 0.15);
  color: var(--color-error);
  font-size: 12px;
}

.message pre {
  background: rgba(0, 0, 0, 0.3);
  border: var(--border-width) solid var(--color-border);
  border-radius: 4px;
  padding: 8px 12px;
  margin: 8px 0 4px;
  overflow-x: auto;
  font-family: var(--font-family);
  font-size: 12px;
  line-height: 1.4;
}

.message code {
  background: rgba(0, 212, 255, 0.06);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--font-family);
  font-size: 12px;
}

/* Tool activity (read-only filesystem tools) */
.tool-activity {
  align-self: flex-start;
  max-width: 90%;
  margin: 2px 0;
  font-family: var(--font-family);
  font-size: 12px;
  color: var(--color-text-muted);
}

.tool-activity summary {
  cursor: pointer;
  list-style: none;
  padding: 4px 8px;
  border-radius: 4px;
  background: rgba(0, 212, 255, 0.04);
  border: var(--border-width) solid var(--color-border);
  user-select: none;
}

.tool-activity summary::-webkit-details-marker { display: none; }

.tool-activity .tool-name { color: var(--color-text); }

.tool-activity.error summary {
  background: rgba(255, 68, 68, 0.06);
  border-color: rgba(255, 68, 68, 0.18);
  color: var(--color-error);
}

.tool-activity .tool-body {
  padding: 6px 8px 2px;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--color-text-muted);
}

/* ================================================================ */
/* TOOL APPROVAL GATE (mutating/exec tools: write_file, run_command) */
/* ================================================================ */

.tool-approval {
  align-self: stretch;
  max-width: 100%;
  margin: 6px 0;
  border: var(--border-width) solid var(--color-warning, #e6b800);
  border-left: 3px solid var(--color-warning, #e6b800);
  border-radius: 6px;
  background: rgba(230, 184, 0, 0.06);
  overflow: hidden;
  animation: msg-in 0.15s ease-out;
}

.tool-approval.resolved-approve {
  border-color: var(--color-success);
  border-left-color: var(--color-success);
  background: rgba(0, 200, 120, 0.05);
}

.tool-approval.resolved-deny,
.tool-approval.resolved-timeout {
  border-color: var(--color-error);
  border-left-color: var(--color-error);
  background: rgba(255, 68, 68, 0.05);
}

.tool-approval-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--color-warning, #e6b800);
  letter-spacing: 0.02em;
}

.tool-approval.resolved-approve .tool-approval-header { color: var(--color-success); }
.tool-approval.resolved-deny .tool-approval-header,
.tool-approval.resolved-timeout .tool-approval-header { color: var(--color-error); }

.tool-approval-header .tool-approval-icon { font-size: 13px; }
.tool-approval-header .tool-approval-tool {
  font-family: var(--font-family);
  color: var(--color-text);
}

.tool-approval-summary {
  margin: 4px 12px 8px;
  padding: 8px 10px;
  background: rgba(0, 0, 0, 0.3);
  border: var(--border-width) solid var(--color-border);
  border-radius: 4px;
  font-family: var(--font-family);
  font-size: 12px;
  line-height: 1.45;
  color: var(--color-text);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 240px;
  overflow-y: auto;
}

.tool-approval-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px 10px;
}

.tool-approval-actions .ta-spacer { flex: 1; }

.tool-approval-actions button {
  font-family: var(--font-ui);
  font-size: 12px;
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  transition: color var(--transition-speed) ease,
              border-color var(--transition-speed) ease,
              background var(--transition-speed) ease;
  border: var(--border-width) solid var(--color-border);
  background: transparent;
}

.tool-approval-actions button:disabled {
  cursor: default;
  opacity: 0.5;
}

/* Deny = safe default: emphasized, focusable, receives initial focus. */
.ta-deny {
  color: var(--color-text);
  border-color: var(--color-border-focused) !important;
}
.ta-deny:hover:not(:disabled),
.ta-deny:focus:not(:disabled) {
  color: var(--color-error);
  border-color: var(--color-error) !important;
  background: rgba(255, 68, 68, 0.08);
}
.ta-deny:focus-visible {
  outline: 2px solid var(--color-error);
  outline-offset: 1px;
}

/* Approve = deliberate, de-emphasized so it is not the easy default. */
.ta-approve {
  color: var(--color-text-muted);
}
.ta-approve:hover:not(:disabled),
.ta-approve:focus:not(:disabled) {
  color: var(--color-success);
  border-color: var(--color-success) !important;
  background: rgba(0, 200, 120, 0.08);
}

.tool-approval-status {
  font-size: 11px;
  color: var(--color-text-muted);
  font-family: var(--font-family);
}
.tool-approval.resolved-approve .tool-approval-status { color: var(--color-success); }
.tool-approval.resolved-deny .tool-approval-status,
.tool-approval.resolved-timeout .tool-approval-status { color: var(--color-error); }

.tool-approval-pending {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px 10px;
  font-size: 11px;
  color: var(--color-text-muted);
  font-family: var(--font-family);
}

/* Welcome */
#welcome {
  text-align: center;
  padding: 40px 20px;
  color: var(--color-text-muted);
}

#welcome h2 {
  color: var(--color-text);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 8px;
}

#welcome p {
  font-size: 12px;
  line-height: 1.6;
}

#welcome .hint {
  margin-top: 16px;
  font-size: 11px;
  color: var(--color-text-muted);
  opacity: 0.6;
}

#welcome .hint span {
  color: var(--color-primary);
  font-weight: 500;
}

/* Typing indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 8px 12px;
  align-self: flex-start;
}

.typing-indicator span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--color-text-muted);
  opacity: 0.4;
  animation: typing 1.2s ease-in-out infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 100% { opacity: 0.2; transform: translateY(0); }
  50% { opacity: 0.8; transform: translateY(-3px); }
}

/* ================================================================ */
/* INPUT                                                            */
/* ================================================================ */

#input-area {
  padding: 10px 12px;
  border-top: var(--border-width) solid var(--color-border);
  flex-shrink: 0;
}

#input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

#input {
  flex: 1;
  background: transparent;
  border: var(--border-width) solid var(--color-border);
  border-radius: 6px;
  color: var(--color-text);
  font-family: var(--font-ui);
  font-size: var(--font-ui-size);
  padding: 8px 12px;
  outline: none;
  resize: none;
  min-height: 36px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color var(--transition-speed) ease;
}

#input:focus {
  border-color: var(--color-border-focused);
}

#input::placeholder {
  color: var(--color-text-muted);
  opacity: 0.5;
}

#send-btn {
  background: transparent;
  border: var(--border-width) solid var(--color-border);
  border-radius: 6px;
  color: var(--color-text-muted);
  font-family: var(--font-ui);
  font-size: 12px;
  padding: 8px 14px;
  cursor: pointer;
  transition: color var(--transition-speed) ease,
              border-color var(--transition-speed) ease;
  white-space: nowrap;
}

#send-btn:hover {
  color: var(--color-text);
  border-color: var(--color-border-focused);
}

#send-btn:active {
  transform: scale(0.97);
}

/* ================================================================ */
/* COMMANDS HINT                                                    */
/* ================================================================ */

#cmd-hint {
  display: none;
  position: absolute;
  bottom: 60px;
  left: 12px;
  right: 12px;
  background: rgba(10, 14, 20, 0.95);
  border: var(--border-width) solid var(--color-border);
  border-radius: 6px;
  padding: 4px 0;
  box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.3);
  z-index: 10;
}

#cmd-hint.visible { display: block; }

.cmd-option {
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  transition: background var(--transition-speed) ease;
}

.cmd-option:hover {
  background: rgba(255, 255, 255, 0.04);
}

.cmd-option .cmd-name {
  color: var(--color-primary);
  font-weight: 500;
}

.cmd-option .cmd-desc {
  color: var(--color-text-muted);
  font-size: 11px;
}


</style>
</head>
<body>
<div id="header">
  <span id="header-title">Assistant</span>
  <div id="header-status">
    <select id="provider-select" title="AI provider">
      <option value="claude">Claude</option>
      <option value="openai">OpenAI</option>
      <option value="minimax">MiniMax</option>
      <option value="gemini">Gemini</option>
    </select>
    <div class="status-dot"></div>
    <span id="status-text">ready</span>
  </div>
  <button id="close-btn" title="Close panel" onclick="sendIpc('panel_close', {})">&times;</button>
</div>

<div id="messages">
  <div id="welcome">
    <h2>Jarvis Assistant</h2>
    <p>Ready. Type or speak your request.</p>
    <div class="hint">
      Type <span>/help</span> for commands
    </div>
  </div>
</div>

<div id="cmd-hint"></div>

<div id="input-area">
  <div id="input-row">
    <textarea id="input"
      placeholder="Type a question..."
      rows="1"
      autocomplete="off"
      spellcheck="false"></textarea>
    <button id="send-btn">SEND</button>
  </div>
</div>

<script>
// ================================================================
// IPC BRIDGE
// ================================================================

function sendIpc(kind, payload) {
  if (window.jarvis && window.jarvis.ipc && window.jarvis.ipc.send) {
    window.jarvis.ipc.send(kind, payload || {});
  } else if (window.ipc && window.ipc.postMessage) {
    window.ipc.postMessage(JSON.stringify({ kind: kind, payload: payload || {} }));
  }
}

// ================================================================
// STATE
// ================================================================

let isWaiting = false;
const messagesEl = document.getElementById('messages');
const welcomeEl = document.getElementById('welcome');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const cmdHint = document.getElementById('cmd-hint');
const statusText = document.getElementById('status-text');
const headerTitle = document.getElementById('header-title');
const providerSelect = document.getElementById('provider-select');

// Reflects the currently active provider; updated on load and on switch.
let currentProvider = 'claude';

// User picked a different provider — tell Rust to rebuild the client.
providerSelect.addEventListener('change', function() {
  var provider = providerSelect.value;
  if (provider === currentProvider) return;
  currentProvider = provider;
  statusText.textContent = 'switching...';
  sendIpc('set_ai_provider', { provider: provider });
});

// ================================================================
// COMMANDS
// ================================================================

const COMMANDS = [
  { name: '/help', desc: 'Show available commands' },
  { name: '/open', desc: 'Open a panel (chat, terminal, game)' },
  { name: '/theme', desc: 'Change color theme' },
  { name: '/settings', desc: 'Open settings' },
  { name: '/clear', desc: 'Clear chat history' },
  { name: '/model', desc: 'Switch AI model' },
];

function handleCommand(text) {
  const parts = text.trim().split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1).join(' ');

  switch (cmd) {
    case '/help':
      addMessage('system', 'Commands: ' + COMMANDS.map(function(c) { return c.name; }).join(', '));
      return true;
    case '/clear':
      clearMessages();
      return true;
    case '/open':
      sendIpc('open_panel', { panel: args || 'terminal' });
      addMessage('system', 'Opening ' + (args || 'terminal') + '...');
      return true;
    case '/theme':
      sendIpc('settings_set_theme', { theme: args || 'cyberpunk' });
      addMessage('system', 'Theme: ' + (args || 'cyberpunk'));
      return true;
    case '/settings':
      sendIpc('open_panel', { panel: 'settings' });
      addMessage('system', 'Opening settings...');
      return true;
    case '/model':
      addMessage('system', 'Model switching not yet implemented.');
      return true;
    default:
      return false;
  }
}

// ================================================================
// MESSAGES
// ================================================================

function addMessage(role, text) {
  if (welcomeEl && welcomeEl.parentNode) {
    welcomeEl.remove();
  }

  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function clearMessages() {
  messagesEl.innerHTML = '';
  // Tear down any pending approval cards + their timers so a stale timeout
  // can't fire against DOM that no longer exists. Defined later in the IPC
  // scope; guard in case it isn't wired yet.
  if (typeof resetApprovalCards === 'function') resetApprovalCards();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ================================================================
// SEND
// ================================================================

function send() {
  const text = inputEl.value.trim();
  if (!text || isWaiting) return;

  // Check for /commands
  if (text.startsWith('/')) {
    if (handleCommand(text)) {
      inputEl.value = '';
      autoResize();
      return;
    }
  }

  addMessage('user', text);
  inputEl.value = '';
  autoResize();

  isWaiting = true;
  statusText.textContent = 'thinking...';
  showTyping();

  // Send to Rust backend via IPC
  sendIpc('assistant_input', { text: text });
}

// ================================================================
// INPUT HANDLING
// ================================================================

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }

  // Show/hide command hints
  setTimeout(updateCmdHint, 10);
});

inputEl.addEventListener('input', function() {
  autoResize();
  updateCmdHint();
});

sendBtn.addEventListener('click', send);

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

function updateCmdHint() {
  const text = inputEl.value;
  if (!text.startsWith('/') || text.includes(' ')) {
    cmdHint.classList.remove('visible');
    return;
  }

  const matches = COMMANDS.filter(function(c) {
    return c.name.startsWith(text.toLowerCase());
  });

  if (matches.length === 0) {
    cmdHint.classList.remove('visible');
    return;
  }

  cmdHint.innerHTML = '';
  matches.forEach(function(c) {
    const div = document.createElement('div');
    div.className = 'cmd-option';
    div.innerHTML = '<span class="cmd-name">' + escapeHtml(c.name) + '</span>'
      + '<span class="cmd-desc">' + escapeHtml(c.desc) + '</span>';
    div.addEventListener('click', function() {
      inputEl.value = c.name + ' ';
      inputEl.focus();
      cmdHint.classList.remove('visible');
    });
    cmdHint.appendChild(div);
  });
  cmdHint.classList.add('visible');
}

// ================================================================
// IPC INCOMING (from Rust via window.jarvis.ipc._dispatch)
// ================================================================

// In-progress streaming element
var streamingEl = null;
var streamingText = '';

// Approval cards keyed by request id (module scope so clearMessages() can tear
// them down on a new turn / panel clear). The tool_result IPC event carries the
// tool-call id, so results correlate to cards by id (no FIFO queue).
var approvalCards = {};

// Cancel every pending approval card's timer and forget them. Called when the
// panel is cleared so a stale 115s timeout can't fire against removed DOM.
function resetApprovalCards() {
  for (var k in approvalCards) {
    if (Object.prototype.hasOwnProperty.call(approvalCards, k)) {
      var c = approvalCards[k];
      if (c && typeof c.cancelTimer === 'function') c.cancelTimer();
    }
  }
  approvalCards = {};
}

function registerIpcHandlers() {
  var ipcBridge = window.jarvis && window.jarvis.ipc;
  if (!ipcBridge || !ipcBridge.on) {
    // IPC init script hasn't run yet — retry shortly
    setTimeout(registerIpcHandlers, 50);
    return;
  }

  ipcBridge.on('assistant_chunk', function(payload) {
    if (!streamingEl) {
      hideTyping();
      if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();
      streamingEl = document.createElement('div');
      streamingEl.className = 'message assistant';
      messagesEl.appendChild(streamingEl);
      streamingText = '';
    }
    streamingText += (payload.text || '');
    streamingEl.textContent = streamingText;
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  // --- Tool activity (read-only filesystem tools) ---
  function describeToolCall(name, input) {
    input = input || {};
    var arg = input.path || input.pattern || input.directory || '';
    return name + '(' + (arg ? String(arg) : '') + ')';
  }

  // Maps to the most recent pending tool element by name (for result fill-in).
  var pendingTool = null;

  // `approvalCards` (id -> card) lives at module scope; results correlate by id.

  ipcBridge.on('tool_call', function(payload) {
    hideTyping();
    if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();
    // A tool round interrupts streaming; close out any in-progress bubble so
    // the next text chunk starts fresh after the tool result.
    streamingEl = null;
    streamingText = '';

    var details = document.createElement('details');
    details.className = 'tool-activity';
    var summary = document.createElement('summary');
    summary.innerHTML = '🔧 <span class="tool-name">'
      + escapeHtml(describeToolCall(payload.name, payload.input)) + '</span>';
    details.appendChild(summary);
    var body = document.createElement('div');
    body.className = 'tool-body';
    body.textContent = '…running';
    details.appendChild(body);
    messagesEl.appendChild(details);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    pendingTool = { name: payload.name, el: details, body: body };
  });

  ipcBridge.on('tool_result', function(payload) {
    var target = pendingTool;
    if (!target || (payload.name && target.name !== payload.name)) {
      // Fallback: create a standalone result line.
      var details = document.createElement('details');
      details.className = 'tool-activity';
      var summary = document.createElement('summary');
      summary.innerHTML = '🔧 <span class="tool-name">'
        + escapeHtml(payload.name || 'tool') + '</span>';
      details.appendChild(summary);
      var body = document.createElement('div');
      body.className = 'tool-body';
      details.appendChild(body);
      messagesEl.appendChild(details);
      target = { el: details, body: body };
    }
    if (payload.is_error) target.el.classList.add('error');
    target.body.textContent = payload.summary || '(no output)';
    pendingTool = null;

    // Correlate to the approval card by id (mutating tools only have a card).
    // Read-only and denied results simply have no matching card → no-op.
    if (payload.id && approvalCards[payload.id]) {
      var card = approvalCards[payload.id];
      if (card && card.setExecuted) card.setExecuted(payload.is_error);
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  // --- Tool approval gate (mutating/exec tools: write_file, run_command) ---
  //
  // The Rust tool loop BLOCKS on an explicit human decision before running any
  // mutating/exec tool. It emits `tool_approval_request` with { id, tool,
  // summary } and we MUST reply with `assistant_tool_approve` /
  // `assistant_tool_deny` carrying { id }. If we never reply, the Rust side
  // times out after 120s and fails closed (deny) — so here Deny is the safe,
  // easy default (it gets focus; Approve requires a deliberate click), and we
  // mirror that timeout client-side as a visible "timed out" state.
  //
  // SECURITY: `tool` and `summary` are model-controlled text. They are ALWAYS
  // rendered via textContent — never innerHTML — so embedded markup cannot
  // execute or alter the page. Nothing is ever auto-approved.
  //
  // The UI timeout is deliberately SHORTER than the Rust 120s gate so the panel
  // can never show "approved · running" for a request the backend has already
  // timed-out-denied. Whichever side fires, the outcome is the same: deny.
  var APPROVAL_TIMEOUT_MS = 115000; // < Rust APPROVAL_TIMEOUT (120s)

  ipcBridge.on('tool_approval_request', function(payload) {
    if (!payload || !payload.id) return;
    hideTyping();
    if (welcomeEl && welcomeEl.parentNode) welcomeEl.remove();
    // A pending approval interrupts streaming; close any in-progress bubble.
    streamingEl = null;
    streamingText = '';

    var id = String(payload.id);
    var toolName = payload.tool || 'tool';

    var box = document.createElement('div');
    box.className = 'tool-approval';

    // Header: prominent "approval required" + the exact tool name.
    var header = document.createElement('div');
    header.className = 'tool-approval-header';
    var icon = document.createElement('span');
    icon.className = 'tool-approval-icon';
    icon.textContent = '⚠'; // warning sign
    var htext = document.createElement('span');
    // textContent throughout — model controls toolName.
    htext.textContent = (toolName === 'run_command')
      ? 'Approval required — run command'
      : (toolName === 'write_file')
        ? 'Approval required — write file'
        : 'Approval required';
    var hToolBadge = document.createElement('span');
    hToolBadge.className = 'tool-approval-tool';
    hToolBadge.textContent = toolName;
    header.appendChild(icon);
    header.appendChild(htext);
    box.appendChild(header);

    // Summary block: the EXACT command / path + content preview the model sent.
    // Rendered with textContent so model markup is inert.
    var summary = document.createElement('div');
    summary.className = 'tool-approval-summary';
    summary.textContent = (payload.summary && String(payload.summary).length)
      ? String(payload.summary)
      : (toolName + ' (no details provided)');
    box.appendChild(summary);

    // Actions: Deny (safe default, focused) + Approve (deliberate) + status.
    var actions = document.createElement('div');
    actions.className = 'tool-approval-actions';

    var denyBtn = document.createElement('button');
    denyBtn.className = 'ta-deny';
    denyBtn.type = 'button';
    denyBtn.textContent = 'Deny';

    var approveBtn = document.createElement('button');
    approveBtn.className = 'ta-approve';
    approveBtn.type = 'button';
    approveBtn.textContent = 'Approve';

    var spacer = document.createElement('span');
    spacer.className = 'ta-spacer';

    var status = document.createElement('span');
    status.className = 'tool-approval-status';
    status.textContent = '';

    actions.appendChild(denyBtn);
    actions.appendChild(approveBtn);
    actions.appendChild(spacer);
    actions.appendChild(status);
    box.appendChild(actions);

    messagesEl.appendChild(box);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    var settled = false;
    var timeoutHandle = null;

    function clearTimer() {
      if (timeoutHandle !== null) { clearTimeout(timeoutHandle); timeoutHandle = null; }
    }

    var card = {
      id: id,
      box: box,
      // Called when the approved tool's result arrives.
      setExecuted: function(isError) {
        clearTimer();
        status.textContent = isError ? 'approved · failed' : 'approved · done';
      },
      // Cancel any pending timer (used when the panel is cleared / a new turn
      // starts) so a stale timeout can't fire against a removed card.
      cancelTimer: clearTimer
    };
    approvalCards[id] = card;

    function disableButtons() {
      denyBtn.disabled = true;
      approveBtn.disabled = true;
    }

    // Reply once; fail-closed semantics live in Rust, this is just the UI.
    function decide(kind) {
      if (settled) return;
      settled = true;
      clearTimer();
      disableButtons();
      sendIpc(kind, { id: id });
      if (kind === 'assistant_tool_approve') {
        box.classList.add('resolved-approve');
        status.textContent = 'approved · running…';
        // Card stays in `approvalCards[id]`; the tool_result handler correlates
        // by id and calls setExecuted().
      } else {
        box.classList.add('resolved-deny');
        status.textContent = 'denied';
        delete approvalCards[id];
      }
    }

    // Local timeout (115s, just under the Rust 120s gate) mirrors the fail-closed
    // deny. If we reach it we do NOT send approve; we surface the timed-out state
    // and the Rust side denies independently.
    timeoutHandle = setTimeout(function() {
      if (settled) return;
      settled = true;
      disableButtons();
      box.classList.add('resolved-timeout');
      status.textContent = 'timed out — denied';
      delete approvalCards[id];
    }, APPROVAL_TIMEOUT_MS);

    denyBtn.addEventListener('click', function() { decide('assistant_tool_deny'); });
    approveBtn.addEventListener('click', function() { decide('assistant_tool_approve'); });

    // Keyboard: Escape denies; Enter/Space on a focused button activate it
    // natively. Deny is the default focus so an accidental Enter denies.
    box.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { e.preventDefault(); decide('assistant_tool_deny'); }
    });

    // Make Deny the easy/safe default by focusing it.
    denyBtn.focus();
  });

  ipcBridge.on('assistant_output', function(payload) {
    hideTyping();
    isWaiting = false;
    statusText.textContent = 'ready';
    if (streamingEl) {
      // Finalize streaming message with the full text
      if (payload && payload.text) {
        streamingEl.textContent = payload.text;
      }
      streamingEl = null;
      streamingText = '';
    } else if (payload && payload.text) {
      addMessage('assistant', payload.text);
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  ipcBridge.on('assistant_error', function(payload) {
    hideTyping();
    isWaiting = false;
    statusText.textContent = 'ready';
    streamingEl = null;
    streamingText = '';
    addMessage('error', payload.message || 'An error occurred.');
  });

  ipcBridge.on('assistant_config', function(payload) {
    if (payload && payload.model_name) {
      headerTitle.textContent = escapeHtml(payload.model_name);
    }
  });

  // Reflect the active provider in the dropdown (on load and after a switch).
  ipcBridge.on('assistant_provider', function(payload) {
    if (payload && payload.provider) {
      currentProvider = payload.provider;
      providerSelect.value = payload.provider;
      if (statusText.textContent === 'switching...') {
        statusText.textContent = 'ready';
      }
    }
  });

  ipcBridge.on('theme_update', function(payload) {
    applyTheme(payload);
  });

  // Signal readiness so Rust starts the assistant runtime
  sendIpc('assistant_ready', {});
}

registerIpcHandlers();

// ================================================================
// THEME
// ================================================================

function applyTheme(vars) {
  if (!vars) return;
  var root = document.documentElement;
  Object.keys(vars).forEach(function(key) {
    root.style.setProperty(key, vars[key]);
  });
}

// ================================================================
// HELPERS
// ================================================================

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Focus input on load
inputEl.focus();
</script>
</body>
</html>
