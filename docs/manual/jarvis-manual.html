### CSS Value Sanitization

**Source:** `jarvis-rs/crates/jarvis-webview/src/theme_bridge/sanitize.rs`

All CSS values are validated before injection to prevent CSS injection attacks:

**Color validation** (`validate_css_color`):
- Accepts: hex (`#rgb`, `#rgba`, `#rrggbb`, `#rrggbbaa`) and `rgb()`/`rgba()` with numeric arguments
- Rejects: named colors (`red`, `blue`, `transparent`), anything else

**Font family validation** (`validate_css_font_family`):
- Accepts: alphanumeric characters, spaces, hyphens, underscores, quotes, commas
- Rejects: any other special characters

**Numeric validation** (`validate_css_numeric`):
- Accepts: numbers with optional units (`px`, `em`, `rem`, `%`)
- Rejects: non-numeric strings

**Injection pattern blocking** (applied to all types):
Rejects values containing any of:
```
expression(  url(  javascript:  eval(  import
@import  @charset  behavior:  -moz-binding
;  {  }  <  >
```

Invalid values are silently skipped (with a warning log), never injected.

### Theme Change Flow

1. User sends `settings_set_theme` with `{ name: "mocha" }`.
2. Rust loads the theme overrides from config.
3. Applies overrides to the in-memory `JarvisConfig`.
4. Calls `inject_theme_into_all_webviews()`.
5. For each active WebView: evaluates CSS injection JS and xterm theme JS.
6. All panels update their colors live.

---

## Keyboard Shortcut Interception

**Source:** The `IPC_INIT_SCRIPT` in `jarvis-rs/crates/jarvis-webview/src/ipc.rs`

WKWebView (macOS) captures Cmd+key events before the winit event loop sees them. To make application keybinds work, the init script intercepts keyboard events in the WebView and forwards them to Rust via IPC.

### Overlay Mode

When an overlay (command palette or assistant) is active, ALL non-repeat keydown events are intercepted:

```javascript
if (_overlayActive && !e.repeat) {
    e.preventDefault();
    e.stopPropagation();
    window.jarvis.ipc.send('keybind', {
        key: e.key, ctrl: e.ctrlKey, alt: e.altKey,
        shift: e.shiftKey, meta: e.metaKey
    });
    return;
}
```

The overlay state is controlled by `window.jarvis._setOverlayActive(bool)`.

### Escape Key

Escape is always forwarded to Rust (without `preventDefault`, so terminals still receive it via xterm.js):

```javascript
if (e.key === 'Escape' && !e.repeat) {
    window.jarvis.ipc.send('keybind', {
        key: 'Escape', ctrl: false, alt: false, shift: false, meta: false
    });
    return;
}
```

In Rust, Escape is used for:
- Exiting games (navigates back to the original panel URL)
- Closing overlays

### Meta (Cmd) Key Shortcuts

When `e.metaKey` is pressed:

| Key | Behavior |
|-----|----------|
| `Cmd+C` | Grabs selection from `window._xtermInstance.getSelection()` or `window.getSelection()`, sends `clipboard_copy` IPC |
| `Cmd+V` | Sends `clipboard_paste` IPC request, dispatches result to active element or xterm |
| `Cmd+R` | Passed through to webview (page reload) |
| `Cmd+L` | Passed through to webview |
| `Cmd+Q` | Passed through to webview |
| `Cmd+A` | Passed through to webview (select all) |
| `Cmd+X` | Passed through to webview (cut) |
| `Cmd+Z` | Passed through to webview (undo) |
| All other `Cmd+key` | Forwarded to Rust as `keybind` IPC, with `preventDefault` |

### Keybind Dispatch in Rust

**Source:** `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/ipc_dispatch.rs`

When a `keybind` message arrives:

1. If the command palette is open, keys are routed to the palette handler. `Cmd+V` in palette mode pastes clipboard text into the search query.
2. If the assistant overlay is open, keys are routed to the assistant handler.
3. If Escape is pressed and a game is active on this pane, the game exits (navigates back to the original URL).
4. Otherwise, the key combo is looked up in the keybind registry and the corresponding action is dispatched.

### Diagnostic Event Logging

The init script also logs diagnostic events (mousedown, keydown, focus, blur) via `debug_event` IPC messages. `mousedown` additionally sends `panel_focus` to switch tiling focus.

---

## Command Palette Overlay

**Source:** The `IPC_INIT_SCRIPT` in `jarvis-rs/crates/jarvis-webview/src/ipc.rs`

The command palette is a DOM overlay injected by the IPC init script into every WebView. It provides a fuzzy-searchable command launcher similar to VS Code's command palette.

### DOM Structure

```
#_cp_overlay         (fixed fullscreen backdrop with blur)
  #_cp_panel         (centered modal, 480px wide, max 380px tall)
    #_cp_search      (search bar with icon and query)
      .icon          (">" for commands, "url:" for URL input mode)
      #_cp_query     (displayed query text with blinking cursor)
    #_cp_items       (scrollable list of items)
      ._cp_header    (category header, shown when not filtering)
      ._cp_item      (command row: label + keybind)
```

### Styles

Styles are lazily injected into `<head>` on first show. They use CSS custom properties from the theme bridge (e.g., `var(--color-panel-bg, #1e1e2e)`) with fallback defaults.

### Modes

- **Command mode** (`mode !== 'url_input'`): Shows filtered command items.
- **URL input mode** (`mode === 'url_input'`): Shows a hint ("Type a URL and press Enter"), icon changes to "url:".

### IPC Integration

**Rust -> JS:**
- `palette_show` -- Calls `window._showCommandPalette(items, query, selectedIndex, mode, placeholder)`
- `palette_update` -- Calls `window._updateCommandPalette(items, query, selectedIndex, mode, placeholder)`
- `palette_hide` -- Calls `window._hideCommandPalette()`

**JS -> Rust:**
- `palette_click { index }` -- User clicked item at index
- `palette_hover { index }` -- User hovered over item at index
- `palette_dismiss {}` -- User clicked backdrop

### Keyboard Blocking

When the palette is visible, a capturing keydown listener blocks Escape, Enter, ArrowUp, ArrowDown, Backspace, Tab, and printable characters from reaching the underlying page content. These are instead forwarded via the overlay keybind mechanism.

### Item Format

Each item in the `items` array:

```json
{
  "label": "New Terminal",
  "keybind": "Cmd+N",
  "category": "Panels"
}
```

Categories are displayed as section headers when no search query is active.

---

## Clipboard Integration

**Source:** `IPC_INIT_SCRIPT`, `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/ipc_dispatch.rs`, `file_handlers.rs`

WKWebView (macOS) blocks direct clipboard access from JavaScript. Jarvis works around this by proxying all clipboard operations through Rust via IPC.

### Copy Flow (Cmd+C)

1. The JS keydown handler intercepts `Cmd+C`.
2. It tries to get selected text from `window._xtermInstance.getSelection()` (xterm.js) first, then `window.getSelection()` (DOM).
3. If text is found, sends `clipboard_copy { text }` IPC to Rust.
4. Rust writes the text to the system clipboard via `jarvis_platform::Clipboard`.

### Paste Flow (Cmd+V)

1. The JS keydown handler intercepts `Cmd+V`, prevents default, and stops propagation.
2. Sends `clipboard_paste` IPC request (request-response pattern).
3. Rust reads the system clipboard:
   - **Image data**: Encodes RGBA pixels as PNG, returns `{ kind: "image", data_url: "data:image/png;base64,..." }`.
   - **Text data**: Returns `{ kind: "text", text: "..." }`.
   - **Empty**: Returns `{ error: "clipboard empty" }`.
4. JS receives the response:
   - **Image**: Dispatches a `jarvis:paste-image` CustomEvent on the document.
   - **Text**: If an input/textarea/contentEditable is focused, inserts via `document.execCommand('insertText')`. If an xterm instance exists, sends `pty_input { data }`.

### Clipboard API Polyfill

The init script also overrides `navigator.clipboard.writeText` to proxy through IPC:

```javascript
navigator.clipboard.writeText = function(text) {
    return new Promise(function(resolve) {
        window.jarvis.ipc.send('clipboard_copy', { text: text });
        resolve();
    });
};
```

This allows games and web apps that use the standard Clipboard API to function correctly.

---

## WebViewHandle Rust API

**Source:** `jarvis-rs/crates/jarvis-webview/src/manager/handle.rs`

`WebViewHandle` wraps a `wry::WebView` instance and provides a safe, typed API:

```rust
pub struct WebViewHandle {
    webview: WebView,       // Underlying wry WebView
    pane_id: u32,           // Pane ID this WebView belongs to
    current_url: String,    // Best-effort URL tracking
    current_title: String,  // Current document title
}
```

### Methods

| Method | Signature | Description |
|--------|-----------|-------------|
| `pane_id()` | `-> u32` | Get the pane ID |
| `current_url()` | `-> &str` | Get the tracked current URL |
| `current_title()` | `-> &str` | Get the tracked current title |
| `load_url(url)` | `-> Result<(), wry::Error>` | Navigate to a URL |
| `load_html(html)` | `-> Result<(), wry::Error>` | Load raw HTML (sets URL to `about:blank`) |
| `evaluate_script(js)` | `-> Result<(), wry::Error>` | Execute arbitrary JavaScript |
| `send_ipc(kind, payload)` | `-> Result<(), wry::Error>` | Send a typed IPC message to JS (calls `_dispatch`) |
| `set_bounds(rect)` | `-> Result<(), wry::Error>` | Reposition/resize within the parent window |
| `set_visible(bool)` | `-> Result<(), wry::Error>` | Show or hide the WebView |
| `focus()` | `-> Result<(), wry::Error>` | Give OS focus to this WebView |
| `focus_parent()` | `-> Result<(), wry::Error>` | Return OS focus to the parent window |
| `open_devtools()` | `()` | Open browser devtools (if enabled) |
| `zoom(scale)` | `-> Result<(), wry::Error>` | Set zoom level |
| `set_title(title)` | `()` | Update the tracked title string |
| `inner()` | `-> &WebView` | Access the underlying wry WebView |

### IPC Dispatch Implementation

`send_ipc` generates a JavaScript snippet and evaluates it:

```rust
pub fn send_ipc(&self, kind: &str, payload: &serde_json::Value) -> Result<(), wry::Error> {
    let script = crate::ipc::js_dispatch_message(kind, payload);
    self.webview.evaluate_script(&script)
}
```

The generated JS:
```javascript
window.jarvis.ipc._dispatch("pty_output", {"data": "ls\nREADME.md"});
```

---

## WebViewRegistry Lifecycle

**Source:** `jarvis-rs/crates/jarvis-webview/src/manager/registry.rs`

The `WebViewRegistry` is the top-level container that manages all active WebView instances, mapping pane IDs to `WebViewHandle`s.

```rust
pub struct WebViewRegistry {
    manager: WebViewManager,
    handles: HashMap<u32, WebViewHandle>,
}
```

### Methods

| Method | Description |
|--------|-------------|
| `new(manager)` | Create a registry wrapping a `WebViewManager` |
| `create(pane_id, window, bounds, config)` | Create a WebView and register it for a pane |
| `get(pane_id)` | Get an immutable handle by pane ID |
| `get_mut(pane_id)` | Get a mutable handle by pane ID |
| `destroy(pane_id)` | Destroy a WebView, emit `Closed` event |
| `active_panes()` | List all pane IDs with active WebViews |
| `drain_events()` | Drain pending events from all WebViews |
| `destroy_all()` | Destroy all WebViews (graceful shutdown) |
| `count()` | Number of active WebViews |

### Event System

The `WebViewManager` maintains an `Arc<Mutex<Vec<WebViewEvent>>>` event queue. Events are pushed by the IPC handler, page load handler, title change handler, and navigation handler. The application event loop calls `drain_events()` to process them.

Event types:

```rust
pub enum WebViewEvent {
    PageLoad { pane_id: u32, state: PageLoadState, url: String },
    TitleChanged { pane_id: u32, title: String },
    IpcMessage { pane_id: u32, body: String },
    NavigationRequested { pane_id: u32, url: String },
    Closed { pane_id: u32 },
}
```

`PageLoadState` has two variants: `Started` and `Finished`.

### Lifecycle Flow

1. **Startup**: `WebViewManager::new()` -> `WebViewRegistry::new(manager)` -> `manager.set_content_provider(provider)`.
2. **Panel creation**: `registry.create(pane_id, window, bounds, config)` -> WebView appears in the window.
3. **Event loop**: `registry.drain_events()` -> dispatch IPC messages, handle page loads.
4. **Resize**: `handle.set_bounds(new_rect)` on window resize or tiling layout change.
5. **Navigation**: `handle.load_url(url)` for game launch, panel switch, etc.
6. **Destruction**: `registry.destroy(pane_id)` when a panel is closed.
7. **Shutdown**: `registry.destroy_all()` during graceful exit.

### Page Load Handling

When a page finishes loading in the focused pane, the handle receives OS focus to ensure the keyboard shortcut forwarder works. Additionally, for "Bros" games (kartbros, basketbros, etc.), an ad-blocker CSS/JS snippet is injected.

---

## Appendix: Data Flow Diagrams

### JS -> Rust Message Flow

```
JavaScript
    |
    v
window.jarvis.ipc.send(kind, payload)
    |
    v
window.ipc.postMessage(JSON.stringify({kind, payload}))
    |
    v
wry IPC handler (validates JSON)
    |
    v
WebViewEvent::IpcMessage { pane_id, body }
    |
    v
Event queue (Arc<Mutex<Vec<WebViewEvent>>>)
    |
    v
poll_webview_events() drains queue
    |
    v
handle_ipc_message(pane_id, body)
    |
    v
IpcMessage::from_json() -- parse kind + payload
    |
    v
is_ipc_kind_allowed() -- allowlist check
    |
    v
match msg.kind -- dispatch to handler
```

### Rust -> JS Message Flow

```
Rust handler
    |
    v
handle.send_ipc(kind, payload)
    |
    v
js_dispatch_message(kind, payload)
    -- generates: window.jarvis.ipc._dispatch("kind", {...})
    |
    v
webview.evaluate_script(js_string)
    |
    v
JavaScript executes in WebView context
    |
    v
_dispatch checks for _reqId (request-response)
    |
    v
If _reqId: resolves/rejects pending Promise
Else: calls registered on() handler
```

### Request-Response Flow

```
JS: jarvis.ipc.request('clipboard_paste', {})
    |
    v
Assigns _reqId=N, stores Promise callbacks
    |
    v
send('clipboard_paste', { _reqId: N })
    |
    v
[... Rust processes, reads clipboard ...]
    |
    v
handle.send_ipc('clipboard_paste_response',
    { _reqId: N, kind: "text", text: "hello" })
    |
    v
_dispatch sees _reqId=N, finds pending request
    |
    v
Resolves Promise with { kind: "text", text: "hello" }
```

# Input System & Command Palette

This document covers the complete input pipeline in Jarvis: how keyboard and
mouse events travel from the operating system through winit, get processed by
the `InputProcessor`, matched against the `KeybindRegistry`, resolved to
`Action` variants, and dispatched to subsystems.  It also covers the command
palette -- a searchable overlay that exposes every action to the user.

---

## Table of Contents

1. [Input Modes](#input-modes)
2. [The Action Enum](#the-action-enum)
3. [Keybind System](#keybind-system)
4. [Default Keybinds Table](#default-keybinds-table)
5. [Input Flow: End-to-End](#input-flow-end-to-end)
6. [The Command Palette](#the-command-palette)
7. [Palette Categories](#palette-categories)
8. [Plugin Items in the Palette](#plugin-items-in-the-palette)
9. [Full Dispatch Table](#full-dispatch-table)
10. [Mouse Input Handling](#mouse-input-handling)
11. [Modifier Key Tracking](#modifier-key-tracking)
12. [Terminal Key Encoding](#terminal-key-encoding)

---

## Input Modes

The `InputProcessor` maintains an `InputMode` that determines how key events
are routed.  There are four modes:

| Mode              | Description                                                                 |
|-------------------|-----------------------------------------------------------------------------|
| `Terminal`        | Default mode.  Keybinds are checked first; unmatched keys are encoded as terminal bytes and sent to the PTY via xterm.js. |
| `CommandPalette`  | The command palette overlay is open.  All keys are routed to the palette's filter/selection handler.  Only keybind lookups still fire (so the user can dismiss the palette with its keybind). |
| `Assistant`       | The AI assistant panel is open.  Keys are routed to the assistant's text input and scroll handler. |
| `Settings`        | The settings UI is open.  Keys are consumed (not forwarded to the terminal). |

Mode transitions happen when overlays are opened or closed:

- `OpenCommandPalette` sets mode to `CommandPalette`.
- `OpenAssistant` toggles between `Assistant` and `Terminal`.
- `CloseOverlay` returns mode to `Terminal`.
- `OpenSettings` sets mode to `Settings`.

**Source**: `jarvis-rs/crates/jarvis-platform/src/input_processor/types.rs`

---

## The Action Enum

Every user-triggerable operation in Jarvis is represented by a variant of
`Action`.  Keybinds, the command palette, CLI commands, and IPC messages all
resolve to an `Action` before being dispatched.

**Source**: `jarvis-rs/crates/jarvis-common/src/actions/action_enum.rs`

### Complete Action Reference

| Variant | Label | Category | Description |
|---------|-------|----------|-------------|
| `NewPane` | New Pane | Panes | Create a new terminal pane (auto-splits in the optimal direction). Respects `max_panels` config limit. |
| `ClosePane` | Close Pane | Panes | Close the currently focused pane and destroy its webview. |
| `SplitHorizontal` | Split Horizontal | Panes | Split the focused pane horizontally (side-by-side). |
| `SplitVertical` | Split Vertical | Panes | Split the focused pane vertically (top-bottom). |
| `FocusPane(n)` | Focus Pane _n_ | Panes | Focus pane by 1-based index (1 through 5 have explicit labels). |
| `FocusNextPane` | Focus Next Pane | Panes | Cycle focus to the next pane. |
| `FocusPrevPane` | Focus Previous Pane | Panes | Cycle focus to the previous pane. |
| `ZoomPane` | Zoom Pane | Panes | Toggle zoom (maximize) on the focused pane. |
| `ResizePane { direction, delta }` | Resize Pane | Panes | Resize the focused pane in the given direction by `delta` pixels. |
| `SwapPane(direction)` | Swap Pane | Panes | Swap the focused pane with its neighbor in the given direction. |
| `ToggleFullscreen` | Toggle Fullscreen | Window | Toggle borderless fullscreen on the application window. |
| `Quit` | Quit | Window | Publish a `Shutdown` event, clean up, and exit the application. |
| `OpenCommandPalette` | Command Palette | Apps | Open the command palette overlay. |
| `OpenSettings` | Open Settings | Apps | Open the settings panel in a new horizontal split. |
| `OpenChat` | Open Chat | Apps | Open the chat panel in a new horizontal split. |
| `CloseOverlay` | Close Overlay | Apps | Close whichever overlay is open (assistant or palette) and return to `Terminal` mode. |
| `OpenURLPrompt` | Open URL | Apps | Sentinel action -- never dispatched.  Intercepted by the palette to enter URL input mode. |
| `OpenAssistant` | Open Assistant | Apps | Toggle the AI assistant panel (opens or closes). |
| `PushToTalk` | Push to Talk | System | Begin push-to-talk voice capture. On key _release_, emits `ReleasePushToTalk`. |
| `ReleasePushToTalk` | Release Push to Talk | System | End push-to-talk voice capture. Synthesized by `InputProcessor` on key release. |
| `ScrollUp(n)` | Scroll Up | Terminal | Scroll the terminal up by `n` lines. Handled by the webview. |
| `ScrollDown(n)` | Scroll Down | Terminal | Scroll the terminal down by `n` lines. Handled by the webview. |
| `ScrollToTop` | Scroll to Top | Terminal | Scroll to the top of terminal history. |
| `ScrollToBottom` | Scroll to Bottom | Terminal | Scroll to the bottom of terminal output. |
| `Copy` | Copy | Terminal | Copy the current selection from xterm.js or the DOM to the system clipboard. |
| `Paste` | Paste | Terminal | Read from the system clipboard and paste into the focused pane. Handles both input elements and terminal PTY input. |
| `SelectAll` | Select All | Terminal | Select all text in the focused pane. |
| `SearchOpen` | Find | Terminal | Open the terminal search bar. |
| `SearchClose` | Close Find | Terminal | Close the terminal search bar. |
| `SearchNext` | Find Next | Terminal | Jump to the next search match. |
| `SearchPrev` | Find Previous | Terminal | Jump to the previous search match. |
| `ClearTerminal` | Clear Terminal | Terminal | Clear the terminal scrollback via `xterm.clear()`. |
| `LaunchGame(name)` | Play _Name_ | Games | Navigate the focused pane's webview to `jarvis://localhost/games/{name}.html`. Stores the original URL for Escape-to-exit. |
| `OpenURL(url)` | (context-dependent) | Games / Web | Navigate the focused pane to the given URL. Auto-prepends `https://` if no scheme is present. Game URLs (kartbros, basketbros, etc.) are categorized as "Games"; everything else is "Web". |
| `PairMobile` | Pair Mobile Device | System | Display a pairing code for mobile device connection. |
| `RevokeMobilePairing` | Revoke Mobile Pairing | System | Revoke the current mobile pairing and regenerate the session ID. |
| `ReloadConfig` | Reload Config | System | Re-read the TOML config, rebuild the keybind registry, re-register plugin directories, and re-inject the theme into all webviews. |
| `None` | None | System | No-op sentinel. Never dispatched. |

### ResizeDirection

Used by `ResizePane` and `SwapPane`:

| Variant | Meaning |
|---------|---------|
| `Left` | Resize or swap leftward |
| `Right` | Resize or swap rightward |
| `Up` | Resize or swap upward |
| `Down` | Resize or swap downward |

**Source**: `jarvis-rs/crates/jarvis-common/src/actions/mod.rs`

---

## Keybind System

### Architecture Overview

The keybind system is spread across three crates:

| Crate | Responsibility |
|-------|---------------|
| `jarvis-config` | Defines `KeybindConfig` (the schema) and validation (`keybinds.rs`). |
| `jarvis-platform` | Parses keybind strings (`keymap/`), converts winit events to `KeyCombo`, and maps combos to `Action` via `KeybindRegistry` (`input/`). |
| `jarvis-app` | Owns the `InputProcessor` and calls `process_key()` from the event handler. |

### Configuration (`KeybindConfig`)

Keybinds are configured in a TOML file under the `[keybinds]` section.  Each
field is a string in `"Modifier+Key"` format.

**Source**: `jarvis-rs/crates/jarvis-config/src/schema/keybind_config.rs`

```toml
[keybinds]
push_to_talk = "Option+Period"
open_assistant = "Cmd+G"
new_panel = "Cmd+T"
close_panel = "Escape+Escape"
toggle_fullscreen = "Cmd+F"
open_settings = "Cmd+,"
open_chat = "Cmd+J"
focus_panel_1 = "Cmd+1"
focus_panel_2 = "Cmd+2"
focus_panel_3 = "Cmd+3"
focus_panel_4 = "Cmd+4"
focus_panel_5 = "Cmd+5"
cycle_panels = "Tab"
cycle_panels_reverse = "Shift+Tab"
split_vertical = "Cmd+D"
split_horizontal = "Cmd+Shift+D"
close_pane = "Cmd+W"
command_palette = "Cmd+Shift+P"
copy = "Cmd+C"
paste = "Cmd+V"
```

### Modifier Names (Case-Insensitive)

The parser recognizes the following modifier tokens:

| Token(s) | Resolved Modifier | Notes |
|----------|-------------------|-------|
| `Ctrl`, `Control` | `Ctrl` | |
| `Alt` | `Alt` | |
| `Option`, `Opt` | `Alt` | macOS name for the Alt key |
| `Cmd`, `Command` | `Super` on macOS, `Ctrl` on Windows/Linux | Cross-platform convenience |
| `Super`, `Win`, `Meta` | `Super` | Always maps to the platform super key |
| `Shift` | `Shift` | |

**Source**: `jarvis-rs/crates/jarvis-platform/src/keymap/parse.rs`

### Key Name Normalization

The last token in a keybind string is the key.  It is normalized by the parser:

| Input Token | Normalized Key |
|-------------|---------------|
| `Period` | `.` |
| `Comma` | `,` |
| `Slash` | `/` |
| `Backslash` | `\` |
| `Space` | `Space` |
| `Enter`, `Return` | `Enter` |
| `Escape`, `Esc` | `Escape` |
| `Tab` | `Tab` |
| `Backspace` | `Backspace` |
| `Delete`, `Del` | `Delete` |
| `Up`, `Down`, `Left`, `Right` | As-is (capitalized) |
| `Home`, `End` | As-is |
| `PageUp`, `PageDown` | As-is |
| Single character (e.g. `g`) | Uppercased (`G`) |
| Multi-character (e.g. `F1`) | Title-cased |

### Winit Key Normalization

When winit delivers a key event, the raw key name is normalized to match the
keybind system's canonical names:

| Winit Name | Normalized |
|------------|-----------|
| `ArrowUp` / `ArrowDown` / `ArrowLeft` / `ArrowRight` | `Up` / `Down` / `Left` / `Right` |
| `" "` (space character) | `Space` |
| Single lowercase letter | Uppercased |
| `F1` through `F12` | Pass-through |
| Punctuation (`.`, `,`, `/`, etc.) | Pass-through |

**Source**: `jarvis-rs/crates/jarvis-platform/src/winit_keys.rs`

### KeyCombo

`KeyCombo` is the internal representation used for O(1) HashMap lookups.
Modifiers are stored as a bitmask rather than a sorted vector:

| Bit | Modifier |
|-----|----------|
| `0b0001` (1) | Ctrl |
| `0b0010` (2) | Alt |
| `0b0100` (4) | Shift |
| `0b1000` (8) | Super |

A `KeyCombo` can be constructed from either:
- A parsed `KeyBind` (config path): `KeyCombo::from_keybind(&kb)`
- Raw winit booleans (event path): `KeyCombo::from_winit(ctrl, alt, shift, super_key, key)`

Both paths produce identical `KeyCombo` values for the same logical key
combination, ensuring correct HashMap equality.

**Source**: `jarvis-rs/crates/jarvis-platform/src/input/key_combo.rs`

### KeybindRegistry

The registry is a `HashMap<KeyCombo, Action>`.  It is built from
`KeybindConfig` at startup and rebuilt on `ReloadConfig`.

```
KeybindConfig (TOML strings)
    |
    v  parse_keybind()
KeyBind { modifiers, key }
    |
    v  KeyCombo::from_keybind()
KeyCombo { mods: u8, key: String }
    |
    v  HashMap::insert()
KeybindRegistry { bindings: HashMap<KeyCombo, Action> }
```

The registry supports:
- **Forward lookup**: `lookup(&KeyCombo) -> Option<&Action>` -- used by `InputProcessor`.
- **Reverse lookup**: `keybind_for_action(&Action) -> Option<String>` -- used by the command palette to display keybind hints.
- **Iteration**: `all_bindings()` -- exposes the full map for debug/display.

**Source**: `jarvis-rs/crates/jarvis-platform/src/input/registry.rs`

### Validation

The `keybinds.rs` module in `jarvis-config` provides:
- `all_keybinds(config)` -- returns 18 `(name, binding)` pairs for inspection.
- `validate_no_duplicates(config)` -- ensures no two actions share the same key combination.

**Source**: `jarvis-rs/crates/jarvis-config/src/keybinds.rs`

## Input Flow: End-to-End

The complete path of a keyboard event through the system:

```
winit WindowEvent::KeyboardInput { event: KeyEvent }
    |
    v
JarvisApp::handle_keyboard_input()          [event_handler.rs]
    |
    |-- Extract logical_key (Named or Character)
    |-- Normalize via normalize_winit_key()   [winit_keys.rs]
    |
    |-- [1] If command palette is open:
    |       handle_palette_key() -> true?  => DONE (consumed)
    |
    |-- [2] If assistant is open:
    |       handle_assistant_key() -> true? => DONE (consumed)
    |
    |-- [3] Build Modifiers from winit ModifiersState
    |
    |-- [4] InputProcessor::process_key()     [processor.rs]
    |       |
    |       |-- Build KeyCombo::from_winit()
    |       |
    |       |-- If key release:
    |       |     If combo matches PushToTalk => Action(ReleasePushToTalk)
    |       |     Otherwise => Consumed
    |       |
    |       |-- If key press:
    |       |     Check KeybindRegistry::lookup()
    |       |       Match found => Action(action)
    |       |       No match:
    |       |         If mode != Terminal => Consumed
    |       |         If mode == Terminal => encode_key_for_terminal()
    |       |           Non-empty bytes => TerminalInput(bytes)
    |       |           Empty => Consumed
    |
    v
InputResult:
    Action(action)      => JarvisApp::dispatch(action)
    TerminalInput(bytes) => (rarely fires; xterm.js handles typing natively)
    Consumed             => no-op
```

### Key Points

1. **Overlay priority**: The command palette and assistant get first crack at
   key events before the `InputProcessor` runs.  This ensures typed characters
   go into the palette filter or assistant input, not the terminal.

2. **Push-to-talk release**: The `InputProcessor` has special handling for key
   _releases_.  If the released key combo matches `PushToTalk` in the registry,
   it synthesizes `ReleasePushToTalk`.  All other releases are consumed.

3. **Terminal bypass**: In practice, terminal keystrokes rarely flow through
   `InputResult::TerminalInput` because the webview hosting xterm.js intercepts
   keyboard events at the DOM level before winit sees them.  The encoding path
   exists for correctness and for cases where the webview does not capture input.

4. **Modifier-only presses**: Keys like bare `Ctrl` or `Shift` do not produce a
   recognized key name and are consumed.

## The Command Palette

The command palette is a searchable overlay listing all available actions.  It
is implemented across two crates:

| Crate | Module | Responsibility |
|-------|--------|----------------|
| `jarvis-renderer` | `command_palette/` | Core data model: `CommandPalette`, `PaletteItem`, `PaletteMode`. Filtering, selection, and confirmation logic. |
| `jarvis-app` | `app_state/palette.rs` | Key handling, webview IPC bridge, plugin injection, overlay state management. |

### Opening the Palette

1. User presses the `command_palette` keybind (default `Cmd+Shift+P`).
2. The registry resolves to `Action::OpenCommandPalette`.
3. `dispatch()` creates a new `CommandPalette` from the registry, injects
   plugin items, sets `InputMode::CommandPalette`, and sends `palette_show`
   IPC to the focused webview.

### PaletteMode

The palette operates in one of two modes:

| Mode | Behavior |
|------|----------|
| `ActionSelect` | Default.  The user types to filter the action list.  Up/Down/Tab navigate.  Enter confirms the selected action. |
| `UrlInput` | The user types a URL.  No filtering occurs (the item list is empty).  Enter confirms and dispatches `OpenURL(typed_text)`.  Escape returns to `ActionSelect`. |

The `UrlInput` mode is entered when the user selects `OpenURLPrompt` in
`ActionSelect` mode.  `OpenURLPrompt` is a sentinel action that is _never_
dispatched to the app -- the palette key handler intercepts it and calls
`enter_url_mode()` instead.

### PaletteItem

Each item in the palette has:

```rust
pub struct PaletteItem {
    pub action: Action,           // The action this item triggers
    pub label: String,            // Human-readable display label
    pub keybind_display: Option<String>,  // e.g. "⌘T" or "Ctrl+T"
    pub category: String,         // Grouping category
}
```

### Filtering

Filtering is case-insensitive substring matching on the label:

```
query = "split"
  => matches "Split Horizontal", "Split Vertical"
  => does NOT match "New Pane"
```

When the query is empty, all items are shown.  On each character typed (or
deleted), the filter re-runs and the selection index resets to 0.

In `UrlInput` mode, typed characters are appended to the query but no filtering
occurs (the list stays empty).  Character case is preserved for URL input but
lowercased for action filtering.

### Key Handling in the Palette

| Key | ActionSelect Mode | UrlInput Mode |
|-----|-------------------|---------------|
| `Escape` | Close palette (`CloseOverlay`) | Return to `ActionSelect` (rebuilds palette) |
| `Enter` | Confirm selection (dispatch action; or enter URL mode if `OpenURLPrompt`) | Confirm URL (dispatch `OpenURL`) |
| `Up` | Select previous item (wraps) | -- |
| `Down` | Select next item (wraps) | -- |
| `Tab` | Select next item (wraps) | -- |
| `Backspace` | Delete last character from query | Delete last character from URL |
| Printable char | Append (lowercased) to query, re-filter | Append (as-is) to URL |

### Webview IPC Bridge

The palette state is sent to the focused pane's webview via IPC messages:

| IPC Message | When Sent |
|-------------|-----------|
| `palette_show` | When the palette first opens (includes full item list, query, selected index, mode). |
| `palette_update` | After every keystroke that changes the palette state. |
| `palette_hide` | When the palette closes. |

The IPC payload is a JSON object:

```json
{
    "items": [
        { "label": "New Pane", "keybind": "⌘T", "category": "Panes" },
        { "label": "Split Horizontal", "keybind": "⌘⇧D", "category": "Panes" }
    ],
    "query": "split",
    "selectedIndex": 0,
    "mode": "action_select",
    "placeholder": ""
}
```

For `UrlInput` mode, the `mode` field is `"url_input"` and `placeholder` is
`"Type a URL and press Enter"`.

### Overlay State Notification

When any overlay (palette or assistant) opens or closes, all webviews are
notified via `window.jarvis._setOverlayActive(true/false)`.  This tells the
JavaScript keybind interceptor to forward keys like `Cmd+V` to Rust instead of
handling them in the DOM.

**Source**: `jarvis-rs/crates/jarvis-app/src/app_state/palette.rs`

---

## Palette Categories

Actions are grouped into categories for visual organization.  The category is
determined by the `Action::category()` method:

| Category | Actions |
|----------|---------|
| **Panes** | `NewPane`, `ClosePane`, `SplitHorizontal`, `SplitVertical`, `FocusPane(_)`, `FocusNextPane`, `FocusPrevPane`, `ZoomPane`, `SwapPane(_)`, `ResizePane { .. }` |
| **Window** | `ToggleFullscreen`, `Quit` |
| **Apps** | `OpenSettings`, `OpenAssistant`, `OpenChat`, `OpenURLPrompt`, `OpenCommandPalette`, `CloseOverlay` |
| **Terminal** | `Copy`, `Paste`, `SelectAll`, `SearchOpen`, `SearchClose`, `SearchNext`, `SearchPrev`, `ScrollUp(_)`, `ScrollDown(_)`, `ScrollToTop`, `ScrollToBottom`, `ClearTerminal` |
| **Games** | `LaunchGame(_)`, `OpenURL(_)` (when URL matches game domains: kartbros, basketbros, footballbros, soccerbros, wrestlebros, baseballbros, lichess) |
| **Web** | `OpenURL(_)` (non-game URLs) |
| **System** | `PairMobile`, `RevokeMobilePairing`, `ReloadConfig`, `PushToTalk`, `ReleasePushToTalk`, `None` |

Plugin items (bookmarks and local plugins) use whatever category is specified
in their configuration.  The default category for bookmarks is `"Plugins"`.

**Source**: `jarvis-rs/crates/jarvis-common/src/actions/dispatch.rs`

## Plugin Items in the Palette

When the command palette opens, plugin items are injected via
`inject_plugin_items()`.  There are two sources:

### Bookmark Plugins

Defined in the TOML config under `[[plugins.bookmarks]]`:

```toml
[[plugins.bookmarks]]
name = "My Dashboard"
url = "https://example.com/dashboard"
category = "Tools"
```

Each bookmark becomes a `PaletteItem` with `action = OpenURL(url)` and no
keybind display.

**Source**: `jarvis-rs/crates/jarvis-config/src/schema/plugins.rs`

### Local Plugins

Discovered from the filesystem and registered at startup.  Each local plugin
has an `id`, `name`, `category`, and `entry` HTML file.

The palette item's action URL is constructed as:
```
jarvis://localhost/plugins/{id}/{entry}
```

For example, a plugin with `id = "calculator"` and `entry = "index.html"`
would produce `jarvis://localhost/plugins/calculator/index.html`.

### Injection Mechanics

`inject_plugin_items()` builds a `Vec<PaletteItem>` from both sources and
calls `CommandPalette::add_items()`, which appends the items to the internal
list and re-runs the filter.  Items with empty `name` or `url` fields are
skipped.

**Source**: `jarvis-rs/crates/jarvis-app/src/app_state/palette.rs`

## Full Dispatch Table

The `dispatch()` method in `JarvisApp` routes each `Action` to the appropriate
subsystem.  The table below documents every case:

| Action | Subsystem | Behavior |
|--------|-----------|----------|
| `NewPane` | Tiling + WebView | Check `max_panels` limit. Auto-pick split direction from content rect. Split, create webview, sync bounds. |
| `ClosePane` | Tiling + WebView | Close focused pane, destroy its webview, sync bounds. |
| `SplitHorizontal` | Tiling + WebView | Execute `TilingCommand::SplitHorizontal`, create webview for new pane, sync bounds. |
| `SplitVertical` | Tiling + WebView | Execute `TilingCommand::SplitVertical`, create webview for new pane, sync bounds. |
| `FocusPane(n)` | Tiling | Focus pane by ID, notify focus change. |
| `FocusNextPane` | Tiling | Execute `TilingCommand::FocusNext`, notify focus change. |
| `FocusPrevPane` | Tiling | Execute `TilingCommand::FocusPrev`, notify focus change. |
| `ZoomPane` | Tiling | Execute `TilingCommand::Zoom`, sync webview bounds. |
| `ResizePane { direction, delta }` | Tiling | Map `ResizeDirection` to `Direction` and signed delta. Execute `TilingCommand::Resize`. Sync bounds. |
| `SwapPane(direction)` | Tiling | Map direction, execute `TilingCommand::Swap`. Sync bounds. |
| `ToggleFullscreen` | Window (winit) | Toggle between borderless fullscreen and windowed mode. |
| `Quit` | Event Bus + Shutdown | Publish `Event::Shutdown`, call `shutdown()`, set `should_exit = true`. |
| `OpenCommandPalette` | Palette + Input | Create `CommandPalette`, inject plugins, set `CommandPalette` mode, send `palette_show` IPC, notify overlay state. |
| `OpenAssistant` | Assistant + Input | Toggle: if open, close and return to `Terminal` mode. If closed, create `AssistantPanel`, set `Assistant` mode, start runtime. |
| `CloseOverlay` | Palette / Assistant | Close whichever is open. If assistant, clear panel. If palette, send `palette_hide`. Return to `Terminal` mode. |
| `OpenSettings` | Tiling + WebView | Set `Settings` mode. Split horizontally with `PaneKind::WebView`, load `jarvis://localhost/settings/index.html`. |
| `OpenChat` | Tiling + WebView | Split horizontally with `PaneKind::Chat`, load `jarvis://localhost/chat/index.html`. |
| `Copy` | WebView (JS eval) | Evaluate JS in the focused webview to grab the xterm.js selection (or DOM selection) and send it back via `clipboard_copy` IPC. |
| `Paste` | Clipboard + WebView | Read system clipboard via `jarvis_platform::Clipboard`. Evaluate JS to paste into the focused element (input/textarea) or send via `pty_input` IPC for terminal paste. |
| `LaunchGame(name)` | WebView | Store the pane's current URL in `game_active`. Navigate to `jarvis://localhost/games/{name}.html`. |
| `OpenURL(url)` | WebView | Normalize URL (prepend `https://` if missing). Store current URL in `game_active`. Navigate to the URL. |
| `PairMobile` | Mobile | Call `show_pair_code()`. |
| `RevokeMobilePairing` | Mobile | Call `revoke_mobile_pairing()`. Log confirmation. |
| `ReloadConfig` | Config + Registry + Chrome | Reload TOML config. Rebuild `KeybindRegistry`. Rebuild `UiChrome`. Re-register plugin directories. Re-inject theme into all webviews. Publish `Event::ConfigReloaded`. On error, push a `Notification::error`. |
| `ClearTerminal` | WebView (JS eval) | Evaluate `window._xtermInstance.clear()` in the focused webview. |
| `ScrollUp(_)` / `ScrollDown(_)` | WebView | Logged as debug; handled natively by the webview's xterm.js. |
| All other / `None` | -- | Logged as debug ("unhandled action"). |

After every dispatch, `update_window_title()` is called to reflect any state
changes in the window title.

**Source**: `jarvis-rs/crates/jarvis-app/src/app_state/dispatch.rs`

## Mouse Input Handling

Mouse events are handled by `JarvisApp` in the winit event handler.

### Cursor Movement (`CursorMoved`)

`handle_cursor_moved(x, y)` serves two purposes:

1. **During drag**: If `drag_state` is active, compute the ratio delta from the
   cursor position and adjust the split ratio between the two panes straddling
   the dragged border via `tree.adjust_ratio_between()`.  On macOS, vertical
   deltas are negated to account for AppKit's upward-increasing Y axis.  After
   adjustment, sync webview bounds and request redraw.

2. **Idle hover**: When not dragging, compute all inter-pane borders, check if
   the cursor is near one, and set the cursor icon accordingly:
   - Horizontal border: `CursorIcon::ColResize`
   - Vertical border: `CursorIcon::RowResize`
   - No border: `CursorIcon::Default`

### Mouse Button (`MouseInput`)

Only `MouseButton::Left` is handled.

**On press:**

1. **Overlay forwarding**: If the command palette or assistant is open, the
   click is forwarded into the focused pane's webview via
   `document.elementFromPoint()` + `.click()`.  This allows clicking palette
   items rendered in the DOM overlay.

2. **Border drag**: If the click lands on a resize border, start a `DragState`
   recording the border and the starting position.

3. **Tab bar click**: If the click is in the titlebar area (top N pixels), check
   if it lands on a tab.  If so, focus that pane.

4. **Window drag**: If the click is in the titlebar but not on a tab, or in the
   chrome gap area between panes, initiate a window drag (`w.drag_window()`).

5. **Pane focus**: If the click is inside a pane, focus that pane and give
   native focus to its webview for keyboard input.

**On release:**

If a drag is active, clear `drag_state` and reset the cursor to `Default`.

### Modifier State (`ModifiersChanged`)

The `ModifiersState` from winit is stored on `self.modifiers` and read when
building `Modifiers` for `InputProcessor::process_key()`.

**Source**: `jarvis-rs/crates/jarvis-app/src/app_state/event_handler.rs`

---

## Modifier Key Tracking

Modifier state is tracked via the `WindowEvent::ModifiersChanged` event from
winit.  The raw `ModifiersState` is stored on `JarvisApp.modifiers` and
queried each time a `KeyboardInput` event fires:

```rust
let mods = Modifiers {
    ctrl: self.modifiers.control_key(),
    alt: self.modifiers.alt_key(),
    shift: self.modifiers.shift_key(),
    super_key: self.modifiers.super_key(),
};
```

These booleans are passed to `InputProcessor::process_key()`, which constructs
a `KeyCombo::from_winit()` with the modifier bitmask for registry lookup.

The `Modifiers` struct is a simple bundle:

```rust
pub struct Modifiers {
    pub ctrl: bool,
    pub alt: bool,
    pub shift: bool,
    pub super_key: bool,
}
```

There is no debouncing or synthetic modifier tracking -- winit delivers
accurate modifier state per-event.

**Source**: `jarvis-rs/crates/jarvis-platform/src/input_processor/types.rs`

---

## Terminal Key Encoding

When a key press does not match any keybind and the input mode is `Terminal`,
the `InputProcessor` encodes the key into terminal escape sequences via
`encode_key_for_terminal()`.

### Encoding Table

| Key | No Modifier | Ctrl | Alt |
|-----|-------------|------|-----|
| `Enter` | `\r` | `\r` | `ESC \r` |
| `Backspace` | `\x7f` (DEL) | `\x7f` | `ESC \x7f` |
| `Tab` | `\t` | `\t` | `\t` |
| `Escape` | `\x1b` | `\x1b` | `\x1b` |
| `Space` | `" "` | `" "` | `ESC " "` |
| `Delete` | `ESC[3~` | -- | -- |
| `Insert` | `ESC[2~` | -- | -- |
| `Up` | `ESC[A` | -- | -- |
| `Down` | `ESC[B` | -- | -- |
| `Right` | `ESC[C` | -- | -- |
| `Left` | `ESC[D` | -- | -- |
| `Home` | `ESC[H` | -- | -- |
| `End` | `ESC[F` | -- | -- |
| `PageUp` | `ESC[5~` | -- | -- |
| `PageDown` | `ESC[6~` | -- | -- |
| `F1`-`F4` | `ESC O P/Q/R/S` | -- | -- |
| `F5`-`F12` | `ESC[15~` through `ESC[24~` | -- | -- |
| `A`-`Z` (letter) | Letter byte | Ctrl byte (1-26) | `ESC` + letter byte |
| `[` | `[` | `ESC` (0x1b) | -- |
| `\` | `\` | 0x1c (FS) | -- |
| `]` | `]` | 0x1d (GS) | -- |
| Other single char | Char byte | -- | `ESC` + char byte |

### Bracketed Paste

The `InputProcessor` supports bracketed paste mode.  When enabled
(`set_bracketed_paste(true)`), pasted text is wrapped in DCS markers:

```
\x1b[200~  <pasted text>  \x1b[201~
```

This allows terminal applications to distinguish pasted text from typed input.

**Source**: `jarvis-rs/crates/jarvis-platform/src/input_processor/encoding.rs`

# Chapter 8: Plugin System

The Jarvis plugin system lets you build custom panels, tools, and web applications that run inside Jarvis with full access to the IPC bridge. Plugins appear in the command palette and load as webview panes -- the same mechanism that powers built-in panels like Settings, Chat, and Games.

This chapter covers everything you need to know to configure, create, and debug plugins.

---

## 8.1 Overview

The plugin system is organized into two tiers, each with different capabilities and complexity:

| Tier | What it is | Where it lives | What it can do |
|------|-----------|----------------|----------------|
| **Bookmark** | A named URL | `config.toml` | Opens any website in a Jarvis pane |
| **Local Plugin** | HTML/JS/CSS folder | `~/.config/jarvis/plugins/` | Full `jarvis://` protocol + IPC bridge |

**Bookmark plugins** are the simplest form: a name, a URL, and an optional category, all declared in your configuration file. They require no files on disk and load any website directly in a Jarvis pane.

**Local plugins** are full HTML/JS/CSS applications that live in a folder on your filesystem. They are served through the `jarvis://` custom protocol, have access to the IPC bridge (`window.jarvis.ipc`), and can communicate bidirectionally with the Rust backend.

Both tiers appear as entries in the command palette. Selecting a plugin navigates the focused pane to the plugin's content. Pressing Escape returns the pane to its previous state.

---

## 8.2 Bookmark Plugins

### 8.2.1 Configuration Format

Bookmark plugins are defined in `config.toml` using the `[[plugins.bookmarks]]` array-of-tables syntax. Each entry supports three fields:

| Field | Type | Required | Default | Description |
|-------|------|----------|---------|-------------|
| `name` | string | Yes | `""` | Display name in the command palette |
| `url` | string | Yes | `""` | URL to open (any valid `https://` or `http://` URL) |
| `category` | string | No | `"Plugins"` | Palette category for grouping |

Bookmarks with an empty `name` or empty `url` are silently skipped during palette injection. This behavior is enforced in the `inject_plugin_items` function, which checks:

```rust
for bm in &self.config.plugins.bookmarks {
    if bm.name.is_empty() || bm.url.is_empty() {
        continue;
    }
    // ... create palette entry
}
```

### 8.2.2 Examples

A single bookmark:

```toml
[[plugins.bookmarks]]
name = "Spotify"
url = "https://open.spotify.com"
category = "Music"
```

Multiple bookmarks across categories:

```toml
[[plugins.bookmarks]]
name = "Spotify"
url = "https://open.spotify.com"
category = "Music"

[[plugins.bookmarks]]
name = "GitHub"
url = "https://github.com"
category = "Dev"

[[plugins.bookmarks]]
name = "Figma"
url = "https://figma.com"
category = "Design"

[[plugins.bookmarks]]
name = "Hacker News"
url = "https://news.ycombinator.com"
category = "News"
```

### 8.2.3 Categories

The `category` field controls how the bookmark appears in the command palette. When the palette is open and no search query is active, items are grouped under category headers. Common categories include:

- `"Music"` -- streaming and audio services
- `"Dev"` -- development tools and repositories
- `"Design"` -- design and prototyping tools
- `"Productivity"` -- task management and documentation
- `"News"` -- news aggregators and feeds

If `category` is omitted, the bookmark falls under the default `"Plugins"` category. You can use any string as a category name.

### 8.2.4 How Bookmarks Load

When a user selects a bookmark from the command palette, Jarvis dispatches `Action::OpenURL` with the bookmark's URL. The dispatch handler:

1. Normalizes the URL (auto-prepends `https://` if no scheme is present).
2. Saves the current URL of the focused pane (so Escape can return to it).
3. Navigates the focused pane's webview to the bookmark URL.

The navigation handler permits all `https://` and `http://` URLs, so bookmarks can point to any public website.

## 8.3 Local Plugins

### 8.3.1 Folder Structure

Local plugins live in the platform-specific plugins directory:

| OS | Plugins directory |
|----|-------------------|
| macOS | `~/Library/Application Support/jarvis/plugins/` or `~/.config/jarvis/plugins/` |
| Linux | `~/.config/jarvis/plugins/` |
| Windows | `%APPDATA%\jarvis\plugins\` |

The directory is resolved by the `plugins_dir()` function, which uses `dirs::config_dir()` and appends `jarvis/plugins`:

```rust
pub fn plugins_dir() -> Option<PathBuf> {
    let config_dir = dirs::config_dir()?;
    Some(config_dir.join("jarvis").join("plugins"))
}
```

Each plugin occupies its own subfolder. The folder name becomes the plugin's **ID** and is used in URLs:

```
jarvis://localhost/plugins/{folder-name}/{file}
```

A typical plugin folder looks like this:

```
~/.config/jarvis/plugins/
  my-plugin/
    plugin.toml          # Required: manifest file
    index.html           # Entry point (configurable)
    style.css            # Optional: stylesheets
    app.js               # Optional: scripts
    assets/              # Optional: images, fonts, etc.
      icon.png
      sounds/
        click.mp3
```

### 8.3.2 The Manifest: plugin.toml

Every local plugin requires a `plugin.toml` file in its root folder. The manifest is deserialized into an internal `Manifest` struct with these fields:

| Field | Type | Required | Default | Description |
|-------|------|----------|---------|-------------|
| `name` | string | No | Folder name | Display name in the command palette |
| `category` | string | No | `"Plugins"` | Palette category for grouping |
| `entry` | string | No | `"index.html"` | Entry point HTML file |

All fields are optional. A completely empty `plugin.toml` is valid -- the plugin will use the folder name as its display name, `"Plugins"` as its category, and `index.html` as its entry point.

**Minimal valid manifest:**

```toml
name = "My Timer"
```

**Full manifest:**

```toml
name = "Project Dashboard"
category = "Productivity"
entry = "app.html"
```

When the `name` field is empty or omitted, the discovery logic falls back to the folder name:

```rust
let name = if m.name.is_empty() {
    id.clone()
} else {
    m.name
};
```

### 8.3.3 Discovery

Plugin discovery is performed by the `discover_local_plugins()` function. This function is called at startup and whenever `ReloadConfig` is dispatched. The discovery algorithm:

1. Reads all entries in the plugins directory using `std::fs::read_dir`.
2. Skips any entry that is not a directory.
3. For each directory, checks for the existence of `plugin.toml`.
4. Reads and parses the manifest file.
5. Constructs a `LocalPlugin` struct with the folder name as `id`, the parsed `name` (or folder name as fallback), `category`, and `entry`.

Directories without a `plugin.toml` are silently ignored. Manifests that fail to parse produce a warning log:

```
Failed to parse plugin manifest (plugin: "my-plugin", error: ...)
```

Manifests that cannot be read from disk also produce a warning:

```
Failed to read plugin manifest (plugin: "my-plugin", error: ...)
```

After discovery, each plugin directory is registered with the `ContentProvider`:

```rust
content_provider.add_plugin_dir("my-plugin", "/path/to/my-plugin");
```

This registration maps the plugin ID to its filesystem path, enabling the custom protocol handler to serve the plugin's files.

### 8.3.4 The LocalPlugin Data Type

The `LocalPlugin` struct, defined in `jarvis-config/src/schema/plugins.rs`, carries the resolved plugin metadata:

```rust
pub struct LocalPlugin {
    pub id: String,       // Folder name, used in URLs
    pub name: String,     // Display name in palette
    pub category: String, // Palette category grouping
    pub entry: String,    // Entry HTML file (default "index.html")
}
```

Local plugins are stored in `PluginsConfig.local`, which is marked `#[serde(skip)]` because local plugins are discovered from the filesystem at runtime, not deserialized from `config.toml`.

## 8.4 How Plugins Load

Understanding the complete loading flow helps when debugging or building more advanced plugins:

```
1. Jarvis starts (or ReloadConfig is dispatched)
       |
2. discover_local_plugins() scans ~/.config/jarvis/plugins/
   - Lists subdirectories
   - Reads plugin.toml from each
   - Builds LocalPlugin { id, name, category, entry }
       |
3. Each plugin dir is registered with the ContentProvider
   content_provider.add_plugin_dir("my-plugin", "/path/to/my-plugin")
       |
4. User opens command palette (Cmd+Shift+P / Ctrl+Shift+P)
       |
5. inject_plugin_items() creates palette entries:
   - Bookmarks  -> Action::OpenURL("https://...")
   - Local      -> Action::OpenURL("jarvis://localhost/plugins/{id}/{entry}")
       |
6. User selects a plugin from the palette
       |
7. dispatch(Action::OpenURL(url))
   - The focused pane's webview navigates to the URL
   - The previous URL is saved in game_active (so Escape can go back)
       |
8. WebView requests jarvis://localhost/plugins/my-plugin/index.html
       |
9. Custom protocol handler -> ContentProvider.resolve()
   - Looks up "my-plugin" in plugin_dirs
   - Reads the file from disk
   - Performs containment check (directory traversal protection)
   - Returns 200 with correct MIME type
       |
10. Plugin HTML loads with the IPC bridge already injected
    (window.jarvis.ipc is available immediately)
       |
11. User presses Escape -> navigates back to the previous page
```

The `OpenURL` dispatch handler in `dispatch.rs` implements the navigation and back-navigation tracking:

```rust
Action::OpenURL(ref url) => {
    let normalized = if !url.contains("://") {
        format!("https://{}", url)
    } else {
        url.clone()
    };
    let pane_id = self.tiling.focused_id();
    if let Some(ref mut registry) = self.webviews {
        if let Some(handle) = registry.get_mut(pane_id) {
            let original_url = handle.current_url().to_string();
            if let Err(e) = handle.load_url(&normalized) {
                tracing::warn!(error = %e, url = %normalized, "Failed to open URL");
            } else {
                self.game_active.insert(pane_id, original_url);
            }
        }
    }
}
```

The `game_active` map stores the previous URL for each pane, enabling Escape to restore the original content.

## 8.5 Plugin Development Guide

### 8.5.1 Step-by-Step: Creating a Plugin

**Step 1: Create the plugin folder.**

```bash
# Linux/macOS
mkdir -p ~/.config/jarvis/plugins/hello-world

# Windows (PowerShell)
mkdir "$env:APPDATA\jarvis\plugins\hello-world"
```

**Step 2: Create the manifest.**

Create `plugin.toml` in the plugin folder:

```toml
name = "Hello World"
category = "Tools"
```

**Step 3: Create the entry point.**

Create `index.html` in the plugin folder:

```html
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: transparent;
      color: var(--color-text, #cdd6f4);
      font-family: var(--font-ui, sans-serif);
      font-size: var(--font-ui-size, 13px);
    }
    h1 { color: var(--color-primary, #cba6f7); }
    button {
      background: var(--color-primary, #cba6f7);
      color: var(--color-background, #1e1e2e);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Hello from a Jarvis Plugin!</h1>
  <p>This is running inside the jarvis:// protocol with full IPC access.</p>
  <button onclick="ping()">Ping Jarvis</button>
  <p id="result"></p>

  <script>
    async function ping() {
      window.jarvis.ipc.send('ping', {});
      window.jarvis.ipc.on('pong', () => {
        document.getElementById('result').textContent = 'Pong received!';
      });
    }
  <\/script>
</body>
</html>
```

**Step 4: Load the plugin.**

Open the command palette and select "Reload Config". Your plugin appears under the "Tools" category. Select "Hello World" and it loads in the focused pane.

### 8.5.2 Development Workflow

The recommended development workflow is:

1. Edit your plugin files (HTML, JS, CSS) in your editor of choice.
2. Switch to Jarvis and press `Cmd+R` (macOS) or `Ctrl+R` (Windows/Linux) to refresh the webview in-place.
3. Repeat.

Since plugin files are read from disk on every request, changes take effect immediately without restarting Jarvis. No build step is required.

If you add, remove, or rename a plugin folder, or change `plugin.toml`, you need to trigger "Reload Config" from the command palette.

## 8.6 The IPC Bridge API

Every webview in Jarvis -- including plugins -- receives the IPC bridge automatically. It is injected as an initialization script (`IPC_INIT_SCRIPT`) that runs before any page scripts. The bridge is available at `window.jarvis.ipc`.

### 8.6.1 Core Methods

**`send(kind, payload)`** -- Fire-and-forget message to Rust.

```javascript
window.jarvis.ipc.send('clipboard_copy', { text: 'Hello from my plugin!' });
```

Internally, `send` serializes `{ kind, payload }` as JSON and posts it via `window.ipc.postMessage`.

**`on(kind, callback)`** -- Register a handler for messages from Rust.

```javascript
window.jarvis.ipc.on('pong', (payload) => {
  console.log('Got pong:', payload);
});
```

You can register one handler per message kind. Calling `on` again for the same kind replaces the previous handler.

**`request(kind, payload)`** -- Send a request and await a response. Returns a `Promise`.

```javascript
try {
  const result = await window.jarvis.ipc.request('clipboard_paste', {});
  if (result.kind === 'text') {
    console.log('Clipboard text:', result.text);
  } else if (result.kind === 'image') {
    console.log('Clipboard image:', result.data_url);
  }
} catch (err) {
  console.error('Request failed:', err);
}
```

Under the hood, `request` assigns a unique `_reqId` to the payload, sends the message, and returns a Promise that resolves when Rust sends back a response containing the same `_reqId`. The request has a **10-second timeout** -- if no response arrives, the Promise rejects with an `Error('IPC request timeout')`.

**`postMessage(msg)`** -- Low-level: sends a raw object. Prefer `send()` which wraps your payload with the `{ kind, payload }` structure that the Rust side expects.

### 8.6.2 Checking Bridge Availability

The bridge is available as soon as your script runs. There is no `DOMContentLoaded` race because the initialization script runs before your page's scripts. However, if you want to be defensive:

```javascript
if (window.jarvis && window.jarvis.ipc) {
  // IPC bridge is ready
  window.jarvis.ipc.send('ping', {});
}
```

### 8.6.3 Request-Response Internals

The request-response pattern works as follows:

1. JavaScript calls `request(kind, payload)`.
2. The bridge assigns `payload._reqId = N` (incrementing integer).
3. The message is sent to Rust via `send`.
4. Rust processes the request and sends a response IPC message back to the webview, including `_reqId: N` in the payload.
5. The bridge's augmented `_dispatch` function checks incoming messages for `_reqId`. If found, it resolves (or rejects, if `payload.error` is present) the matching pending Promise.
6. If no `_reqId` match is found, the message is passed to the regular `on` handler.

## 8.7 Available IPC Messages

### 8.7.1 Messages You Can Send (JS to Rust)

| Kind | Payload | Behavior |
|------|---------|----------|
| `ping` | `{}` | Health check. Rust replies with `pong`. |
| `clipboard_copy` | `{ text: "..." }` | Copy text to the system clipboard. |
| `clipboard_paste` | `{}` | **Request-response.** Returns clipboard contents as `{ kind: "text", text }` or `{ kind: "image", data_url }`. |
| `open_url` | `{ url: "https://..." }` | Navigate the current pane to a URL. URLs without a scheme get `https://` prepended. |
| `launch_game` | `{ game: "tetris" }` | Launch a built-in game in the current pane. |
| `open_settings` | `{}` | Open the Settings panel. |
| `open_panel` | `{ kind: "terminal" }` | Open a new panel of the given kind. |
| `panel_close` | `{}` | Close the current panel (will not close the last one). |
| `read_file` | `{ path: "..." }` | **Request-response.** Read an image file from disk. Returns `{ data_url }` (base64 data URL) or `{ error }`. Maximum file size: 5 MB. Supports `~/` expansion. Only recognized image formats (PNG, JPEG, GIF, WebP, BMP) are accepted. |
| `pty_input` | `{ data: "..." }` | Send input to the terminal PTY (if this pane has one). |
| `keybind` | `{ key, ctrl, alt, shift, meta }` | Simulate a keybind press. |
| `window_drag` | `{}` | Start dragging the window (for custom titlebars). |
| `debug_event` | `{ type, ...data }` | Log structured data to the Rust `tracing::info!` output. |

### 8.7.2 Messages You Can Receive (Rust to JS)

| Kind | Payload | When |
|------|---------|------|
| `pong` | `"pong"` | After you send `ping`. |
| `palette_show` | `{ items, query, selectedIndex, mode, placeholder }` | Command palette opens (handled automatically by the injected script). |
| `palette_update` | `{ items, query, selectedIndex, mode, placeholder }` | Command palette state changes (handled automatically). |
| `palette_hide` | `{}` | Command palette closes (handled automatically). |

The palette messages are handled by the injected command palette overlay system. You do not need to handle them in your plugin unless you want to customize the palette behavior.

For request-response messages (`clipboard_paste`, `read_file`), the response arrives through the Promise returned by `ipc.request()`, not through `ipc.on()`.

## 8.8 Keyboard and Input Handling

### 8.8.1 How Keyboard Events Work

Keyboard events in plugins follow a layered interception model:

1. **Overlay mode.** When the command palette or assistant is open, ALL keyboard input is captured by the overlay. Your plugin receives no key events during this time. The IPC bridge forwards every keystroke to Rust for overlay handling.

2. **Command keys (Cmd/Ctrl+key).** Most Cmd+key combinations are intercepted by the IPC bridge's capture-phase `keydown` listener and forwarded to Rust as `keybind` messages. This is how Cmd+T (new pane), Cmd+W (close pane), and other shortcuts work even when a plugin is focused.

3. **Escape key.** Always forwarded to Rust. If the pane is showing a plugin or other non-terminal content (tracked in `game_active`), Escape navigates back to the previous page.

4. **Normal mode.** All other keyboard input goes to your plugin's webview normally. Standard HTML elements like `<input>`, `<textarea>`, and custom key handlers work as expected.

### 8.8.2 Keys That Pass Through

These Cmd+key combinations are NOT intercepted and reach your plugin normally:

- `Cmd+R` / `Ctrl+R` -- useful for refreshing the plugin during development
- `Cmd+L` / `Ctrl+L`
- `Cmd+Q` / `Ctrl+Q`
- `Cmd+A` / `Ctrl+A` -- select all
- `Cmd+X` / `Ctrl+X` -- cut
- `Cmd+Z` / `Ctrl+Z` -- undo

### 8.8.3 Handling Escape in Your Plugin

If your plugin has modal dialogs or internal states that should close on Escape, handle it before the IPC bridge does:

```javascript
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (myModalIsOpen) {
      closeMyModal();
      e.stopPropagation();  // Attempt to prevent bridge from forwarding
      return;
    }
    // Otherwise, Escape navigates back to the previous page
  }
});
```

Note that `e.stopPropagation()` may not prevent the bridge from seeing Escape in all cases, since the bridge uses a capture-phase listener. If you need full Escape control, structure your plugin so that Escape-to-exit is acceptable behavior.

### 8.9.2 Transparent Backgrounds

The webview background is transparent by default. Set your `body` background to `transparent` or use the theme variables:

body {

This CSS template provides a solid starting point for any plugin:

```css
* { box-sizing: border-box; margin: 0; padding: 0; }

  color: var(--color-text, #cdd6f4);

}

  color: var(--color-background, #1e1e2e);

  padding: 6px 14px;
  border-radius: calc(var(--border-radius, 8px) / 2);

}

  background: var(--color-background, #1e1e2e);
  color: var(--color-text, #cdd6f4);
  border: 1px solid var(--color-border, #181825);

Always provide fallback values in your `var()` declarations (e.g., `var(--color-primary, #cba6f7)`) so the plugin renders correctly even if theme injection has not yet occurred.

### 8.9.4 Detecting Theme Changes Programmatically

If your plugin uses a canvas or other non-CSS rendering, you can watch for theme changes:

```javascript
const observer = new MutationObserver(() => {
  const primary = getComputedStyle(document.documentElement)
    .getPropertyValue('--color-primary').trim();
  updateMyCanvas(primary);
});
observer.observe(document.documentElement, {
  attributes: true,
  attributeFilter: ['style']
});
```

## 8.10 Asset Loading and MIME Types

### 8.10.1 Referencing Assets

Your plugin can include any static assets. Reference them with relative paths in your HTML:

```html

<link rel="stylesheet" href="style.css">
<script src="app.js"><\/script>
<img src="assets/logo.png">
<audio src="assets/notification.mp3"></audio>
```

Relative paths work because the browser resolves them against the current URL (`jarvis://localhost/plugins/my-plugin/index.html`).

### 8.10.2 Supported MIME Types

The `ContentProvider` determines MIME types by file extension using the `mime_from_extension` function. The complete mapping:

| Extension | MIME Type |
|-----------|-----------|
| `.html`, `.htm` | `text/html` |
| `.css` | `text/css` |
| `.js`, `.mjs` | `application/javascript` |
| `.json` | `application/json` |
| `.png` | `image/png` |
| `.jpg`, `.jpeg` | `image/jpeg` |
| `.gif` | `image/gif` |
| `.svg` | `image/svg+xml` |
| `.webp` | `image/webp` |
| `.wasm` | `application/wasm` |
| `.ico` | `image/x-icon` |
| `.woff` | `font/woff` |
| `.woff2` | `font/woff2` |
| `.ttf` | `font/ttf` |
| `.otf` | `font/otf` |
| `.mp3` | `audio/mpeg` |
| `.ogg` | `audio/ogg` |
| `.wav` | `audio/wav` |
| `.mp4` | `video/mp4` |
| `.webm` | `video/webm` |
| `.txt` | `text/plain` |
| `.xml` | `application/xml` |
| (other) | `application/octet-stream` |

Files with unrecognized extensions are served as `application/octet-stream`, which may not render correctly in the webview.

### 8.10.3 External Resources

Plugins can load resources from the web. The navigation handler permits all `https://` and `http://` URLs:

```html
<!-- CDN libraries work fine -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter">
```

Standard browser CORS rules apply to `fetch()` and `XMLHttpRequest` calls.

### 8.10.4 WebAssembly

`.wasm` files are served with the correct `application/wasm` MIME type, enabling you to load WebAssembly modules:

```javascript
const response = await fetch('jarvis://localhost/plugins/my-plugin/engine.wasm');
const { instance } = await WebAssembly.instantiateStreaming(response);
```

## 8.11 Security Model

### 8.11.1 Directory Traversal Protection

Plugin assets are sandboxed to their own folder. The `ContentProvider` enforces this by canonicalizing both the plugin's base path and the requested file path, then verifying the file path starts with the base path:

```rust
fn resolve_plugin_asset(&self, plugin_id: &str, asset_path: &str)
    -> Option<(Cow<'_, str>, Cow<'_, [u8]>)>
{
    let plugin_base = { /* look up plugin directory */ };
    let file_path = plugin_base.join(asset_path);

    // Containment check: canonicalize both to prevent traversal
    let canonical_base = std::fs::canonicalize(&plugin_base).ok()?;
    let canonical_file = std::fs::canonicalize(&file_path).ok()?;
    if !canonical_file.starts_with(&canonical_base) {
        return None;  // Blocked: path escapes plugin directory
    }

    // ... read and serve file
}
```

This prevents all forms of directory traversal:

```
jarvis://localhost/plugins/my-plugin/../../etc/passwd             -> 404
jarvis://localhost/plugins/my-plugin/../other-plugin/secret.json  -> 404
```

Symlinks that escape the plugin directory are also blocked because `std::fs::canonicalize` resolves symlinks to their real paths before the containment check.

### 8.11.2 Navigation Allowlist

The webview navigation handler enforces a strict allowlist for non-HTTP(S) schemes. Only these URL patterns are permitted:

| Prefix | Purpose |
|--------|---------|
| `jarvis://` | Custom protocol for bundled and plugin assets |
| `http://jarvis.localhost` | WebView2 (Windows) rewrite of `jarvis://` |
| `about:blank` | Default empty page |
| `https://` | All HTTPS URLs (permitted by the handler directly) |
| `http://` | All HTTP URLs (permitted by the handler directly) |

The following are explicitly blocked:

- `file://` -- direct filesystem access
- `javascript:` -- script execution via URL
- `data:` -- data URLs for navigation
- `ftp://` -- FTP protocol
- Any other unrecognized scheme

### 8.11.3 IPC Allowlist

All IPC messages from JavaScript are validated against a strict allowlist before processing. The complete list of accepted `kind` values:

```
pty_input          pty_resize        pty_restart       terminal_ready
panel_focus        presence_request_users              presence_poke
settings_init      settings_set_theme                  settings_update
settings_reset_section               settings_get_config
assistant_input    assistant_ready
open_panel         panel_close       panel_toggle      open_settings
status_bar_init    launch_game
ping               boot_complete     crypto            window_drag
keybind            read_file
clipboard_copy     clipboard_paste   open_url
palette_click      palette_hover     palette_dismiss
debug_event
```

Any message with a `kind` not in this list is **silently dropped** with a warning log:

```
IPC message rejected: unknown kind (pane_id: 1, kind: "exec")
```

The allowlist check is case-sensitive. `"PTY_INPUT"` is rejected. Injection attempts like `"ping; rm -rf /"` or `"<script>alert(1)<\/script>"` are also rejected.

Additionally, the IPC handler validates that the raw message body is valid JSON before forwarding it to the dispatch layer.

### 8.11.4 What Plugins CAN Do

- Read and write the system clipboard (via `clipboard_copy` and `clipboard_paste` IPC messages)
- Navigate the current pane to any URL
- Make HTTP requests to any origin (standard browser CORS rules apply)
- Load any `https://` resource
- Read image files from disk (via the `read_file` IPC message, limited to 5 MB, image formats only)
- Send input to the terminal PTY
- Open and close panels
- Use localStorage for persistence (scoped to `jarvis://localhost` origin)
- Start window drag operations
- Log debug events to the Rust log

### 8.11.5 What Plugins CANNOT Do

- Access the `file://` protocol directly
- Execute `javascript:` URLs
- Use `data:` URLs for navigation
- Access other plugins' files via path traversal
- Bypass the IPC allowlist (unknown message kinds are rejected)
- Read arbitrary files from disk (only recognized image formats via `read_file`)
- Execute arbitrary system commands

## 8.12 Hot Reload

### 8.12.1 Bookmark Plugins

Edit your `config.toml`, then trigger "Reload Config" from the command palette. Bookmark changes take effect immediately the next time the palette is opened.

### 8.12.2 Local Plugin Files (HTML/JS/CSS)

Since files are read from disk on every request by the `ContentProvider`, changes to your plugin's source files take effect the next time the plugin is loaded. You can:

1. Press Escape to go back to the terminal, then re-open the plugin from the palette.
2. Press `Cmd+R` / `Ctrl+R` to refresh the webview in-place (this key is not intercepted by Jarvis).

Option 2 is the fastest workflow during development.

### 8.12.3 Adding or Removing Plugins

Create or delete the plugin folder under `~/.config/jarvis/plugins/`, then trigger "Reload Config" from the command palette. The discovery runs again, the `ContentProvider`'s plugin directory map is cleared and rebuilt, and the palette updates accordingly.

The reload logic in `dispatch.rs`:

```rust
Action::ReloadConfig => {
    // ...
    if let Some(ref dirs_handle) = self.plugin_dirs {
        if let Ok(mut dirs) = dirs_handle.write() {
            dirs.clear();
            if let Some(plugins_base) = plugins_dir() {
                for lp in &c.plugins.local {
                    dirs.insert(lp.id.clone(), plugins_base.join(&lp.id));
                }
            }
        }
    }
    // ...
}
```

### 8.12.4 Editing plugin.toml

Changes to the manifest (name, category, entry) require a "Reload Config" to take effect in the palette, since the manifest is only read during discovery.

## 8.13 Debugging Plugins

### 8.13.1 DevTools

In debug builds (`cargo build` without `--release`), DevTools are enabled for all webviews. The `WebViewConfig` defaults to `devtools: cfg!(debug_assertions)`. Right-click inside your plugin and select "Inspect Element" to open the developer tools.

In release builds, DevTools are disabled by default. Enable them by setting:

```toml
[advanced.developer]
inspector_enabled = true
```

### 8.13.2 Console Logging

Standard `console.log`, `console.warn`, and `console.error` work in DevTools:

```javascript
console.log('Plugin loaded, IPC available:', !!window.jarvis?.ipc);
```

### 8.13.3 Debug Events

Send structured debug events to the Rust log:

```javascript
window.jarvis.ipc.send('debug_event', {
  type: 'my_plugin_state',
  data: { count: 42, status: 'running' }
});
```

These appear in the Jarvis log output as `tracing::info!` entries:

```
[JS] webview event (pane_id: 1, event: {"type":"my_plugin_state","data":{"count":42,"status":"running"}})
```

### 8.13.4 Ping/Pong Test

Verify the IPC bridge is working:

```javascript
window.jarvis.ipc.on('pong', () => console.log('IPC bridge works!'));
window.jarvis.ipc.send('ping', {});
```

### 8.13.5 Built-in Diagnostic Logging

The IPC bridge automatically sends diagnostic events for certain DOM events. During development, you can observe these in the Rust log:

- `mousedown` events (with coordinates and target element)
- `keydown` events (with key, code, and modifier state)
- `focus` and `blur` events

These are sent as `debug_event` IPC messages by the initialization script.

## 8.14 Vibe Coding a Plugin with AI

The plugin system is designed to be AI-friendly: single-file HTML plugins with an injected bridge API and CSS variables. Here is how to build plugins with Claude, ChatGPT, Cursor, or any AI coding assistant.

### 8.14.1 The Prompt Template

Give your AI this context and ask it to build what you need:

```
I'm building a plugin for Jarvis, a terminal/desktop app with a webview plugin system.

Plugin structure:
- Folder at ~/.config/jarvis/plugins/my-plugin/
- plugin.toml with: name, category, entry (defaults to index.html)
- HTML/JS/CSS files served via jarvis:// protocol

The IPC bridge (available as window.jarvis.ipc):
- send(kind, payload) -- fire-and-forget message to Rust
- on(kind, callback) -- listen for messages from Rust
- request(kind, payload) -- returns Promise for request-response

Useful IPC messages:
- clipboard_copy: { text } -- copy to clipboard
- clipboard_paste: {} -- request clipboard contents
- open_url: { url } -- navigate to URL
- ping: {} -- health check (replies with 'pong')
- read_file: { path } -- read an image file from disk

CSS variables available from the Jarvis theme:
--color-primary, --color-background, --color-panel-bg, --color-text,
--color-text-muted, --color-border, --color-success, --color-warning,
--color-error, --font-family, --font-ui, --font-size, --border-radius

The webview background is transparent. Use var(--color-panel-bg) for a glass effect.

Build me: [DESCRIBE WHAT YOU WANT]

Requirements:
- Single index.html file (inline CSS and JS is fine)
- Use the CSS variables so it matches the Jarvis theme
- Use window.jarvis.ipc for any system interaction
```

### 8.14.2 Example AI Prompts

**Sticky notes plugin:**

```
Build me a sticky notes plugin. Notes should be stored in localStorage.
I want to create, edit, and delete notes. Each note should have a
title and body. Use a grid layout. Match the Jarvis dark theme.
```

**JSON formatter:**

```
Build me a JSON formatter/viewer plugin. Paste or type JSON on the left,
see formatted output on the right. Add syntax highlighting. Include a
"Copy" button that uses the clipboard IPC. Handle invalid JSON gracefully.
```

**System dashboard:**

```
Build me a system dashboard plugin that shows the current time,
a stopwatch, and a countdown timer. Add keyboard shortcuts
(S for stopwatch start/stop, R for reset). Use large monospace numbers.
```

### 8.14.3 Tips for AI-Assisted Development

1. **Start with one file.** Tell the AI to put everything in `index.html` with inline `<style>` and `<script>`. Split into separate files later if needed.

2. **Share the CSS variables list.** AI tools produce much better-looking results when they know the exact variable names and their defaults.

3. **Mention `window.jarvis.ipc` explicitly.** This tells the AI how to interact with the system -- otherwise it might try to use `fetch()` to a nonexistent API server.

4. **Iterate fast.** Save the file, `Cmd+R` to refresh, repeat. No build step needed.

5. **Use localStorage for persistence.** Plugins do not have a database, but `localStorage` persists across loads. The storage is scoped to the `jarvis://localhost` origin, so all plugins share the same localStorage namespace. Prefix your keys with your plugin ID to avoid collisions:

```javascript
// Good: namespaced key
localStorage.setItem('my-timer:sessions', JSON.stringify(sessions));

// Bad: might collide with other plugins
localStorage.setItem('sessions', JSON.stringify(sessions));
```
