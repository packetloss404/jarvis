# Terminal & Shell Subsystem

This document describes the architecture and behavior of the Jarvis terminal
emulation subsystem: how keystrokes flow from the user to a shell process and
back, how the terminal is configured, and how multiple terminal panes are
managed.

---

## 1. Architecture Overview

The terminal is a split-process design:

```
 +---------------------------+         IPC (JSON)        +-------------------+
 |   WebView (xterm.js)      | <======================> |    Rust Backend    |
 |  - Terminal rendering     |   pty_input / pty_output  | - PTY management  |
 |  - Keyboard capture       |   pty_resize / pty_exit   | - Shell spawning  |
 |  - Selection / clipboard  |   terminal_ready          | - I/O bridging    |
 +---------------------------+                           +-------------------+
         ^                                                        |
         |  DOM events                                            | portable-pty
         v                                                        v
     User's keyboard                                      OS PTY + Shell
```

**Frontend**: xterm.js v5.5.0 running inside a per-pane WebView panel. The
terminal HTML is served from a bundled asset at
`jarvis://localhost/terminal/index.html`. xterm.js handles all rendering,
cursor display, scrollback, selection, and ANSI/VT processing on the
JavaScript side.

**Backend**: The `portable-pty` crate provides cross-platform pseudo-terminal
support. Each terminal pane gets its own PTY master/slave pair with a
dedicated reader thread. The Rust `PtyManager` (keyed by pane ID) owns all
active PTY handles.

**Bridge**: The `jarvis-webview` crate provides a JSON-over-IPC bridge
(`window.jarvis.ipc`) that connects the two halves. Messages flow
bidirectionally through this bridge.

### Key source files

| Component | File |
|---|---|
| PTY bridge module | `jarvis-rs/crates/jarvis-app/src/app_state/pty_bridge/mod.rs` |
| PTY spawn logic | `jarvis-rs/crates/jarvis-app/src/app_state/pty_bridge/spawn.rs` |
| PTY I/O + resize + kill | `jarvis-rs/crates/jarvis-app/src/app_state/pty_bridge/io.rs` |
| PTY types (PtyHandle, PtyManager) | `jarvis-rs/crates/jarvis-app/src/app_state/pty_bridge/types.rs` |
| IPC handlers for PTY messages | `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/pty_handlers.rs` |
| PTY output polling + broadcast | `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/pty_polling.rs` |
| IPC dispatch (allowlist + routing) | `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/ipc_dispatch.rs` |
| Terminal panel HTML/JS | `jarvis-rs/assets/panels/terminal/index.html` |
| IPC protocol + init script | `jarvis-rs/crates/jarvis-webview/src/ipc.rs` |
| Shell config schema | `jarvis-rs/crates/jarvis-config/src/schema/shell.rs` |
| Terminal config schema | `jarvis-rs/crates/jarvis-config/src/schema/terminal.rs` |
| Theme injection for xterm.js | `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/theme_handlers.rs` |
| Key encoding for terminal | `jarvis-rs/crates/jarvis-platform/src/input_processor/encoding.rs` |
| Input processor (mode routing) | `jarvis-rs/crates/jarvis-platform/src/input_processor/processor.rs` |
| WebView lifecycle (create/destroy) | `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/lifecycle.rs` |

---

## 2. Shell Configuration

Shell settings live in `[shell]` in `jarvis.toml`, defined by
`ShellConfig` in `jarvis-rs/crates/jarvis-config/src/schema/shell.rs`.

```toml
[shell]
program = ""                    # Empty = auto-detect
args = []                       # Extra arguments to pass
working_directory = "~/code"    # Initial cwd (~ is expanded)
login_shell = true              # Pass -l on Unix

[shell.env]
EDITOR = "nvim"                 # Extra env vars injected into shell
```

### Fields

| Field | Type | Default | Description |
|---|---|---|---|
| `program` | `String` | `""` (auto-detect) | Shell executable path. Empty string triggers auto-detection. |
| `args` | `Vec<String>` | `[]` | Extra arguments appended to the shell command. |
| `working_directory` | `Option<String>` | `None` (inherit) | Initial working directory. Supports `~` expansion. Falls back to the parent process's cwd if the path does not exist. |
| `env` | `HashMap<String, String>` | `{}` | Additional environment variables injected into the shell. |
| `login_shell` | `bool` | `true` | On Unix, appends `-l` to spawn a login shell (loads `.profile`, `.bash_profile`, etc.). |

### Shell auto-detection

When `program` is empty (the default), the shell is detected at spawn time in
`spawn.rs`:

- **Unix**: Reads `$SHELL`, falls back to `/bin/sh`.
- **Windows**: Reads `$COMSPEC`, falls back to `cmd.exe`.

### Environment sanitization

The PTY spawn logic does **not** inherit the full parent environment. Instead,
it calls `env_clear()` and selectively re-adds only a safe allowlist of
variables to prevent leaking API keys, tokens, or other secrets from the
Jarvis host process into the shell. The allowed variables are:

```
HOME, USER, LOGNAME, SHELL, PATH, TERM, LANG, LC_ALL, LC_CTYPE,
DISPLAY, WAYLAND_DISPLAY, XDG_RUNTIME_DIR, TMPDIR, TMP, TEMP,
USERPROFILE, APPDATA, LOCALAPPDATA, SYSTEMROOT, COMSPEC, HOMEDRIVE, HOMEPATH
```

In addition, `TERM` is always forced to `xterm-256color` regardless of the
inherited value.

Any variables specified in `[shell.env]` are added on top of the inherited
set.

---

## 3. Terminal Configuration

Terminal display settings live in `[terminal]` in `jarvis.toml`, defined by
`TerminalConfig` in `jarvis-rs/crates/jarvis-config/src/schema/terminal.rs`.

```toml
[terminal]
scrollback_lines = 10000
cursor_style = "block"          # "block", "underline", or "beam"
cursor_blink = true
cursor_blink_interval_ms = 500
true_color = true
word_separators = " /\\()\"'-.,:;<>~!@#$%^&*|+=[]{}~?"

[terminal.bell]
visual = true
audio = false
duration_ms = 150

[terminal.mouse]
copy_on_select = false
url_detection = true
click_to_focus = true

[terminal.search]
wrap_around = true
regex = false
case_sensitive = false
```

### Top-level terminal fields

| Field | Type | Default | Description |
|---|---|---|---|
| `scrollback_lines` | `u32` | `10000` | Maximum scrollback buffer lines (valid: 0--100,000). |
| `cursor_style` | `CursorStyle` | `block` | Cursor shape: `block`, `underline`, or `beam`. Note: `beam` maps to xterm.js `"bar"`. |
| `cursor_blink` | `bool` | `true` | Whether the cursor blinks. |
| `cursor_blink_interval_ms` | `u32` | `500` | Blink interval in ms (valid: 100--2000). |
| `true_color` | `bool` | `true` | Enable 24-bit true color support. |
| `word_separators` | `String` | (punctuation set) | Characters treated as word boundaries for double-click selection. |

### Bell sub-config `[terminal.bell]`

| Field | Type | Default | Description |
|---|---|---|---|
| `visual` | `bool` | `true` | Flash the terminal on BEL character. |
| `audio` | `bool` | `false` | Play a sound on BEL character. |
| `duration_ms` | `u32` | `150` | Visual bell flash duration (valid: 50--1000). |

### Mouse sub-config `[terminal.mouse]`

| Field | Type | Default | Description |
|---|---|---|---|
| `copy_on_select` | `bool` | `false` | Automatically copy text to clipboard on mouse selection. |
| `url_detection` | `bool` | `true` | Detect and highlight clickable URLs in terminal output. |
| `click_to_focus` | `bool` | `true` | Focus the terminal pane when clicked. |

### Search sub-config `[terminal.search]`

| Field | Type | Default | Description |
|---|---|---|---|
| `wrap_around` | `bool` | `true` | Wrap search at scrollback boundaries. |
| `regex` | `bool` | `false` | Enable regex search by default. |
| `case_sensitive` | `bool` | `false` | Case-sensitive search by default. |

### Theme integration

Terminal settings (`cursor_style`, `cursor_blink`, `scrollback_lines`) plus
font settings and color palette are bundled into a single `theme` IPC message
and dispatched to xterm.js when:

1. The terminal WebView first loads (via `__jarvis_theme` global).
2. The theme changes at runtime (via the `theme` IPC dispatch).

The mapping from config to xterm.js properties happens in
`config_to_xterm_theme()` in `theme_handlers.rs`. Notably, the config
`CursorStyle::Beam` maps to xterm.js `"bar"`.

The xterm.js theme object includes a full 16-color ANSI palette
(Catppuccin Mocha by default), plus `background`, `foreground`, `cursor`,
`cursorAccent`, `selectionBackground`, and `selectionForeground`.

---

## 4. PTY Lifecycle

### 4.1 Creation

PTYs are created in two scenarios:

1. **`terminal_ready` IPC message**: When a terminal panel's JavaScript
   finishes initializing, it sends `terminal_ready` with `{ cols, rows }`.
   The Rust handler spawns a PTY and inserts it into the `PtyManager`.

2. **`pty_restart` IPC message**: The user clicks "Restart Shell" in the
   exit overlay. The Rust handler kills the existing PTY, removes it, then
   spawns a fresh one.

The spawn sequence (`spawn_pty()` in `spawn.rs`):

```
1. native_pty_system()           -- get OS PTY system
2. openpty(PtySize{cols,rows})   -- create master/slave pair
3. build_shell_command(shell)    -- configure shell with sanitized env
4. slave.spawn_command(cmd)      -- fork shell into slave side
5. drop(slave)                   -- only master is needed
6. master.take_writer()          -- get writer for input
7. master.try_clone_reader()     -- get reader for output
8. thread::spawn(pty-reader)     -- background thread reads output
9. Return PtyHandle              -- caller inserts into PtyManager
```

### 4.2 Default dimensions

If the IPC message does not include valid `cols`/`rows`, the PTY falls back
to the defaults:

- `DEFAULT_COLS` = 80
- `DEFAULT_ROWS` = 24

Size validation rejects values of 0 or greater than 500 for either dimension.

### 4.3 The PtyHandle

Each PTY is represented by a `PtyHandle` struct:

```rust
pub struct PtyHandle {
    writer: Box<dyn Write + Send>,           // input to PTY
    output_rx: mpsc::Receiver<Vec<u8>>,      // output from reader thread
    child: Box<dyn Child + Send + Sync>,     // shell process handle
    master: Box<dyn MasterPty + Send>,       // for resize operations
    size: PtySize,                           // current cols x rows
}
```

### 4.4 The PtyManager

`PtyManager` is a `HashMap<u32, PtyHandle>` keyed by pane ID. It provides
convenience methods:

- `write_input(pane_id, data)` -- forward keystrokes to a pane's PTY.
- `resize(pane_id, cols, rows)` -- resize a pane's PTY.
- `kill_and_remove(pane_id)` -- kill the shell and remove the handle.
- `kill_all()` -- used during shutdown.
- `drain_all_output()` -- collect output from every PTY (non-blocking).
- `check_finished()` -- find PTYs whose shell has exited.

### 4.5 Resize

Resize is triggered when:

- xterm.js fires `term.onResize()` (after the `FitAddon` recalculates
  dimensions due to a container resize).
- The JavaScript sends `pty_resize` with `{ cols, rows }`.
- The Rust handler calls `self.ptys.resize(pane_id, cols, rows)`.
- `PtyHandle::resize()` calls `master.resize(PtySize{...})` to notify the
  OS PTY of the new window size.

A `ResizeObserver` on the `#terminal-container` div ensures the xterm.js
`FitAddon` is triggered whenever the container's dimensions change (e.g.,
window resize, pane layout change).

### 4.6 Shutdown and cleanup

On application exit, `shutdown()` calls `ptys.kill_all()`, which iterates
every active PTY, kills the child process, waits for the exit code, and
removes the handle. This runs before webview destruction.

When a single pane is closed via `panel_close`, the lifecycle handler calls
`destroy_webview_for_pane(pane_id)`, which first kills the PTY via
`ptys.kill_and_remove(pane_id)` and then destroys the WebView.

---

## 5. IPC Protocol

All IPC messages are JSON objects with the shape:

```json
{ "kind": "<message_type>", "payload": <any> }
```

### 5.1 JS-to-Rust messages (terminal-related)

| Kind | Payload | When sent | Handler |
|---|---|---|---|
| `terminal_ready` | `{ cols, rows }` | xterm.js initialized | `handle_terminal_ready()` -- spawns a new PTY |
| `pty_input` | `{ data: "<string>" }` | User types in terminal | `handle_pty_input()` -- writes bytes to PTY |
| `pty_resize` | `{ cols, rows }` | Terminal container resized | `handle_pty_resize()` -- resizes PTY |
| `pty_restart` | `{ cols, rows }` | "Restart Shell" button clicked | `handle_pty_restart()` -- kills old PTY, spawns new |
| `panel_focus` | `{}` | Mouse click in any panel | Sets tiling focus to this pane |
| `clipboard_copy` | `{ text }` | Cmd+C with selection | Writes text to system clipboard |
| `clipboard_paste` | `{ _reqId }` | Cmd+V in terminal | Returns clipboard text/image via response |
| `keybind` | `{ key, ctrl, alt, shift, meta }` | Cmd+key or Escape pressed | Routes through keybind registry |
| `debug_event` | (various) | Diagnostic logging | Logged at INFO level |

### 5.2 Rust-to-JS messages (terminal-related)

| Kind | Payload | When sent | Effect |
|---|---|---|---|
| `pty_output` | `{ data: "<string>" }` | PTY has output bytes | `term.write(data)` in xterm.js |
| `pty_exit` | `{ code: <number> }` | Shell process exited | Shows "Process exited" overlay |
| `theme` | (xterm theme + font settings) | Theme change or initial load | Updates xterm.js theme, font, cursor |
| `focus_changed` | `{ focused: bool }` | Pane focus changes | `term.focus()` or blur |
| `clipboard_paste_response` | `{ _reqId, kind, text/data_url }` | Response to clipboard_paste | Inserts text via pty_input or dispatches paste-image event |

### 5.3 IPC allowlist

All incoming IPC message kinds are validated against a compile-time
allowlist in `ipc_dispatch.rs`. Any message with an unrecognized `kind` is
rejected and logged. This prevents arbitrary message injection from the
WebView context.

### 5.4 IPC bridge initialization

Every WebView has `IPC_INIT_SCRIPT` injected at creation. This script
establishes:

- `window.jarvis.ipc.send(kind, payload)` -- fire-and-forget messages.
- `window.jarvis.ipc.request(kind, payload)` -- Promise-based
  request/response (used for clipboard paste). Has a 10-second timeout.
- `window.jarvis.ipc.on(kind, callback)` -- register a handler for
  Rust-to-JS messages.
- `window.jarvis.ipc._dispatch(kind, payload)` -- internal dispatch with
  request-response resolution.

The bridge also installs global event listeners for `mousedown` (sends
`panel_focus`), `keydown` (diagnostic logging + shortcut forwarding), and
`focus`/`blur` (diagnostic logging).

---

## 6. Data Flow: Keystroke to Terminal Output

### 6.1 Input path (keystroke to shell)

There are two parallel input paths depending on the platform:

**Path A: via winit (native key events)**

```
User presses key
  --> winit KeyEvent
    --> InputProcessor.process_key()
      --> KeybindRegistry.lookup() -- check for app shortcut
        [match] --> dispatch Action (e.g., NewPanel, ToggleFullscreen)
        [no match, Terminal mode] --> encode_key_for_terminal()
          --> InputResult::TerminalInput(bytes)
            --> ptys.write_input(focused_pane_id, bytes)
              --> PtyHandle.write_input() -- write_all + flush to PTY
```

**Path B: via WebView IPC (xterm.js captures the key)**

```
User presses key in WebView
  --> xterm.js term.onData(data)
    --> window.jarvis.ipc.send('pty_input', { data })
      --> IPC handler parses JSON
        --> handle_pty_input(pane_id, payload)
          --> ptys.write_input(pane_id, data.as_bytes())
            --> PtyHandle.write_input() -- write_all + flush to PTY
```

Path B is the primary path when the terminal WebView has focus. xterm.js
handles the key translation (including special keys, modifiers, and terminal
escape sequences) and sends the already-encoded data string via IPC.

Path A is used as a fallback when winit captures keys before the WebView
(less common on macOS with WKWebView, more common on other platforms).

### 6.2 Output path (shell output to screen)

```
Shell writes to PTY slave
  --> OS PTY mechanism delivers bytes to master reader
    --> pty-reader thread: reader.read(&mut buf)
      --> mpsc::channel tx.send(buf[..n].to_vec())

[Every 8ms in poll loop]
  --> poll_pty_output()
    --> ptys.drain_all_output()
      --> PtyHandle.drain_output() -- try_recv in loop, up to 64KB
        --> For each (pane_id, data):
          --> String::from_utf8_lossy(data)
          --> webview.send_ipc("pty_output", { data: text })
            --> JS: window.jarvis.ipc._dispatch("pty_output", payload)
              --> term.write(payload.data)
                --> xterm.js renders to canvas
```

### 6.3 Output throttling

- The reader thread reads in 8 KB chunks (`PTY_READ_CHUNK = 8192`).
- `drain_output()` accumulates chunks up to 64 KB per frame
  (`PTY_MAX_OUTPUT_PER_FRAME = 65536`), then truncates.
- The main poll loop runs at ~125 Hz (`POLL_INTERVAL = 8ms`), so the
  effective maximum throughput is roughly 64 KB * 125 = 8 MB/s.

### 6.4 Shell exit detection

```
Shell exits
  --> pty-reader thread gets Ok(0) (EOF) or Err
    --> reader thread exits, channel disconnects

[In poll loop]
  --> ptys.check_finished()
    --> try_recv returns Disconnected
      --> pane_id added to "finished" list
        --> ptys.kill_and_remove(pane_id)
          --> webview.send_ipc("pty_exit", { code })
            --> JS shows exit overlay with exit code
```

---

## 7. Copy/Paste Behavior

### 7.1 Copy (Cmd+C / Ctrl+Shift+C)

The IPC init script intercepts `Cmd+C` in the WebView `keydown` handler:

1. Checks `window._xtermInstance.getSelection()` for selected text in the
   terminal.
2. Falls back to `window.getSelection().toString()` for DOM selection.
3. If text is found, sends `clipboard_copy` IPC with `{ text }`.
4. The Rust handler writes the text to the system clipboard via
   `jarvis_platform::Clipboard`.

### 7.2 Paste (Cmd+V / Ctrl+Shift+V)

Paste uses the request/response IPC pattern:

1. IPC init script intercepts `Cmd+V`, calls
   `window.jarvis.ipc.request('clipboard_paste', {})`.
2. The Rust handler reads the system clipboard:
   - Tries image first (`cb.get_image()`) -- encodes as PNG base64 data URL.
   - Falls back to text (`cb.get_text()`).
3. Returns the result as a response with `_reqId`.
4. The JS promise resolves:
   - **Text in terminal**: If no focused input element exists but
     `_xtermInstance` is available, sends `pty_input` with the clipboard
     text (so the text enters the PTY as if typed).
   - **Text in input field**: Uses `document.execCommand('insertText')`.
   - **Image**: Dispatches a `jarvis:paste-image` custom DOM event.

### 7.3 Bracketed paste

The `InputProcessor` supports bracketed paste mode. When enabled (via
`set_bracketed_paste(true)`), pasted text is wrapped in escape sequences:

```
ESC[200~ <pasted text> ESC[201~
```

This allows shells like zsh/fish to distinguish pasted text from typed input.

---

## 8. Keyboard Handling in Terminal Mode

### 8.1 Input modes

The `InputProcessor` operates in one of four modes:

| Mode | Key routing |
|---|---|
| `Terminal` | Keybinds checked first; unmatched keys encoded for PTY. |
| `CommandPalette` | All keys routed to palette filter. |
| `Settings` | Keys consumed (not sent to terminal). |
| `Assistant` | Keys routed to assistant input. |

### 8.2 Key encoding

When a key is not matched by any keybind and the mode is `Terminal`, it is
encoded via `encode_key_for_terminal()` in `encoding.rs`. The encoder handles:

- **Editing keys**: Enter (CR), Backspace (DEL/0x7F), Tab (HT), Escape (ESC),
  Space, Delete (CSI 3~), Insert (CSI 2~).
- **Arrow keys**: Up/Down/Left/Right as CSI A/B/C/D.
- **Navigation**: Home (CSI H), End (CSI F), PageUp (CSI 5~), PageDown
  (CSI 6~).
- **Function keys**: F1--F12 as SS3 or CSI sequences.
- **Ctrl+letter**: Maps to control codes (Ctrl+A = 0x01, ..., Ctrl+Z = 0x1A).
- **Ctrl+[**: ESC (0x1B).
- **Ctrl+\\**: 0x1C.
- **Ctrl+]**: 0x1D.
- **Alt prefix**: Prepends ESC (0x1B) before the character for Alt+key.
- **Printable characters**: Passed through as UTF-8 bytes.

### 8.3 WKWebView shortcut forwarding

On macOS, WKWebView captures `Cmd+key` before winit sees them. The IPC init
script intercepts these in a `keydown` listener and forwards them to Rust via
the `keybind` IPC message. The Rust handler looks them up in the
`KeybindRegistry` and dispatches the matching action.

When an overlay (command palette or assistant) is active, **all** non-repeat
key events are forwarded to Rust via `keybind`, with `preventDefault()` to
block them from reaching xterm.js.

Certain Cmd+key combinations are explicitly **not** forwarded and are left to
the WebView's native handling: Cmd+R, Cmd+L, Cmd+Q, Cmd+A, Cmd+X, Cmd+Z.

---

## 9. Multi-Terminal Support (One PTY per Pane)

### 9.1 Pane/PTY mapping

Every tiling pane that hosts a terminal gets its own independent PTY. The
`PtyManager` maps `pane_id: u32` to `PtyHandle`. This means:

- Each pane runs a separate shell process.
- Each pane has its own scrollback buffer (in xterm.js).
- Resize is per-pane -- each PTY tracks its own `cols x rows`.
- Focus determines which pane receives keyboard input.

### 9.2 Creating new terminal panes

When a new pane is added to the tiling layout:

1. `create_webview_for_pane(pane_id)` creates a WebView loading
   `jarvis://localhost/terminal/index.html`.
2. xterm.js initializes, computes its dimensions via FitAddon, and sends
   `terminal_ready` with `{ cols, rows }`.
3. The Rust handler spawns a new PTY and inserts it into the `PtyManager`.

### 9.3 Closing terminal panes

When a pane is closed:

1. The PTY is killed first (`ptys.kill_and_remove(pane_id)`).
2. The WebView is then destroyed (`registry.destroy(pane_id)`).
3. The tiling layout is updated and remaining pane bounds are synced.

Closing the last pane is refused -- at least one pane always remains.

### 9.4 Focus management

- Clicking inside a WebView sends `panel_focus` IPC, which calls
  `tiling.focus_pane(pane_id)`.
- When focus changes, the Rust side sends `focus_changed` IPC with
  `{ focused: true/false }` to the affected panes.
- The terminal panel responds by calling `term.focus()` on the xterm.js
  instance when focused.
- On page load completion in the focused pane, native WebView focus is
  re-granted via `handle.focus()`.

---

## 10. Terminal-Specific Features

### 10.1 Process exit overlay

When the shell exits, xterm.js receives `pty_exit` with the exit code. The
terminal panel displays an overlay:

```
    +-------------------------------+
    |                               |
    |   Process exited (code 0)     |
    |   [ Restart Shell ]           |
    |                               |
    +-------------------------------+
```

Clicking "Restart Shell" clears the terminal (`term.clear()`), hides the
overlay, and sends `pty_restart` to spawn a new shell.

### 10.2 Terminal clear

`term.clear()` is called on restart. The xterm.js scrollback and viewport
are flushed. This is a JS-side operation; the PTY is not involved.

### 10.3 Scrollback

Scrollback depth is configured via `terminal.scrollback_lines` (default:
10,000 lines). This value is sent to xterm.js in the `theme` IPC payload and
applied via `term.options.scrollback`. The xterm.js instance manages the
scrollback buffer entirely in the browser.

### 10.4 Fit addon (auto-sizing)

The xterm.js `FitAddon` (v0.10.0) automatically calculates the terminal
grid dimensions to fill the container. It is triggered by:

- A `ResizeObserver` on `#terminal-container` (fires on any container resize).
- Theme updates that change font size or line height (explicit
  `fitAddon.fit()` calls).

When the addon recalculates, xterm.js fires `term.onResize()`, which sends
`pty_resize` to synchronize the PTY.

### 10.5 URL detection

When `terminal.mouse.url_detection` is `true` (default), xterm.js detects
URLs in terminal output and renders them as clickable links. This is handled
by xterm.js's built-in link detection (via the `allowProposedApi: true`
terminal option).

### 10.6 Mobile relay

PTY output is also broadcast to connected mobile clients via the WebSocket
relay bridge. The `poll_pty_output()` function sends `ServerMessage::PtyOutput`
to the `mobile_broadcaster` for each pane that has new output, and
`ServerMessage::PtyExit` when a shell exits. This allows remote terminal
viewing from the Jarvis mobile companion app.

---

## 11. xterm.js Terminal Instance Details

The terminal is instantiated in `index.html` with these defaults (overridden
by theme IPC):

```javascript
var term = new Terminal({
    cursorBlink: true,
    cursorStyle: 'block',
    scrollback: 10000,
    fontSize: 13,
    fontFamily: "'Menlo', monospace",
    lineHeight: 1.6,
    fontWeight: '400',
    fontWeightBold: '700',
    allowProposedApi: true,
    theme: AYU    // Ayu Mirage palette as initial default
});
```

The `FitAddon` is loaded and the terminal is opened into `#terminal-container`.
The xterm instance is also stored as `window._xtermInstance` so the IPC init
script can access it for selection reading during copy operations.

### CDN dependencies

| Library | Version | Purpose |
|---|---|---|
| `@xterm/xterm` | 5.5.0 | Terminal emulation and rendering |
| `@xterm/addon-fit` | 0.10.0 | Auto-sizing to container |

Both are loaded from jsDelivr CDN with SRI integrity hashes.

---

## 12. Security Considerations

### Environment isolation

The PTY environment is sanitized to prevent secret leakage. API keys, tokens,
and passwords from the Jarvis process are not inherited by the shell. Only
a curated allowlist of safe variables is forwarded.

### IPC allowlist

All IPC message kinds are validated against a compile-time allowlist. Unknown
message types are rejected. The allowlist includes exactly the expected
message types, and is case-sensitive.

### Navigation allowlist

WebView navigation is restricted to `jarvis://`, `about:blank`, and the
WebView2 Windows rewrite `http://jarvis.localhost`. HTTPS URLs are permitted.
Schemes like `file://`, `javascript:`, and `data:` are blocked.

### Size validation

PTY resize payloads are bounds-checked: cols and rows must each be between 1
and 500 (inclusive). Payloads with zero or oversized dimensions are silently
rejected.

# Tiling & Window Management

## Overview

Jarvis uses a **binary split tree** to manage pane layout within the application
window. Every visible pane occupies a leaf node in the tree, and interior nodes
describe how their two children are divided -- either horizontally (side by side)
or vertically (top and bottom). The system supports splitting, closing, focusing,
resizing, swapping, zooming, and tabbed stacking of panes, all driven by a
single authoritative data structure: the `SplitNode` tree.

The tiling subsystem lives in the `jarvis-tiling` crate and is intentionally
decoupled from rendering and platform windowing. The application layer
(`jarvis-app`) consumes the tiling API to dispatch user actions and synchronise
webview positions with the computed layout.

### Crate structure

```
jarvis-tiling/
  src/
    lib.rs              -- Public re-exports
    commands.rs          -- TilingCommand enum
    pane.rs              -- Pane struct (id, kind, title)
    tree/
      types.rs           -- SplitNode, Direction
      operations.rs      -- split_at, remove_pane, swap_panes, adjust_ratio
      traversal.rs       -- next_pane, prev_pane, find_neighbor
    layout/
      types.rs           -- LayoutEngine configuration
      calculation.rs     -- Recursive tree-to-rect computation
      borders.rs         -- SplitBorder computation for drag-resize
    manager/
      types.rs           -- TilingManager struct and accessors
      focus.rs           -- Focus & zoom operations
      operations.rs      -- Split, close, resize, swap
      layout_compute.rs  -- compute_layout, execute(TilingCommand)
      stacks.rs          -- Push/cycle tabs within a leaf position
    stack/
      types.rs           -- PaneStack struct
      operations.rs      -- push, remove, cycle_next, cycle_prev
    platform/
      mod.rs             -- WindowManager trait, ExternalWindow, WindowEvent
      windows.rs         -- Windows implementation
      macos/             -- macOS CoreGraphics implementation
      wayland.rs         -- Wayland stub
      x11.rs             -- X11 stub
      noop.rs            -- No-op fallback
```

---

## The Split Tree

### Data Model

The tree is represented by the `SplitNode` enum:

```rust
pub enum SplitNode {
    Leaf { pane_id: u32 },
    Split {
        direction: Direction,   // Horizontal or Vertical
        ratio: f64,             // 0.0 .. 1.0, how much space the first child gets
        first: Box<SplitNode>,
        second: Box<SplitNode>,
    },
}
```

```rust
pub enum Direction {
    Horizontal,  // Children placed side by side (left | right)
    Vertical,    // Children placed top over bottom (top / bottom)
}
```

A single pane is a `Leaf`. When the user splits a pane, that `Leaf` is
replaced by a `Split` node whose `first` child is the original pane and
`second` child is the new pane, with `ratio` initialised to `0.5` (equal
split).

### ASCII diagram: binary split tree

```
Window (800 x 600)
+-------------------------------------------+
|                                           |
|                                           |
|    Tree root: Split(H, 0.5)              |
|     /                   \                |
|  Leaf(1)         Split(V, 0.5)           |
|                   /          \           |
|               Leaf(2)     Leaf(3)        |
|                                           |
+-------------------------------------------+

Visual result:
+------------------+------------------+
|                  |                  |
|                  |    Pane 2        |
|    Pane 1        |                  |
|                  +------------------+
|                  |                  |
|                  |    Pane 3        |
|                  |                  |
+------------------+------------------+
```

### Key operations on SplitNode

| Method | Description |
|---|---|
| `split_at(target_id, new_id, direction)` | Replace the leaf `target_id` with a Split whose first child is `target_id` and second is `new_id`. Returns `true` on success. |
| `remove_pane(target_id)` | Remove a leaf and replace its parent Split with the surviving sibling. Cannot remove the last pane. |
| `swap_panes(a, b)` | Swap two pane IDs in-place across the tree. Both must exist. |
| `adjust_ratio(target_id, delta)` | Adjust the ratio of the parent split of `target_id`. Positive delta grows the side containing the target. Clamped to `[0.1, 0.9]`. |
| `adjust_ratio_between(first_id, second_id, delta)` | Find the unique split where `first_id` is in the first subtree and `second_id` is in the second subtree, and adjust its ratio. |
| `pane_count()` | Count all leaf nodes. |
| `contains_pane(id)` | Check if a pane ID exists anywhere in the tree. |
| `collect_pane_ids()` | Depth-first left-to-right list of all pane IDs. |
| `next_pane(current_id)` | Next pane in DFS order, wrapping around. |
| `prev_pane(current_id)` | Previous pane in DFS order, wrapping around. |
| `find_neighbor(target_id, direction)` | Find the adjacent pane in a given direction using linear ordering. |

---

## Pane Types

Each pane is identified by a numeric `PaneId(u32)` and carries a `PaneKind`
that determines what content it displays.

```rust
pub struct Pane {
    pub id: PaneId,
    pub kind: PaneKind,
    pub title: String,
}
```

### PaneKind variants

| Kind | Description |
|---|---|
| `Terminal` | An interactive terminal emulator (xterm.js in a webview). The default pane kind. |
| `Chat` | A chat interface pane, loaded from `jarvis://localhost/chat/index.html`. |
| `WebView` | A general-purpose web content pane (settings, documentation, etc.). |
| `Assistant` | An AI assistant panel. |
| `ExternalApp` | A captured external application window managed by the platform `WindowManager`. |

The `Pane` struct provides convenience constructors for each kind:

- `Pane::new_terminal(id, title)`
- `Pane::new_chat(id, title)`
- `Pane::new_webview(id, title)`
- `Pane::new_assistant(id, title)`
- `Pane::new_external(id, title)`

---

## Layout Configuration

Layout settings are defined in `LayoutConfig` (from `jarvis-config`) and
control the visual appearance of the tiling grid.

```rust
pub struct LayoutConfig {
    pub panel_gap: u32,            // Gap between panels (0-20 px), default 6
    pub border_radius: u32,        // Corner radius (0-20 px), default 8
    pub padding: u32,              // Inner pane padding (0-40 px), default 10
    pub max_panels: u32,           // Max simultaneous panels (1-10), default 5
    pub default_panel_width: f64,  // Default width fraction (0.3-1.0), default 0.72
    pub scrollbar_width: u32,      // Scrollbar width (1-10 px), default 3
    pub border_width: f64,         // Pane border width (0.0-3.0 px), default 0.0
    pub outer_padding: u32,        // Screen-edge padding (0-40 px), default 0
    pub inactive_opacity: f64,     // Opacity for unfocused panels (0.0-1.0), default 1.0
}
```

There is also an `OpacityConfig` for fine-grained transparency control of
different UI layers (background, panel, orb, hex grid, HUD).

### Mapping to the layout engine

The `LayoutEngine` struct in `jarvis-tiling` uses a subset of these settings:

```rust
pub struct LayoutEngine {
    pub gap: u32,            // from LayoutConfig.panel_gap
    pub outer_padding: u32,  // from LayoutConfig.outer_padding
    pub min_pane_size: f64,  // minimum dimension for any pane (default 50.0)
}
```

These values can be updated at runtime via `TilingManager::set_gap()` and
`TilingManager::set_outer_padding()`.

---

## The Layout Engine

The layout engine converts the split tree into concrete pixel rectangles. It is
a pure function: given a `SplitNode` tree and a viewport `Rect`, it returns
`Vec<(u32, Rect)>` -- a list of pane ID / rectangle pairs.

### Algorithm

1. **Apply outer padding.** The viewport is inset by `outer_padding` on all
   four sides.

2. **Recurse through the tree.** At each `Split` node:
   - Subtract the `gap` from the available dimension (width for Horizontal,
     height for Vertical).
   - Multiply the remaining space by `ratio` to get the first child's size.
   - The second child gets the remainder.
   - The gap is placed between the two children.

3. **Leaf nodes** emit `(pane_id, bounds)` directly.

### Horizontal split calculation

```
Available width = bounds.width - gap
First child width  = available_width * ratio
Second child width = available_width - first_width
Second child x     = bounds.x + first_width + gap
```

### Vertical split calculation

```
Available height = bounds.height - gap
First child height  = available_height * ratio
Second child height = available_height - first_height
Second child y      = bounds.y + first_height + gap
```

### ASCII diagram: gap and padding

```
Viewport: 800 x 600, outer_padding = 10, gap = 8

+---------- 800 ----------+
|  padding = 10            |
|  +--- 780 x 580 ------+ |
|  |        |  gap  |    | |
|  | Pane 1 | (8px) | P2 | |
|  |  386   |       |386 | |
|  +--------+-------+----+ |
|                          |
+--------------------------+

Available = 780 - 8 = 772
Each pane = 772 * 0.5 = 386
```

---

## Splitting

### Manual split

The user can request either a horizontal or vertical split:

- **Horizontal split** (`SplitHorizontal`): places panes side by side.
- **Vertical split** (`SplitVertical`): places panes top and bottom.

When a split is performed:

1. The currently focused leaf is replaced by a `Split` node.
2. The original pane becomes the `first` child.
3. A new pane (with auto-incremented ID) becomes the `second` child.
4. The `ratio` is set to `0.5`.
5. Focus moves to the new pane.
6. If the manager was in zoom mode, zoom is cancelled.

### Auto-split logic

The `auto_split_direction(viewport)` method on `TilingManager` chooses the
split direction based on the focused pane's current aspect ratio:

- If `width >= height` --> `Horizontal` (split side by side, making both narrower)
- If `width < height`  --> `Vertical` (split top/bottom, making both shorter)

The `NewPane` action in the application dispatch uses auto-split:

```rust
Action::NewPane => {
    let content = self.chrome.content_rect(w, h);
    let dir = self.tiling.auto_split_direction(content);
    self.tiling.split(dir);
    self.create_webview_for_pane(new_id);
    self.sync_webview_bounds();
}
```

The `max_panels` configuration value caps the total number of panes that can
exist simultaneously:

```rust
if self.tiling.pane_count() >= max {
    tracing::warn!(max, "NewPane rejected: at panel limit");
    return;
}
```

### Typed splits

`split_with(direction, kind, title)` creates a pane with a specific
`PaneKind` instead of the default `Terminal`:

```rust
// Open a Chat pane beside the current one
self.tiling.split_with(Direction::Horizontal, PaneKind::Chat, "Chat");
```

### ASCII diagram: split operation

```
Before split_at(1, 2, Horizontal):
    Leaf(1)

After:
    Split(H, 0.5)
     /         \
  Leaf(1)    Leaf(2)

Before split_at(2, 3, Vertical):
    Split(H, 0.5)
     /         \
  Leaf(1)    Leaf(2)

After:
    Split(H, 0.5)
     /              \
  Leaf(1)     Split(V, 0.5)
               /         \
            Leaf(2)    Leaf(3)
```

---

## Focus Management

### Focus tracking

The `TilingManager` stores a single `focused: u32` field that identifies the
currently focused pane. The focused pane receives keyboard input and is
highlighted with visual indicators (borders, opacity).

### Focus operations

| Method | Behaviour |
|---|---|
| `focus_next()` | Move focus to the next pane in depth-first order, wrapping around from last to first. |
| `focus_prev()` | Move focus to the previous pane, wrapping from first to last. |
| `focus_direction(dir)` | Move focus to the neighbor in a specific direction (Horizontal = right, Vertical = up). Does not wrap. |
| `focus_pane(id)` | Focus a specific pane by its numeric ID. Returns `false` if the ID does not exist. |

### Focus indicators

The `PaneBorder` struct in the renderer carries an `is_focused` flag:

```rust
pub struct PaneBorder {
    pub rect: Rect,
    pub color: [f32; 4],
    pub width: f32,
    pub is_focused: bool,
}
```

When `LayoutConfig.inactive_opacity < 1.0`, unfocused panes are rendered with
reduced opacity. The `LayoutConfig.border_width` setting controls whether
pane borders are visible at all (default `0.0` means no border).

### Focus flow in the application

When the user triggers a focus action (via keybind), the dispatch handler:

1. Calls the appropriate `TilingManager` focus method.
2. Calls `notify_focus_changed()` to inform webviews of the new focus state.
3. Sets `needs_redraw = true` to refresh the UI.

---

## Zoom Mode

Zoom mode makes a single pane fill the entire content area, hiding all other
panes.

### Behaviour

- **Toggle on:** `zoom_toggle()` sets `zoomed = Some(focused_id)`.
- **Toggle off:** calling `zoom_toggle()` again sets `zoomed = None`.
- Zooming requires at least 2 panes; a single-pane window cannot zoom.
- Any split operation automatically cancels zoom.
- Closing a pane cancels zoom.

### Layout impact

When zoomed, `compute_layout()` short-circuits:

```rust
if let Some(zoomed_id) = self.zoomed {
    return vec![(zoomed_id, viewport)];
}
```

This means only the zoomed pane's webview is positioned; all other webviews
remain at their previous positions (off-screen or behind the zoomed pane,
depending on the platform).

---

## Resizing

Pane sizes are controlled by the `ratio` field on `Split` nodes. Two resize
mechanisms are available: keyboard and mouse drag.

### Keyboard resize

The `ResizePane { direction, delta }` action maps to `TilingCommand::Resize`:

```rust
Action::ResizePane { direction, delta } => {
    let tiling_dir = match direction {
        Left | Right => Direction::Horizontal,
        Up | Down    => Direction::Vertical,
    };
    let signed_delta = match direction {
        Right | Down =>  delta,
        Left  | Up   => -delta,
    };
    self.tiling.execute(TilingCommand::Resize(tiling_dir, signed_delta));
}
```

Inside `TilingManager::resize()`, each step adjusts the ratio by 5%:

```rust
let delta_f = delta as f64 * 0.05; // 5% per step
self.tree.adjust_ratio(self.focused, delta_f)
```

The ratio is clamped to `[0.1, 0.9]`, preventing any pane from being resized
to invisibility.

### Mouse drag resize

Mouse drag resize is a three-phase interaction implemented across `resize_drag.rs`,
`borders.rs`, and `event_handler.rs`.

#### Phase 1: Hit testing (cursor move)

On every cursor movement, the system:

1. Computes all `SplitBorder` entries from the current tree and viewport using
   `compute_borders()`.
2. Hit-tests the cursor position against each border using a 6-pixel hit zone
   on each side.
3. Changes the cursor icon to `ColResize` (vertical divider) or `RowResize`
   (horizontal divider) when hovering a border.

#### Phase 2: Drag start (mouse button press)

When the user presses the mouse button over a border:

```rust
self.drag_state = Some(DragState {
    border: border.clone(),
    start_pos,  // x for horizontal splits, y for vertical
});
```

#### Phase 3: Drag update (cursor move while dragging)

While `drag_state` is `Some`, each cursor movement:

1. Computes the pixel delta from the drag start position.
2. Converts pixels to a ratio delta using `pixel_to_ratio()`:
   `ratio_delta = pixel_delta / span_of_split_bounds`
3. Calls `adjust_ratio_between(first_pane, second_pane, ratio_delta)` to update
   the correct split node.
4. Updates `start_pos` to the current position for incremental dragging.
5. Calls `sync_webview_bounds()` to reposition webviews.

#### Phase 4: Drag end (mouse button release)

```rust
self.drag_state = None;
// Reset cursor to default
```

### SplitBorder structure

```rust
pub struct SplitBorder {
    pub direction: Direction,  // Which axis the split divides
    pub position: f64,         // Pixel position of the divider line
    pub start: f64,            // Start of the divider span
    pub end: f64,              // End of the divider span
    pub first_pane: u32,       // A pane ID from the first subtree
    pub second_pane: u32,      // A pane ID from the second subtree
    pub bounds: Rect,          // Bounding rect of the entire split region
}
```

The `compute_borders()` function walks the tree recursively, producing one
`SplitBorder` per interior `Split` node. Each border records the pane IDs on
either side so the correct split can be identified for ratio adjustment.

---

## Swap Panes

The `SwapPane(direction)` action exchanges the focused pane's position with
its neighbor in the given direction:

```rust
pub fn swap(&mut self, direction: Direction) -> bool {
    if let Some(neighbor) = self.tree.find_neighbor(self.focused, direction) {
        self.tree.swap_panes(self.focused, neighbor)
    } else {
        false
    }
}
```

`swap_panes()` traverses all leaf nodes and swaps the two IDs in place. The
tree structure (split directions and ratios) is preserved; only the pane ID
assignments change.

```
Before swap_panes(1, 2):
    Split(H, 0.5)
     /         \
  Leaf(1)    Leaf(2)

After:
    Split(H, 0.5)
     /         \
  Leaf(2)    Leaf(1)
```

---

## Pane Stacks (Tabs)

A single leaf position in the tree can host multiple panes as a **stack**
(tabbed interface). Only the active pane in the stack is visible; the others
are preserved in memory.

### PaneStack

```rust
pub struct PaneStack {
    panes: Vec<u32>,       // Ordered list of pane IDs
    active_index: usize,   // Index of the visible pane
}
```

### Stack operations

| Method | Description |
|---|---|
| `push(pane_id)` | Add a pane to the stack and make it active. |
| `remove(pane_id)` | Remove a pane. If it was active, the previous pane becomes active. Cannot remove the last pane. |
| `cycle_next()` | Advance to the next tab, wrapping around. |
| `cycle_prev()` | Go to the previous tab, wrapping around. |
| `set_active(pane_id)` | Activate a specific tab by ID. |
| `active()` | Get the currently visible pane ID. |
| `contains(pane_id)` | Check if a pane is in this stack. |
| `pane_ids()` | Get all pane IDs in insertion order. |

### TilingManager integration

- `push_to_stack(kind, title)` -- Adds a new pane of the given kind to the
  stack at the focused leaf position.
- `cycle_stack_next()` / `cycle_stack_prev()` -- Cycle tabs on the focused leaf.

---

## UI Chrome: Tab Bar and Status Bar

UI chrome elements -- the tab bar and status bar -- are managed by the
`UiChrome` struct in the `jarvis-renderer` crate. These elements surround the
content area and affect the viewport available for tiling.

### UiChrome structure

```rust
pub struct UiChrome {
    pub tab_bar: Option<TabBar>,
    pub status_bar: Option<StatusBar>,
    pub borders: Vec<PaneBorder>,
    pub pane_gap: f32,
}
```

### Tab bar

The tab bar sits at the top of the window, with a default height of **32
pixels**.

```rust
pub struct TabBar {
    pub tabs: Vec<Tab>,
    pub active_tab: usize,
    pub height: f32,        // Default: 32.0
}

pub struct Tab {
    pub pane_id: u32,
    pub title: String,
    pub is_active: bool,
}
```

Each tab maps to a pane ID. The active tab index is clamped to the valid range
when set.

### Status bar

The status bar sits at the bottom of the window, with a default height of
**24 pixels**.

```rust
pub struct StatusBar {
    pub left_text: String,
    pub center_text: String,
    pub right_text: String,
    pub height: f32,        // Default: 24.0
    pub bg_color: [f32; 4], // Default: dark gray (0.1, 0.1, 0.1, 0.9)
    pub fg_color: [f32; 4], // Default: light gray (0.9, 0.9, 0.9, 1.0)
}
```

The status bar provides three text regions (left, center, right) for displaying
mode information, file paths, cursor position, or other status data.

### Content rect computation

The `content_rect()` method computes the rectangle available for tiling content
after subtracting chrome elements:

```rust
pub fn content_rect(&self, window_width: f32, window_height: f32) -> Rect {
    let top = tab_bar.height or 0.0;
    let bottom = status_bar.height or 0.0;
    Rect {
        x: 0.0,
        y: top,
        width: window_width,
        height: (window_height - top - bottom).max(0.0),
    }
}
```

### ASCII diagram: chrome layout

```
+========================================+
|  Tab Bar (32px)   [Tab1] [Tab2] [Tab3] |
+========================================+
|                                        |
|        Content Area (tiling)           |
|                                        |
|    +------------------+-----------+    |
|    |                  |           |    |
|    |    Pane 1        |  Pane 2   |    |
|    |                  |           |    |
|    +------------------+-----------+    |
|                                        |
+========================================+
|  Status Bar (24px)  [left] [ctr] [rgt] |
+========================================+
```

---

## Webview Bounds Synchronisation

Each pane in Jarvis corresponds to a `wry` webview that needs its position and
size updated whenever the layout changes. This is handled by
`sync_webview_bounds()` in the application state.

### The sync pipeline

```
User action (split, resize, zoom, etc.)
     |
     v
TilingManager updates the SplitNode tree
     |
     v
sync_webview_bounds() is called
     |
     v
1. Get logical window size (physical / scale_factor)
     |
     v
2. Compute tiling viewport via tiling_viewport()
   - Uses content_rect() if chrome (tab/status bar) exists
   - Falls back to config-based offsets (titlebar, status bar height)
     |
     v
3. compute_layout(viewport) -> Vec<(pane_id, Rect)>
   - If zoomed: returns only the zoomed pane filling the viewport
   - Otherwise: recursively computes all pane rects from the split tree
     |
     v
4. For each (pane_id, rect):
   - Convert Rect to wry::Rect via tiling_rect_to_wry()
   - Call handle.set_bounds(wry_rect)
```

### Coordinate conversion

The tiling engine uses `f64` logical coordinates. These are converted to wry's
`LogicalPosition` and `LogicalSize`:

```rust
pub fn tiling_rect_to_wry(rect: &Rect) -> wry::Rect {
    wry::Rect {
        position: Position::Logical(LogicalPosition::new(rect.x, rect.y)),
        size: Size::Logical(LogicalSize::new(rect.width, rect.height)),
    }
}
```

### When sync is triggered

`sync_webview_bounds()` is called after:

- `NewPane` (split + create webview)
- `ClosePane` (remove pane + destroy webview)
- `SplitHorizontal` / `SplitVertical`
- `ZoomPane` (toggle zoom)
- `ResizePane` (keyboard resize)
- `SwapPane`
- `OpenSettings` / `OpenChat` (typed splits)
- Mouse drag resize (on every cursor move during drag)
- Window resize events

---

## TilingManager: Full API Reference

The `TilingManager` is the primary interface for the tiling subsystem. It
coordinates the split tree, pane registry, focus state, zoom, and stacks.

### State

```rust
pub struct TilingManager {
    tree: SplitNode,                    // Split tree root
    panes: HashMap<u32, Pane>,          // Pane registry
    stacks: HashMap<u32, PaneStack>,    // Tab stacks at leaf positions
    focused: u32,                       // Currently focused pane ID
    zoomed: Option<u32>,                // Zoomed pane (if any)
    layout_engine: LayoutEngine,        // Gap, padding, min size
    next_id: u32,                       // Auto-incrementing ID counter
}
```

### Initialisation

- `TilingManager::new()` -- Creates a manager with one terminal pane (ID = 1).
- `TilingManager::with_layout(engine)` -- Same, with a custom layout engine.
- `TilingManager::default()` -- Alias for `new()`.

### Accessors

| Method | Returns |
|---|---|
| `focused_id()` | The focused pane's numeric ID. |
| `is_zoomed()` | Whether zoom mode is active. |
| `zoomed_id()` | `Some(id)` of the zoomed pane, or `None`. |
| `pane_count()` | Total number of panes across all stacks. |
| `pane(id)` | `Option<&Pane>` for a given ID. |
| `pane_mut(id)` | `Option<&mut Pane>` for a given ID. |
| `tree()` | `&SplitNode` reference to the tree root. |
| `tree_mut()` | `&mut SplitNode` mutable reference. |
| `gap()` | Current inter-pane gap in pixels. |
| `outer_padding()` | Current outer padding in pixels. |
| `stack(leaf_id)` | `Option<&PaneStack>` at a leaf. |
| `panes_by_kind(kind)` | All pane IDs matching a specific `PaneKind`. |
| `ordered_pane_ids()` | Pane IDs in depth-first order (visual order). |

### Commands

The `execute(cmd: TilingCommand) -> bool` method dispatches any tiling command:

```rust
pub enum TilingCommand {
    SplitHorizontal,
    SplitVertical,
    Close,
    Resize(Direction, i32),
    Swap(Direction),
    FocusNext,
    FocusPrev,
    FocusDirection(Direction),
    Zoom,
}
```

---

## Platform Window Management

The `platform` module provides a `WindowManager` trait for controlling external
application windows. This is used by the `ExternalApp` pane kind to capture and
tile third-party windows within the Jarvis workspace.

```rust
pub trait WindowManager: Send + Sync {
    fn list_windows(&self) -> Result<Vec<ExternalWindow>>;
    fn set_window_frame(&self, window_id: WindowId, frame: Rect) -> Result<()>;
    fn focus_window(&self, window_id: WindowId) -> Result<()>;
    fn set_minimized(&self, window_id: WindowId, minimized: bool) -> Result<()>;
    fn watch_windows(&self, callback: Box<dyn Fn(WindowEvent) + Send>) -> Result<WatchHandle>;
}
```

Platform implementations:

- **macOS**: CoreGraphics-based window management (`MacOsWindowManager`).
- **Windows / Linux**: Stub implementations; `create_window_manager()` returns
  the `NoopWindowManager` on non-macOS platforms.

---

## Layout Engine Internals (Developer Reference)

This section is for developers working on the tiling subsystem.

### Adding a new split direction or layout mode

The layout engine is designed around the binary split tree. To add a new layout
mode (e.g., spiral, grid):

1. Either extend `SplitNode` with a new variant, or add a separate layout
   strategy enum at the `TilingManager` level.
2. Implement the `compute` method for your new layout in `layout/calculation.rs`.
3. Update `compute_borders()` in `layout/borders.rs` if the new layout has
   resizable dividers.

### Ratio constraints

All ratios are clamped to `[0.1, 0.9]` in `adjust_ratio()` and
`adjust_ratio_between()`. This ensures no pane can be collapsed below 10% of
the parent split's extent. The `min_pane_size` field (default 50px) on
`LayoutEngine` is available for future enforcement but is not currently
applied during computation.

### ID allocation

Pane IDs are allocated by a simple auto-incrementing counter (`next_id`) in
`TilingManager`. IDs are never reused within a session. This simplifies
bookkeeping because webview handles, PTY processes, and other resources can
use the pane ID as a stable key.

### Serialisation

Both `SplitNode` and `PaneStack` derive `Serialize` and `Deserialize` (via
serde), enabling session state to be saved and restored. `Direction` is also
serialisable.

### Testing

The tiling crate has comprehensive unit tests covering:

- Tree operations: split, remove, swap, ratio adjustment, traversal.
- Layout computation: single pane, splits with gap, outer padding, nested
  splits.
- Border computation and hit testing: border positions, hit zones, ratio
  conversion.
- Stack operations: push, remove, cycle, serialisation round-trip.
- Manager integration: split/close lifecycle, focus cycling, zoom toggle,
  command dispatch, typed splits, multi-split scenarios.

Run the tiling tests with:

```
cargo test -p jarvis-tiling
```

# WebView System & IPC Bridge

This document is the definitive reference for the Jarvis WebView subsystem and the bidirectional IPC (Inter-Process Communication) bridge between Rust and JavaScript.

---

## Table of Contents

1. [System Overview](#system-overview)
2. [The `jarvis://` Custom Protocol](#the-jarvis-custom-protocol)
3. [ContentProvider](#contentprovider)
4. [WebView Creation & Lifecycle](#webview-creation--lifecycle)
5. [The IPC Bridge: JavaScript API](#the-ipc-bridge-javascript-api)
6. [IPC Message Kinds Reference](#ipc-message-kinds-reference)
7. [IPC Allowlist & Security](#ipc-allowlist--security)
8. [Navigation Handler & Allowlist](#navigation-handler--allowlist)
9. [Theme Bridge](#theme-bridge)
10. [Keyboard Shortcut Interception](#keyboard-shortcut-interception)
11. [Command Palette Overlay](#command-palette-overlay)
12. [Clipboard Integration](#clipboard-integration)
13. [WebViewHandle Rust API](#webviewhandle-rust-api)
14. [WebViewRegistry Lifecycle](#webviewregistry-lifecycle)

---

## System Overview

Jarvis embeds web content into tiling panes using the [wry](https://github.com/nickel-org/wry) crate, which provides a cross-platform WebView wrapper (WKWebView on macOS, WebView2 on Windows, WebKitGTK on Linux).

**Key architectural decisions:**

- **One WebView per pane.** Every tiling pane that displays web content (terminal, chat, assistant, settings, presence, games) gets its own `wry::WebView` instance.
- **Child WebViews.** All WebViews are created as children of the main application window via `build_as_child()`, positioned and sized using the tiling layout engine.
- **Custom protocol.** Bundled HTML/JS/CSS assets are served through a `jarvis://` custom protocol rather than a local HTTP server.
- **Bidirectional IPC.** JavaScript sends messages to Rust via `window.ipc.postMessage()`. Rust sends messages to JavaScript via `webview.evaluate_script()`.
- **No raw DOM access from Rust.** All communication between Rust and the web layer happens through typed JSON messages.

### Crate Layout

| Crate | Path | Responsibility |
|-------|------|----------------|
| `jarvis-webview` | `jarvis-rs/crates/jarvis-webview/` | WebView primitives: IPC types, content serving, manager, registry, theme bridge |
| `jarvis-app` (webview_bridge) | `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/` | Application-level IPC dispatch, lifecycle, handler implementations |

---

## The `jarvis://` Custom Protocol

### URL Format

All bundled panel assets are loaded via the `jarvis://` scheme:

```
jarvis://localhost/{path-to-asset}
```

Examples:
```
jarvis://localhost/terminal/index.html
jarvis://localhost/chat/index.html
jarvis://localhost/assistant/index.html
jarvis://localhost/settings/index.html
jarvis://localhost/presence/index.html
jarvis://localhost/games/tetris.html
jarvis://localhost/boot/index.html
jarvis://localhost/plugins/{plugin-id}/index.html
```

### Panel URL Mapping

Each `PaneKind` maps to a specific URL:

| PaneKind | URL |
|----------|-----|
| `Terminal` | `jarvis://localhost/terminal/index.html` |
| `Assistant` | `jarvis://localhost/assistant/index.html` |
| `Chat` | `jarvis://localhost/chat/index.html` |
| `WebView` | `jarvis://localhost/terminal/index.html` (fallback) |
| `ExternalApp` | `jarvis://localhost/terminal/index.html` (fallback) |

Additional panels resolved by name (not by `PaneKind`):

| Panel Name | URL |
|------------|-----|
| `settings` | `jarvis://localhost/settings/index.html` |
| `presence` | `jarvis://localhost/presence/index.html` |

### URI Resolution

The custom protocol handler strips the scheme prefix to extract the asset path. It tries multiple prefix patterns to handle platform differences:

1. `jarvis://localhost/{path}`
2. `jarvis://localhost` (bare, no trailing slash)
3. `jarvis:///{path}`
4. `jarvis://{path}`

### CORS

Every response from the custom protocol includes the header:

```
Access-Control-Allow-Origin: jarvis://localhost
```

This allows same-origin requests between assets served from the custom protocol.

### Windows (WebView2) Behavior

On Windows, WebView2 rewrites custom protocols:

```
jarvis://localhost/... --> http://jarvis.localhost/...
```

The navigation allowlist includes `http://jarvis.localhost` to handle this rewriting transparently.

### Error Handling

If an asset is not found, the protocol handler returns:

```
HTTP 404 - "Not Found"
```

A warning is logged via `tracing::warn!` with the requested path.

## ContentProvider

**Source:** `jarvis-rs/crates/jarvis-webview/src/content.rs`

The `ContentProvider` resolves `jarvis://` URL paths to file contents and MIME types. It supports four resolution strategies, checked in order:

### 1. In-Memory Overrides

Dynamically generated content registered via `add_override(path, mime, data)`. Overrides take absolute priority over filesystem resolution.

```rust
provider.add_override(
    "panels/chat/index.html",
    "text/html",
    b"<html>override</html>".to_vec(),
);
```

### 2. Plugin Directories

Paths matching `plugins/{plugin_id}/{asset_path}` are resolved from registered plugin directories:

```rust
provider.add_plugin_dir("my-plugin", "/path/to/plugin/dir");
// Resolves: plugins/my-plugin/index.html -> /path/to/plugin/dir/index.html
```

Plugin directories are stored in an `Arc<RwLock<HashMap<String, PathBuf>>>` so they can be shared between the custom protocol closure and the app state for hot-reloading.

Methods:
- `add_plugin_dir(id, path)` -- Register a plugin directory
- `clear_plugin_dirs()` -- Remove all plugin directories
- `plugin_dirs_handle()` -- Get a shared `Arc<RwLock<...>>` handle

### 3. Base Directory (Filesystem)

Falls back to reading from `{base_dir}/{clean_path}` on disk. The base directory is typically the `assets/` folder at the workspace root. This is useful during development to iterate on panel HTML without rebuilding.

### 4. Embedded Assets (Compile-Time)

If the file is not found on disk (or the base directory does not exist), the content provider falls back to assets embedded in the binary at compile time via `include_dir`. The `assets/panels/` directory is statically included in the `jarvis-webview` crate, making the binary fully self-contained. The embedded path strips the `panels/` prefix since the embedded directory is rooted at `assets/panels/`.

```rust
static EMBEDDED_PANELS: Dir<'_> = include_dir!("$CARGO_MANIFEST_DIR/../../assets/panels");
```

This means the binary works correctly regardless of working directory -- no need to ship the `assets/` folder alongside the executable.

### Security: Directory Traversal Prevention

All filesystem resolution includes canonicalization-based containment checks:

```rust
let canonical_base = std::fs::canonicalize(&self.base_dir).ok()?;
let canonical_file = std::fs::canonicalize(&file_path).ok()?;
if !canonical_file.starts_with(&canonical_base) {
    return None; // Blocked
}
```

This blocks:
- `../../etc/passwd`
- `panels/../../../etc/passwd`
- Symlink-based traversal
- Absolute paths like `/etc/passwd`

Plugin directories have their own independent containment check.

### MIME Type Detection

MIME types are determined by file extension:

| Extension | MIME Type |
|-----------|-----------|
| `.html`, `.htm` | `text/html` |
| `.css` | `text/css` |
| `.js`, `.mjs` | `application/javascript` |
| `.json` | `application/json` |
| `.png` | `image/png` |
| `.jpg`, `.jpeg` | `image/jpeg` |
| `.gif` | `image/gif` |
| `.svg` | `image/svg+xml` |
| `.wasm` | `application/wasm` |
| `.ico` | `image/x-icon` |
| `.woff` | `font/woff` |
| `.woff2` | `font/woff2` |
| `.ttf` | `font/ttf` |
| `.otf` | `font/otf` |
| `.mp3` | `audio/mpeg` |
| `.ogg` | `audio/ogg` |
| `.wav` | `audio/wav` |
| `.mp4` | `video/mp4` |
| `.webm` | `video/webm` |
| `.webp` | `image/webp` |
| `.txt` | `text/plain` |
| `.xml` | `application/xml` |
| (unknown) | `application/octet-stream` |

## WebView Creation & Lifecycle

**Source:** `jarvis-rs/crates/jarvis-webview/src/manager/lifecycle.rs`, `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/lifecycle.rs`

### WebViewConfig

Every WebView is created from a `WebViewConfig`:

```rust
pub struct WebViewConfig {
    pub url: Option<String>,         // Initial URL (mutually exclusive with html)
    pub html: Option<String>,        // Initial HTML (mutually exclusive with url)
    pub transparent: bool,           // Default: true on macOS, false on Windows/Linux
    pub devtools: bool,              // Default: true in debug, false in release
    pub user_agent: Option<String>,  // Default: "Jarvis/0.1"
    pub clipboard: bool,             // Default: true
    pub autoplay: bool,              // Default: true
}
```

Convenience constructors:
- `WebViewConfig::with_url(url)` -- Load a URL with all other defaults
- `WebViewConfig::with_html(html)` -- Render inline HTML with all other defaults

### Creation Sequence

When `WebViewManager::create()` is called:

1. **Builder initialization** -- `WebViewBuilder::new()` with bounds, transparency, devtools, clipboard, autoplay, and `focused(false)`.

2. **IPC init script injection** -- The `IPC_INIT_SCRIPT` is injected via `with_initialization_script()`. This script runs before any page JavaScript and sets up the `window.jarvis.ipc` bridge.

3. **User agent** -- Set to `"Jarvis/0.1"` by default.

4. **Handler attachment** -- Four handlers are attached to the builder:
   - **IPC handler** (`with_ipc_handler`) -- Validates JSON and pushes `WebViewEvent::IpcMessage` to the event queue.
   - **Page load handler** (`with_on_page_load_handler`) -- Pushes `WebViewEvent::PageLoad` with `Started` or `Finished` state.
   - **Title change handler** (`with_document_title_changed_handler`) -- Pushes `WebViewEvent::TitleChanged`.
   - **Navigation handler** (`with_navigation_handler`) -- Allowlist check; blocks disallowed URLs, pushes `WebViewEvent::NavigationRequested`.

5. **Custom protocol** -- The `jarvis://` protocol is registered via `with_custom_protocol()` if a `ContentProvider` is set.

6. **Initial content** -- Sets URL, HTML, or a blank page.

7. **Build** -- `builder.build_as_child(window)` creates the WebView as a child of the main OS window.

8. **Theme injection** -- After creation, `inject_theme_into_all_webviews()` is called to push CSS variables and xterm theme to the new panel.

### Application-Level Lifecycle

In the application layer (`webview_bridge/lifecycle.rs`):

- `create_webview_for_pane(pane_id)` -- Creates with `PaneKind::Terminal` default.
- `create_webview_for_pane_with_kind(pane_id, kind)` -- Creates with the panel URL for the given kind.
- `create_webview_for_pane_with_url(pane_id, url)` -- Creates with an arbitrary URL.
- `destroy_webview_for_pane(pane_id)` -- Kills the PTY (if any), then destroys the WebView.
- `show_boot_webview()` -- Creates a fullscreen WebView for the boot animation at pane ID 0.
- `handle_boot_complete()` -- Destroys boot WebView, sets up default panel layout.
- `sync_webview_bounds()` -- Recomputes tiling layout and repositions all WebViews.
- `poll_webview_events()` -- Drains the event queue and dispatches each event.

### Boot Sequence

1. App creates a fullscreen boot WebView at pane ID 0 loading `jarvis://localhost/boot/index.html`.
2. The boot page runs its animation.
3. JavaScript sends `boot_complete` IPC message.
4. Rust destroys the boot WebView, creates the default panel layout.

### Coordinate Conversion

**Source:** `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/bounds.rs`

Tiling rects (f64 logical coordinates) are converted to wry rects:

```rust
fn tiling_rect_to_wry(rect: &Rect) -> wry::Rect {
    wry::Rect {
        position: wry::dpi::Position::Logical(LogicalPosition::new(rect.x, rect.y)),
        size: wry::dpi::Size::Logical(LogicalSize::new(rect.width, rect.height)),
    }
}
```

The tiling viewport accounts for:
- macOS custom titlebar height (top offset)
- Tab bar height
- Status bar height (bottom offset)

## The IPC Bridge: JavaScript API

**Source:** `jarvis-rs/crates/jarvis-webview/src/ipc.rs` (the `IPC_INIT_SCRIPT` constant)

The IPC init script is injected into every WebView before page content loads. It creates the `window.jarvis.ipc` object with the following API:

### `window.jarvis.ipc.send(kind, payload)`

Fire-and-forget message to Rust. The message is JSON-serialized and sent via `window.ipc.postMessage()`.

```javascript
window.jarvis.ipc.send('pty_input', { data: 'ls\n' });
```

Wire format:
```json
{ "kind": "pty_input", "payload": { "data": "ls\n" } }
```

### `window.jarvis.ipc.postMessage(msg)`

Low-level method that JSON-stringifies an arbitrary object and sends it. Used internally by `send()`.

```javascript
window.jarvis.ipc.postMessage({ kind: 'ping', payload: null });
```

### `window.jarvis.ipc.on(kind, callback)`

Register a handler for messages dispatched from Rust to JavaScript.

```javascript
window.jarvis.ipc.on('pty_output', function(payload) {
    xterm.write(payload.data);
});
```

Rust dispatches to these handlers by evaluating:
```javascript
window.jarvis.ipc._dispatch("pty_output", {"data": "..."});
```

### `window.jarvis.ipc.request(kind, payload)`

Request-response pattern for async Rust calls. Returns a `Promise` that resolves with the Rust response or rejects on timeout (10 seconds).

```javascript
window.jarvis.ipc.request('clipboard_paste', {}).then(function(resp) {
    console.log(resp.text);
});
```

**How it works:**

1. JS assigns a unique `_reqId` to the payload and stores resolve/reject callbacks in `_pendingRequests`.
2. The message is sent to Rust via `send()`.
3. Rust processes the request and sends a response back via `send_ipc()` with the same `_reqId` in the payload.
4. The overridden `_dispatch()` function checks for `_reqId` in incoming messages. If found, it resolves or rejects the matching pending Promise.
5. If `payload.error` is set, the Promise rejects. Otherwise, it resolves with `payload.result` (or the full payload if no `result` key).
6. A 10-second timeout auto-rejects abandoned requests.

### `window.jarvis.ipc._dispatch(kind, payload)`

Internal method. Rust calls this (via `evaluate_script`) to push messages to JavaScript. The dispatch function first checks for `_reqId` (request-response pattern), then falls through to registered `on()` handlers.

### `window.jarvis.ipc._handlers`

Internal map of `kind -> callback` registered via `on()`.

### `window.jarvis.ipc._pendingRequests`

Internal map of `reqId -> { resolve, reject }` for pending request-response calls.

## IPC Message Kinds Reference

### Messages from JavaScript to Rust (JS -> Rust)

Every message must have a `kind` field that appears in the `ALLOWED_IPC_KINDS` allowlist or it is rejected.

#### Terminal / PTY

| Kind | Payload | Description |
|------|---------|-------------|
| `pty_input` | `{ data: string }` | Write keystroke data to the pane's PTY |
| `pty_resize` | `{ cols: number, rows: number }` | Resize the PTY (sanity-checked: 1-500) |
| `pty_restart` | `{ cols: number, rows: number }` | Kill existing PTY and spawn a new one |
| `terminal_ready` | `{ cols: number, rows: number }` | Terminal panel loaded; spawn a PTY if not already present |

#### Panel Management

| Kind | Payload | Description |
|------|---------|-------------|
| `panel_focus` | `{}` | The user clicked in this panel; switch tiling focus |
| `open_panel` | `{ panel: "terminal"\|"assistant"\|"chat"\|"settings"\|"presence" }` | Open a new panel (splits the focused pane horizontally) |
| `panel_close` | (none) | Close this panel (refused if it's the last pane) |
| `panel_toggle` | `{ panel: string }` | Toggle a panel from the status bar |
| `open_settings` | (none) | Open or focus the settings panel |
| `launch_game` | `{ game: "tetris"\|"asteroids"\|"minesweeper"\|"pinball"\|"doodlejump"\|"draw"\|"subway"\|"videoplayer"\|"emulator" }` | Navigate the current pane to a game; stores original URL for Escape-back |

#### Settings

| Kind | Payload | Description |
|------|---------|-------------|
| `settings_init` | (none) | Settings panel loaded; requests current config, themes list |
| `settings_set_theme` | `{ name: string }` | Switch to a named theme; reloads and re-injects into all panels |
| `settings_update` | `{ path: string, value: any }` | Update a single config field (auto-saves to TOML, broadcasts CSS) |
| `settings_reset_section` | `{ section: string }` | Reset an entire config section to defaults |
| `settings_get_config` | (none) | Request full config JSON |

#### Presence

| Kind | Payload | Description |
|------|---------|-------------|
| `presence_request_users` | (none) | Request current online user list |

| Kind | Payload | Description |

| Kind | Payload | Description |
|------|---------|-------------|

## IPC Allowlist & Security

**Source:** `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/ipc_dispatch.rs`

### Allowlist

Every IPC message from JavaScript is checked against a static allowlist before dispatch. Messages with an unknown `kind` are rejected and logged as warnings.

The complete allowlist:

```
pty_input, pty_resize, pty_restart, terminal_ready,
panel_focus, presence_request_users, presence_poke,
settings_init, settings_set_theme, settings_update,
settings_reset_section, settings_get_config,
assistant_input, assistant_ready,
open_panel, panel_close, panel_toggle, open_settings,
status_bar_init, launch_game, ping, boot_complete,
crypto, window_drag, keybind, read_file,
clipboard_copy, clipboard_paste, open_url,
palette_click, palette_hover, palette_dismiss,
debug_event
```

The check is case-sensitive and exact-match. `"PTY_INPUT"`, `"pty_input_extra"`, `"pty_input\0"`, `"ping; rm -rf /"` are all rejected.

### JSON Validation

Before the IPC message even reaches the allowlist check, the raw `ipc_handler` in `handlers.rs` validates that the body is valid JSON:

```rust
if serde_json::from_str::<serde_json::Value>(&body).is_err() {
    warn!("IPC message rejected: invalid JSON");
    return;
}
```

### Message Parsing

The body is then parsed as an `IpcMessage`:

```rust
pub struct IpcMessage {
    pub kind: String,
    pub payload: IpcPayload,
}

pub enum IpcPayload {
    Text(String),
    Json(serde_json::Value),
    None,
}
```

If parsing fails, the message is rejected.

### Additional Per-Handler Validation

Individual handlers perform their own validation:
- **Panel names** are checked against `ALLOWED_PANELS`: `["terminal", "assistant", "chat", "settings", "presence"]`
- **Game names** are checked against `ALLOWED_GAMES`: `["tetris", "asteroids", "minesweeper", "pinball", "doodlejump", "draw", "subway", "videoplayer", "emulator"]`
- **Settings paths** are checked against `VALID_PATHS` (100+ whitelisted dotted paths like `"colors.primary"`, `"font.size"`)
- **PTY resize** values are sanity-checked: cols/rows must be 1-500
- **Assistant input** is capped at 4096 characters
- **Presence poke** target_user_id must be non-empty and at most 64 characters
- **Crypto operations** are validated by operation name: `init`, `derive_room_key`, `derive_shared_key`, `encrypt`, `decrypt`, `sign`, `verify`
- **Display names** are sanitized: only alphanumeric, spaces, hyphens; truncated to 20 chars

## Navigation Handler & Allowlist

**Source:** `jarvis-rs/crates/jarvis-webview/src/manager/handlers.rs`

The navigation handler controls which URLs a WebView is allowed to load. It uses a two-tier approach:

### Tier 1: HTTP/HTTPS Always Allowed

Any URL starting with `https://` or `http://` is permitted. This allows panels to load CDN resources (e.g., Supabase, xterm.js) and navigate to external games.

### Tier 2: Non-HTTP Scheme Allowlist

For non-HTTP/HTTPS schemes, the URL must match one of the `ALLOWED_NAV_PREFIXES`:

| Prefix | Purpose |
|--------|---------|
| `jarvis://` | Custom protocol for bundled assets |
| `http://jarvis.localhost` | WebView2 (Windows) rewrite of `jarvis://` |
| `about:blank` | Default empty page |

### Blocked Schemes

The following are blocked:
- `file://` -- Prevents reading local filesystem
- `javascript:` -- Prevents JS injection via URL
- `data:` -- Prevents inline content injection
- `ftp://` -- Not needed
- Empty strings, garbage

### Behavior on Block

When a navigation is blocked:
1. A `tracing::warn!` is emitted with the pane ID and URL.
2. The handler returns `false`, preventing the navigation.
3. No `WebViewEvent::NavigationRequested` is emitted for blocked URLs.

## Theme Bridge

**Source:** `jarvis-rs/crates/jarvis-webview/src/theme_bridge/`, `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/theme_handlers.rs`

The theme bridge converts Jarvis configuration values into CSS custom properties and xterm.js theme objects, then injects them into all active WebViews.

### CSS Variable Injection

The config is mapped to 33 CSS custom properties:

**Colors (12):**
`--color-primary`, `--color-secondary`, `--color-background`, `--color-panel-bg`, `--color-text`, `--color-text-muted`, `--color-border`, `--color-border-focused`, `--color-user-text`, `--color-success`, `--color-warning`, `--color-error`

**Font (6):**
`--font-family`, `--font-size`, `--font-title-size`, `--line-height`, `--font-ui`, `--font-ui-size`

**Layout (7):**
`--border-radius`, `--panel-padding`, `--panel-gap`, `--scrollbar-width`, `--border-width`, `--outer-padding`, `--inactive-opacity`

**Effects (4):**
`--blur-radius`, `--saturate`, `--transition-speed`, `--glow-intensity`

**Other (4):**
`--panel-opacity`, `--titlebar-height`, `--status-bar-height`, `--status-bar-bg`

### Injection Mechanism

CSS variables are injected live (no page reload) via `document.documentElement.style.setProperty()`:

```javascript
(function() {
  var s = document.documentElement.style;
  s.setProperty('--color-primary', '#cba6f7');
  s.setProperty('--font-size', '13px');
  // ...
})();
```

### xterm.js Theme

Terminal panels receive a separate theme object via `window.jarvis.ipc._dispatch('theme', {...})`:

```json
{
  "xterm": {
    "background": "#1e1e2e",
    "foreground": "#cdd6f4",
    "cursor": "#cba6f7",
    "cursorAccent": "#1e1e2e",
    "selectionBackground": "rgba(203, 166, 247, 0.25)",
    "selectionForeground": "#1e1e2e",
    "black": "#45475a", "red": "#f38ba8", "green": "#a6e3a1",
    "yellow": "#f9e2af", "blue": "#89b4fa", "magenta": "#f5c2e7",
    "cyan": "#94e2d5", "white": "#bac2de",
    "brightBlack": "#585b70", "brightRed": "#f38ba8",
    "brightGreen": "#a6e3a1", "brightYellow": "#f9e2af",
    "brightBlue": "#89b4fa", "brightMagenta": "#f5c2e7",
    "brightCyan": "#94e2d5", "brightWhite": "#a6adc8"
  },
  "fontSize": 13,
  "fontFamily": "'Menlo', monospace",

The theme is also stored at `window.__jarvis_theme` for panels that need to read it synchronously.
