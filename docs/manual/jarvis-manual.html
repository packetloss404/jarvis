## 8.15 Complete Example: Pomodoro Timer

This example demonstrates a full plugin with timer logic, multiple states, and localStorage persistence.

### plugin.toml

```toml
name = "Pomodoro Timer"
category = "Productivity"
```

### index.html

```html
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--color-panel-bg, rgba(30,30,46,0.88));
      color: var(--color-text, #cdd6f4);
      font-family: var(--font-ui, sans-serif);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }
    .timer {
      font-family: var(--font-family, 'Menlo');
      font-size: 72px;
      font-weight: bold;
      color: var(--color-primary, #cba6f7);
    }
    .timer.break { color: var(--color-success, #a6e3a1); }
    .timer.warning { color: var(--color-warning, #f9e2af); }
    .label {
      font-size: 16px;
      color: var(--color-text-muted, #6c7086);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .controls { display: flex; gap: 12px; }
    button {
      background: var(--color-primary, #cba6f7);
      color: var(--color-background, #1e1e2e);
      border: none;
      padding: 10px 24px;
      border-radius: calc(var(--border-radius, 8px) / 2);
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
    }
    button:hover { opacity: 0.85; }
    button.secondary {
      background: var(--color-border, #181825);
      color: var(--color-text, #cdd6f4);
    }
    .sessions {
      font-size: 13px;
      color: var(--color-text-muted, #6c7086);
    }
  </style>
</head>
<body>
  <div class="label" id="label">Focus Time</div>
  <div class="timer" id="timer">25:00</div>
  <div class="controls">
    <button id="startBtn" onclick="toggleTimer()">Start</button>
    <button class="secondary" onclick="resetTimer()">Reset</button>
    <button class="secondary" onclick="skipPhase()">Skip</button>
  </div>
  <div class="sessions" id="sessions">Sessions: 0</div>

  <script>
    const WORK_MINUTES = 25;
    const BREAK_MINUTES = 5;
    const LONG_BREAK_MINUTES = 15;

    let seconds = WORK_MINUTES * 60;
    let running = false;
    let interval = null;
    let isBreak = false;
    let sessionCount = parseInt(localStorage.getItem('pomodoro:sessions') || '0');

    const timerEl = document.getElementById('timer');
    const labelEl = document.getElementById('label');
    const sessionsEl = document.getElementById('sessions');
    const startBtn = document.getElementById('startBtn');

    sessionsEl.textContent = `Sessions: ${sessionCount}`;

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function updateDisplay() {
      timerEl.textContent = formatTime(seconds);
      timerEl.className = 'timer' +
        (isBreak ? ' break' : '') +
        (!isBreak && seconds <= 60 ? ' warning' : '');
    }

    function toggleTimer() {
      if (running) {
        clearInterval(interval);
        running = false;
        startBtn.textContent = 'Resume';
      } else {
        running = true;
        startBtn.textContent = 'Pause';
        interval = setInterval(() => {
          seconds--;
          if (seconds <= 0) {
            clearInterval(interval);
            running = false;
            if (!isBreak) {
              sessionCount++;
              localStorage.setItem('pomodoro:sessions', String(sessionCount));
              sessionsEl.textContent = `Sessions: ${sessionCount}`;
            }
            switchPhase();
          }
          updateDisplay();
        }, 1000);
      }
    }

    function switchPhase() {
      isBreak = !isBreak;
      if (isBreak) {
        const isLong = sessionCount % 4 === 0;
        seconds = (isLong ? LONG_BREAK_MINUTES : BREAK_MINUTES) * 60;
        labelEl.textContent = isLong ? 'Long Break' : 'Short Break';
      } else {
        seconds = WORK_MINUTES * 60;
        labelEl.textContent = 'Focus Time';
      }
      startBtn.textContent = 'Start';
      updateDisplay();
    }

    function resetTimer() {
      clearInterval(interval);
      running = false;
      isBreak = false;
      seconds = WORK_MINUTES * 60;
      labelEl.textContent = 'Focus Time';
      startBtn.textContent = 'Start';
      updateDisplay();
    }

    function skipPhase() {
      clearInterval(interval);
      running = false;
      seconds = 0;
      if (!isBreak) {
        sessionCount++;
        localStorage.setItem('pomodoro:sessions', String(sessionCount));
        sessionsEl.textContent = `Sessions: ${sessionCount}`;
      }
      switchPhase();
    }

    updateDisplay();
  <\/script>
</body>
</html>
```

## 8.17 Cookbook: Common Patterns

### 8.17.1 Persistent Data Storage

```javascript
// Save
localStorage.setItem('my-plugin:data', JSON.stringify(myData));

// Load
const myData = JSON.parse(localStorage.getItem('my-plugin:data') || '{}');
```

Always namespace your keys with your plugin ID. All plugins share the same `jarvis://localhost` localStorage origin.

### 8.17.2 Clipboard Operations

```javascript
// Copy text to clipboard
function copyToClipboard(text) {
  window.jarvis.ipc.send('clipboard_copy', { text });
}

// Read from clipboard (async)
async function readClipboard() {
  const result = await window.jarvis.ipc.request('clipboard_paste', {});
  return result?.text || '';
}
```

### 8.17.3 URL Navigation

```javascript
function openUrl(url) {
  window.jarvis.ipc.send('open_url', { url });
}
```

### 8.17.4 Reading Image Files

```javascript
async function readImageFile(path) {
  const result = await window.jarvis.ipc.request('read_file', { path });
  // result.data_url contains a base64 data URL (e.g., "data:image/png;base64,...")
  return result;
}
```

Note: `read_file` currently only supports image files (PNG, JPEG, GIF, WebP, BMP) with a maximum size of 5 MB.

### 8.17.5 Opening Panels

```javascript
// Open a new terminal pane
window.jarvis.ipc.send('open_panel', { kind: 'terminal' });

// Close the current panel
window.jarvis.ipc.send('panel_close', {});
```

### 8.17.6 Full-Screen Canvas Plugin

```html
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
</style>
<canvas id="canvas"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Your rendering logic here
    requestAnimationFrame(draw);
  }
  draw();
<\/script>
```

### 8.17.7 Inter-Plugin Communication

Plugins share the same `localStorage` namespace. You can use this as a simple message bus:

```javascript
// Plugin A: send a message
localStorage.setItem('plugin-bus:message', JSON.stringify({
  from: 'plugin-a',
  type: 'data-updated',
  timestamp: Date.now()
}));

// Plugin B: listen for messages
window.addEventListener('storage', (e) => {
  if (e.key === 'plugin-bus:message') {
    const msg = JSON.parse(e.newValue);
    console.log('Got message from', msg.from, msg.type);
  }
});
```

Note: `storage` events only fire in other windows/tabs, not the one that made the change. Since plugins in different panes run in different webviews, this works for cross-pane communication.

## 8.18 Troubleshooting

### Plugin does not appear in the palette

1. **Check the folder location.** Verify the plugin is in the correct platform-specific directory (see Section 8.3.1).
2. **Check that `plugin.toml` exists** in the plugin's folder root. Directories without a manifest are silently skipped.
3. **Check for TOML syntax errors.** Make sure your manifest parses correctly. Look for `"Failed to parse plugin manifest"` warnings in the Jarvis log.
4. **Reload config.** Open the palette and select "Reload Config". Discovery only runs at startup and on config reload.
5. **Check for read errors.** Look for `"Failed to read plugin manifest"` warnings in the log (file permission issues, etc.).

### Plugin loads but shows a blank page

1. **Check the entry point.** Does `index.html` (or your custom entry from `plugin.toml`) exist in the plugin folder?
2. **Open DevTools** (right-click then "Inspect", or enable via `advanced.developer.inspector_enabled`) and check the console for errors.
3. **Check the URL.** The plugin loads at `jarvis://localhost/plugins/{folder-name}/{entry}`. Make sure the folder name and entry file match.
4. **On Windows, check the WebView2 rewrite.** Windows WebView2 rewrites `jarvis://localhost/...` to `http://jarvis.localhost/...`. Both forms are permitted by the navigation handler.

### IPC bridge is not available

1. **Check `window.jarvis`.** It should exist even before your script runs.
2. **Make sure you are loading via `jarvis://`**, not `file://` or `http://`. The IPC bridge is only injected for webviews created by Jarvis.

### CSS variables not working

1. **Use fallback values.** Always write `var(--color-primary, #cba6f7)` with a fallback. The second value is used if the variable is not set.
2. **Check in DevTools** that the `:root` styles are being injected. Theme injection happens via `inject_theme_into_all_webviews()`.

### Escape key closes my plugin unexpectedly

Pressing Escape when a plugin is loaded navigates back to the previous page. This is by design (same behavior as exiting a game). If you need Escape inside your plugin, capture it at the document level with `stopPropagation`, but be aware the capture-phase IPC listener may still see it. See Section 8.8.3 for details.

### Plugin assets return 404

1. **Check relative paths.** Assets should be relative to your HTML file: `<img src="icon.png">` not `<img src="/icon.png">`. Absolute paths resolve against `jarvis://localhost/`, not your plugin directory.
2. **Check file extensions.** Unknown extensions are served as `application/octet-stream` which may not render correctly.
3. **No directory traversal.** `../` paths outside your plugin folder will return 404 due to the containment check.

### Request-response times out

The `ipc.request()` method has a 10-second timeout. If your request consistently times out:

1. Verify the message `kind` is in the IPC allowlist (Section 8.11.3).
2. Check the Rust logs for any error processing the request.
3. Ensure you are using `request()` for message kinds that support request-response (`clipboard_paste`, `read_file`). Fire-and-forget messages like `clipboard_copy` do not send a response.

### localStorage data lost or shared unexpectedly

All plugins share the same `jarvis://localhost` localStorage origin. If you do not namespace your keys, one plugin may overwrite another's data. Always prefix keys with your plugin ID:

```javascript
localStorage.setItem('my-plugin:key', value);  // Good
localStorage.setItem('key', value);             // Bad -- may collide
```

---

This chapter covers Jarvis's networked features: the live chat system, online
presence, the mobile relay bridge, the cryptographic identity layer, and the
AI assistant panel.  Every subsystem is described from both the user-facing
perspective and the implementation perspective so that contributors can
navigate the codebase confidently.

## Table of Contents

1. [Live Chat System](#live-chat-system)
2. [Presence System](#presence-system)

6. [AI Assistant Panel](#ai-assistant-panel)
7. [Chat Panel Features](#chat-panel-features)

## Live Chat System

### Overview

Jarvis ships a multi-channel live chat panel that lets users communicate in
real time.  The chat is backed by **Supabase Realtime** (Phoenix Channels v1
protocol over WebSocket) and runs entirely inside a WebView panel loaded from
`jarvis://localhost/chat/index.html`.

### Architecture

```
 Chat WebView (HTML/JS)
   |
   |-- Supabase JS SDK (CDN, SRI-verified)
   |      |
   |      +-- wss://<project>.supabase.co/realtime/v1/websocket
   |
   |-- jarvis.ipc.request('crypto', ...)   (Rust-side CryptoService)
   |
   +-- AutoMod  (client-side moderation, JS)
```

All chat messages are broadcast via Supabase Realtime channels.  The chat
panel connects directly from the WebView; the Rust backend does **not**
proxy chat traffic.  Crypto operations (encryption, signing, key derivation)
are delegated to the Rust `CryptoService` through IPC so that WebView
JavaScript never handles raw key material.

### Channels

Seven channels are pre-configured:

| Supabase Channel ID          | Display Name |
|------------------------------|-------------|
| `jarvis-livechat`            | `# general` |
| `jarvis-livechat-discord`    | `# discord` |
| `jarvis-livechat-showoff`    | `# showoff` |
| `jarvis-livechat-help`       | `# help`    |
| `jarvis-livechat-random`     | `# random`  |
| `jarvis-livechat-games`      | `# games`   |
| `jarvis-livechat-memes`      | `# memes`   |

The `general` channel is the **primary** channel: it carries Supabase
Presence state (online user tracking).  All channels are subscribed at
startup so that messages arriving on background channels are buffered and
unread counts are tracked.

Channel switching is instant because every channel is pre-subscribed.
Source: `jarvis-rs/assets/panels/chat/index.html`, `CONFIG.CHANNELS`.

### Channels (Backend)

On the Rust side, `jarvis-social` provides a `ChannelManager` struct
(`jarvis-rs/crates/jarvis-social/src/channels.rs`) that maintains an
in-memory set of channels with member tracking.  Two channels are created
by default: `general` and `games`.  Users are auto-joined, and the manager
supports join, leave, leave-all, member listing, and per-user channel queries.

### Chat History

`ChatHistory` (`jarvis-rs/crates/jarvis-social/src/chat.rs`) is a bounded
in-memory ring buffer keyed by channel name.  Configuration:

| Parameter                  | Default |
|----------------------------|---------|
| `max_messages_per_channel` | 500     |

When the buffer is full, the oldest message is evicted on push.  The WebView
maintains its own parallel buffer (also capped at 500 messages per channel)
and its DOM is capped at 600 nodes to prevent unbounded growth.

### Message Flow (Send)

1. User types a message and presses Enter.
2. Sender-side **AutoMod** checks run: keyword filter, spam detection, rate
   limit.
3. Emoji shortcodes (`:smile:`, `:fire:`, etc.) are replaced with Unicode
   emoji.
4. The message is signed with the user's ECDSA P-256 key via
   `Identity.sign()` (IPC to Rust).
5. The payload is broadcast on the active Supabase channel:
   ```json
   {
     "id": "<uuid>",
     "userId": "<uuid>",
     "nick": "alice",
     "ts": 1700000000000,
     "text": "hello world",
     "sig": "<base64 ECDSA signature>",
     "pubkey": "<base64 SPKI DER>",
     "fingerprint": "aa:bb:cc:dd:ee:ff:00:11"
   }
   ```
6. The message is stored in the local channel history and rendered
   immediately with `verifyStatus: 'self'`.

### Message Flow (Receive)

1. A broadcast arrives on the Supabase channel subscription.
2. If `payload.userId === this.userId`, the message is dropped (self-echo
   prevention).
3. AutoMod filters run: keyword check on text and nickname, spam check
   (repeated character ratio, repeated identical messages), and per-user
   rate limiting.
4. ECDSA signature verification is performed via `Identity.verify()` (IPC).
5. The TOFU Trust Store checks whether the sender's fingerprint matches
   previously-seen identity for that nickname.
6. A verification badge is attached:
   - Checkmark (verified): signature valid, TOFU trusted or new.
   - Warning (key-changed): signature valid but fingerprint differs from
     previously recorded -- possible impersonation.
   - Cross (invalid): signature verification failed.
   - Question mark (unverified): no signature present.
7. The message is rendered and stored in the channel history.

### Image Messages

Users can paste images (Ctrl+V) or drag-and-drop image files into the chat
input.  Images are compressed via an HTML canvas to JPEG at 0.5 quality,
max width 300px, producing a `data:image/jpeg;base64,...` data URL.

Limits:

| Parameter         | Value     |
|-------------------|-----------|
| `MAX_IMAGE_LEN`   | 150,000 chars (~100 KB base64) |
| `IMAGE_MAX_WIDTH` | 300 px    |
| `IMAGE_QUALITY`   | 0.5       |

Images are sent as the `text` field of a normal message payload and rendered
as `<img>` elements with a click-to-lightbox viewer.

### Reactions

Messages support emoji reactions.  Reactions are broadcast as a separate
`reaction` event (unencrypted) with `{ msgId, emoji, userId, action }`.
A picker of 16 emoji is shown on hover.  Reactions are tracked per message
in the local history and persisted across channel switches.

### Direct Messages (DMs)

Users can open an end-to-end encrypted DM from the online users dropdown.
The flow:

1. User clicks a peer's "DM" button in the dropdown.
2. An ECDH shared key is derived: `Identity.deriveSharedKey(otherDhPubkey)`.
3. A deterministic DM channel name is computed from both fingerprints
   (sorted, concatenated with `jarvis-dm-` prefix).
4. A new Supabase channel subscription is created for the DM.
5. Outbound DM messages are encrypted with AES-256-GCM using the ECDH-derived
   key via `Crypto.encrypt()`.  The payload contains `iv` and `ct` (base64)
   instead of `text`.
6. Inbound DM messages are decrypted via `Crypto.decrypt()`.
7. Signatures are computed over `id|userId|nick|ts|iv|ct` (the ciphertext
   components, not plaintext) to prevent chosen-plaintext attacks on the
   signature oracle.

### Reconnection

If the primary channel drops, an exponential backoff reconnect strategy
engages:

| Parameter       | Value  |
|-----------------|--------|
| Base delay      | 2 s    |
| Max delay       | 30 s   |
| Max attempts    | 8      |
| Jitter          | 75-125% |

After max attempts, the user is prompted to reload.

---

## Presence System

### Overview

The presence system tracks which Jarvis users are online, their current
status, and activity.  It is implemented across two layers:

1. **`jarvis-social` crate** -- Rust-side presence client and event
   translator.
2. **Presence panel WebView** -- lightweight HTML panel that displays
   the user list and accepts poke interactions.

### Rust-Side Presence Client

Source: `jarvis-rs/crates/jarvis-social/src/presence/`

The `PresenceClient` connects to Supabase Realtime via the reusable
`RealtimeClient`.  On start:

1. A `RealtimeClient` is created with the configured `project_ref` and
   `api_key`.
2. The `jarvis-presence` channel is joined with presence tracking enabled
   (keyed by `user_id`).
3. The client tracks its presence with a payload containing:
   `user_id`, `display_name`, `status`, `activity`, `online_at`.
4. A background `event_translator` task converts low-level
   `RealtimeEvent`s into high-level `PresenceEvent`s.

### User Status Values

```rust
pub enum UserStatus {
    Online,       // Default
    Idle,
    InGame,
    InSkill,
    DoNotDisturb,
    Away,
}
```

### Presence Events

| Event              | Description |
|--------------------|-------------|
| `Connected`        | Channel joined; includes initial `online_count`. |
| `Disconnected`     | Connection lost; user list cleared. |
| `UserOnline`       | Another user joined. |
| `UserOffline`      | Another user left. |
| `ActivityChanged`  | A user's status or activity text changed. |
| `GameInvite`       | A user broadcast a game invitation. |
| `Poked`            | Someone poked this user (targeted by `target_user_id`). |
| `ChatMessage`      | A chat message arrived on the presence channel. |
| `Error`            | Connection or protocol error. |

### Broadcast Events

Four broadcast event types ride on the `jarvis-presence` channel:

| Event Name         | Payload Type             |
|--------------------|--------------------------|
| `activity_update`  | `ActivityUpdatePayload`  |
| `game_invite`      | `GameInvitePayload`      |
| `poke`             | `PokePayload`            |
| `chat_message`     | `ChatMessagePayload`     |

### App Integration

Source: `jarvis-rs/crates/jarvis-app/src/app_state/social.rs`

The `JarvisApp` struct runs the presence client on a dedicated Tokio runtime
(1 worker thread).  A `std::sync::mpsc` channel bridges async events to the
synchronous main thread.  `poll_presence()` drains events on every frame:

- Updates the in-memory `online_users` list.
- Sends updates to presence panel webviews via `evaluate_script`.
- Generates desktop notifications for pokes.
- Dispatches `PresenceCommand`s (poke, activity update) to the async task.

### Identity

Source: `jarvis-rs/crates/jarvis-social/src/identity.rs`

Each Jarvis instance generates a UUID-based identity on startup.  The
`display_name` defaults to the OS `USER`/`USERNAME` environment variable.
Identities support optional Supabase Auth JWTs for authenticated connections.
The access token is never serialized (`#[serde(skip)]`) and redacted in
`Debug` output.

### Presence Panel (WebView)

Source: `jarvis-rs/assets/panels/presence/index.html`

The presence panel displays:

- Connection status indicator (dot: green = connected, red = error, gray =
  offline).
- Online user count (clickable to toggle user list dropdown).
- User list with: avatar (deterministic color from name hash), display name,
  status dot (color-coded by `UserStatus`), activity text.
- Poke button per user (sends `presence_poke` IPC to Rust, which sends a
  targeted broadcast).
- Notification feed (max 10 lines, auto-scrolling).

IPC messages received from Rust:
- `presence_update` -- status text update.
- `presence_users` -- full user list array.
- `presence_notification` -- single notification line.

IPC messages sent to Rust:
- `presence_request_users` -- requests fresh user list.
- `presence_poke` -- poke a user by `target_user_id`.

### Heartbeat and Reconnect

The Supabase Realtime connection sends Phoenix heartbeat messages at a
configurable interval:

| Parameter                 | Default |
|---------------------------|---------|
| `heartbeat_interval_secs` | 25 s    |
| `reconnect_delay_secs`    | 1 s     |
| `max_reconnect_delay_secs`| 30 s    |

Reconnection uses exponential backoff: `delay = min(delay * 2, max_delay)`.
On reconnect, previously-joined channels are automatically re-joined and
presence is re-tracked.

---

## Relay System and Mobile Bridge

### Overview

The relay system enables a mobile phone to connect to a desktop Jarvis
instance and interact with its terminal sessions.  It consists of three
components:

1. **`jarvis-relay`** -- a standalone WebSocket relay server (binary crate).
2. **Relay client** -- outbound WebSocket connection from the desktop app.
3. **Mobile client** -- connects from the phone to the relay.

The relay is a thin message forwarder that never inspects payload content.
All PTY data is end-to-end encrypted between the desktop and mobile
endpoints.

### Relay Server (`jarvis-relay`)

Source: `jarvis-rs/crates/jarvis-relay/src/`

The relay is a standalone Tokio application that:

- Listens for TCP connections on a configurable port (default 8080).
- Accepts WebSocket upgrades.
- Pairs connections by session ID (one desktop + one mobile per session).
- Forwards text frames bidirectionally between paired peers.

#### Hello Protocol

The first message from each client identifies its role:

```json
// Desktop
{"type": "desktop_hello", "session_id": "abc123..."}

// Mobile
{"type": "mobile_hello", "session_id": "abc123..."}
```

Desktop clients **create** sessions; mobile clients **join** existing ones.
After hello, all subsequent text frames are forwarded opaquely to the peer.

#### Session Lifecycle

```
Desktop connects  -->  Session created (desktop_tx = Some)
                       Relay sends: session_ready
Mobile connects   -->  mobile_tx = Some
                       Relay sends: peer_connected to both
Mobile disconnects ->  mobile_tx = None
                       Relay sends: peer_disconnected to desktop
Desktop disconnects -> Session removed if both sides gone
```

#### Session Store

`SessionStore` (`session.rs`) maps session IDs to `Session` structs
containing optional `mpsc::Sender<String>` handles for each role.  A stale
session reaper runs every 60 seconds and removes sessions older than
`session_ttl` (default 300 seconds) that have no mobile peer.

#### Rate Limiting

`RateLimiter` (`rate_limit.rs`) enforces:

| Parameter                  | Default | Description |
|----------------------------|---------|-------------|
| `max_connections_per_ip`   | 10      | Concurrent WebSocket connections per IP |
| `max_connect_rate_per_ip`  | 20      | New connections per IP per rate window |
| `rate_window_secs`         | 60      | Sliding window for rate counting |
| `max_total_sessions`       | 1000    | Global session cap |
| `max_session_id_len`       | 64      | Maximum session ID length in bytes |

Rate-limited connections are rejected before the WebSocket handshake
completes.  Stale rate-limit entries are pruned on each connection attempt.

#### CLI Arguments

```
jarvis-relay [OPTIONS]

Options:
  -p, --port <PORT>                    Port to listen on [default: 8080]
      --session-ttl <SECONDS>          Max stale session age [default: 300]
      --max-connections-per-ip <N>     Per-IP concurrent limit [default: 10]
      --max-sessions <N>              Global session cap [default: 1000]
```

### Desktop Relay Client

Source: `jarvis-rs/crates/jarvis-app/src/app_state/ws_server/`

The desktop side connects **outbound** to the relay server.

#### Startup

1. A session ID is loaded from disk (`~/.config/jarvis/relay_session_id`)
   or generated as a 32-character alphanumeric string and persisted.
2. A `MobileBroadcaster` (tokio `broadcast::channel`, capacity 256) is
   created for PTY output fan-out.
3. The relay client task connects to the configured relay URL, sends
   `desktop_hello`, and waits for `session_ready`.
4. Auto-reconnect with exponential backoff (1s base, 30s max).

#### Message Flow (Desktop to Mobile)

```
PTY output
  --> poll_pty_output() on main thread
  --> MobileBroadcaster.send(ServerMessage::PtyOutput)
  --> relay client task receives broadcast
  --> RelayCipher.encrypt_server_message()  (AES-256-GCM)
  --> RelayEnvelope::Encrypted { iv, ct }
  --> relay WebSocket --> relay server --> mobile client
```

#### Message Flow (Mobile to Desktop)

```
Mobile input arrives at relay server --> forwarded to desktop WebSocket
  --> relay client task receives frame
  --> Parse as RelayEnvelope
  --> If Encrypted: RelayCipher.decrypt_client_message()
  --> ClientCommand::PtyInput or PtyResize
  --> std::sync::mpsc to main thread
  --> poll_mobile_commands() writes to PTY
```

#### Wire Protocol (Inner)

Source: `jarvis-rs/crates/jarvis-app/src/app_state/ws_server/protocol.rs`

Messages between desktop and mobile (inside the relay envelope):

**Server (Desktop) to Client (Mobile):**
| Type         | Fields                          |
|-------------|----------------------------------|
| `pty_output` | `pane_id: u32`, `data: String`  |
| `pty_exit`   | `pane_id: u32`, `code: u32`     |
| `pane_list`  | `panes: [PaneInfo]`, `focused_id` |

**Client (Mobile) to Server (Desktop):**
| Type         | Fields                          |
|-------------|----------------------------------|
| `pty_input`  | `pane_id: u32`, `data: String`  |
| `pty_resize` | `pane_id: u32`, `cols: u16`, `rows: u16` |
| `ping`       | *(empty)*                       |

#### Relay Envelope

Source: `relay_protocol.rs`

```rust
pub enum RelayEnvelope {
    KeyExchange { dh_pubkey: String },
    Encrypted { iv: String, ct: String },
    Plaintext { payload: String },
}
```

- `KeyExchange` -- carries the DH public key (SPKI DER, base64) for ECDH.
- `Encrypted` -- AES-256-GCM ciphertext with base64-encoded IV and
  ciphertext.
- `Plaintext` -- only accepted before encryption is established; rejected
  after a cipher is active to prevent downgrade attacks.

## Mobile Device Pairing

### QR Code Flow

Source: `jarvis-rs/crates/jarvis-app/src/app_state/ws_server/pairing.rs`

The pairing process is triggered by the `PairMobile` action (available from
the command palette).

1. The desktop must have an active relay session (session ID available).
2. A pairing URL is constructed:
   ```
   jarvis://pair?relay=<relay_url>&session=<session_id>&dhpub=<url_encoded_dh_pubkey>
   ```
3. The URL is encoded as a QR code using Unicode half-block characters
   (upper/lower half blocks for two-row compression).
4. The QR code is displayed in the focused terminal pane via PTY output,
   along with the raw URL for manual entry.

### Key Exchange

After the mobile client scans the QR code and connects through the relay:

1. The relay sends `peer_connected` to both sides.
2. The desktop sends its ECDH public key to mobile via a `KeyExchange`
   envelope.
3. The mobile sends its ECDH public key back.
4. The desktop derives a shared AES-256 key:
   `CryptoService::derive_shared_key(mobile_dh_pubkey)`.
5. The raw 32-byte key is exported via `CryptoService::export_key()` and
   sent to the relay client task via a `tokio::sync::watch` channel.
6. The relay client creates a `RelayCipher` with the shared key.
7. From this point, all messages are encrypted.
8. The QR code pane is cleared and replaced with a "Mobile paired
   (encrypted)" confirmation message.

### Revocation

The `RevokeMobilePairing` action:

1. Shuts down the existing relay client connection.
2. Clears the `MobileBroadcaster`, command receivers, event receivers, key
   state, and peer-connected flag.
3. Deletes the persisted session ID file from disk.
4. Restarts the relay client with a freshly generated session ID.

This effectively invalidates the old pairing -- the mobile device can no
longer connect because the session ID has changed.  The cipher is also
cleared, requiring a full new key exchange.

### Security Note

When a `PeerDisconnected` message arrives from the relay, the desktop
intentionally does **not** clear the cipher.  A malicious relay could send
fake `PeerDisconnected` to force a plaintext downgrade.  The cipher is only
cleared on explicit revoke/re-pair.

---

## Crypto Service and Identity

### Overview

Source: `jarvis-rs/crates/jarvis-platform/src/crypto.rs`

The `CryptoService` is the central cryptographic engine for Jarvis.  It
manages persistent identity keys and ephemeral session keys.  The WebView
JavaScript never directly handles cryptographic keys -- all operations are
proxied through IPC to Rust.

### Identity Keys

Each Jarvis installation generates and persists two P-256 (secp256r1) key
pairs:

1. **ECDSA signing key** -- used for message signing and verification.
2. **ECDH key** -- used for Diffie-Hellman key agreement (DMs, mobile
   pairing).

Keys are stored in PKCS#8 DER format, base64-encoded, in a JSON identity
file:

```json
{
  "version": 1,
  "ecdsa_pkcs8_b64": "...",
  "ecdh_pkcs8_b64": "..."
}
```

On Unix, the identity file is written with mode `0600` (owner read/write
only).

### Public Key Export

Both public keys are exported as SPKI DER, base64-encoded, and made
available as:

- `pubkey_base64` -- ECDSA verifying key.
- `dh_pubkey_base64` -- ECDH public key.

### Fingerprint

The fingerprint is the first 8 bytes of `SHA-256(ECDSA SPKI DER)`,
formatted as colon-separated hex:

```
aa:bb:cc:dd:ee:ff:00:11
```

This provides a human-readable identity summary for TOFU verification.

### Key Store

The `CryptoService` maintains an in-memory key store mapping opaque `u32`
handles to 32-byte AES-256 key values.  Handles are monotonically
increasing.  Key material never crosses the IPC boundary -- only handles
are shared with the WebView.

### Symmetric Key Derivation

Two derivation methods:

1. **Room key (PBKDF2):**
   `derive_room_key(room_name)` derives an AES-256 key using
   PBKDF2-HMAC-SHA256 with salt `jarvis-livechat-salt-v1` and 10,000
   iterations.  Deterministic: same room name always produces the same key.

2. **Shared key (ECDH):**
   `derive_shared_key(other_dh_spki_b64)` performs elliptic-curve
   Diffie-Hellman with another party's public key.  The raw shared secret
   is hashed with SHA-256 to produce the AES-256 key.

### Encryption / Decryption

All symmetric encryption uses **AES-256-GCM** with:

- 12-byte random nonce (IV).
- Output: `(iv_base64, ciphertext_base64)`.

### Signing / Verification

- `sign(data)` signs UTF-8 data with ECDSA-SHA256-P256 and returns a
  base64-encoded IEEE P1363 signature (r||s, 64 bytes).
- `verify(data, sig_b64, pubkey_b64)` verifies against an SPKI-encoded
  public key.

### IPC Operations

The chat panel communicates with the `CryptoService` via
`window.jarvis.ipc.request('crypto', { op, params })`:

| Operation          | Parameters                      | Returns |
|--------------------|--------------------------------|---------|
| `init`             | *(none)*                       | `fingerprint`, `pubkey`, `dhPubkey` |
| `derive_room_key`  | `room: string`                 | `keyHandle: number` |
| `derive_shared_key`| `dhPubkey: string`             | `keyHandle: number` |
| `encrypt`          | `plaintext`, `keyHandle`       | `iv`, `ct` |
| `decrypt`          | `iv`, `ct`, `keyHandle`        | `plaintext` |
| `sign`             | `data: string`                 | `signature: string` |
| `verify`           | `data`, `signature`, `pubkey`  | `valid: boolean` |

---

## AI Assistant Panel

### Overview

The AI assistant is an overlay panel that provides a conversational
interface to Claude (or other AI providers).

### Architecture

```
User types message
  --> handle_assistant_key("Enter")
  --> panel.take_input()
  --> send to assistant_tx (std::sync::mpsc)
  --> assistant_task (async, Tokio runtime)
      --> ClaudeClient.send_message_streaming()
      --> on_chunk callback sends AssistantEvent::StreamChunk
  --> poll_assistant() on main thread
      --> panel.append_streaming_chunk()
      --> send_assistant_ipc("assistant_chunk", ...)
```

Source:
- `jarvis-rs/crates/jarvis-app/src/app_state/assistant.rs`
- `jarvis-rs/crates/jarvis-app/src/app_state/assistant_task.rs`

### Assistant Task

The assistant task runs on the shared Tokio runtime (lazily created, 1
worker thread).  It:

1. Loads `ClaudeConfig` from environment variables (`ANTHROPIC_API_KEY`,
   etc.).
2. Creates a `Session` with a system prompt:
   *"You are Jarvis, an AI assistant embedded in a terminal emulator.
   Be concise and helpful. Use plain text, not markdown."*
3. Enters a receive loop on `user_rx`.
4. For each message, calls `session.chat_streaming()` which streams SSE
   chunks back via the `on_chunk` callback.
5. Sends `AssistantEvent::Done` when the response completes, or
   `AssistantEvent::Error` on failure.

### Event Types

| Event          | Description |
|----------------|-------------|
| `Initialized`  | Runtime ready, includes model name. |
| `StreamChunk`  | Partial text from streaming response. |
| `Done`         | Full response complete. |
| `Error`        | API or network error. |

### IPC Messages

The assistant panel webview receives:

| IPC Kind            | Payload |
|---------------------|---------|
| `assistant_config`  | `{ model_name }` |
| `assistant_chunk`   | `{ text }` |
| `assistant_output`  | `{ text }` (full accumulated response) |
| `assistant_error`   | `{ message }` |

### AI Engine (`jarvis-ai`)

Source: `jarvis-rs/crates/jarvis-ai/src/`

The AI engine provides:

- **`AiClient` trait** -- common interface with `send_message` and
  `send_message_streaming` methods.
- **`ClaudeClient`** -- Anthropic Claude API client with SSE streaming.
- **`GeminiClient`** -- Google Gemini API client.
- **`WhisperClient`** -- OpenAI Whisper speech-to-text client.
- **`SkillRouter`** -- dispatches requests to the appropriate provider
  based on skill name.  Default provider is Claude.
- **`Session`** -- manages conversation history, system prompts, tool
  definitions, and tool-call loops (up to 10 rounds).
- **`TokenTracker`** -- accumulates input/output token usage.

### Tool Calling

The `Session` supports tool calling.  `ToolDefinition`s are registered with
name, description, and JSON Schema parameters.  When the AI returns a
`ToolCall`, the session executes it via the registered `ToolExecutor`
callback and feeds the result back for the next round.  Maximum tool-call
loop iterations: 10.

---

## Chat Panel Features

### Supabase SDK (SRI)

The Supabase JavaScript SDK is loaded from a CDN with Subresource
Integrity verification:

```html
<script
  src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.97.0/dist/umd/supabase.min.js"
  integrity="sha384-1+ItoWbWcmVSm+Y+dJaUt4SEWNA21/jxef+Z0TSHHVy/dEUxEUEnZ1bHn6GT5hj+"
  crossorigin="anonymous">
<\/script>
```

SRI ensures the loaded script has not been tampered with.

### AutoMod

Source: `jarvis-rs/assets/panels/chat/index.html`, class `AutoMod`

Client-side auto-moderation runs on both outgoing and incoming messages.

**Keyword filter:**
A set of banned words is checked against message text using pre-compiled
word-boundary regexes (`\b<word>\b`, case-insensitive).  Words can be
added or removed at runtime via `addBanWord()` / `removeBanWord()`.

**Rate limiting:**
A sliding-window rate limiter tracks message timestamps per user:

| Parameter            | Default |
|----------------------|---------|
| `RATE_LIMIT_COUNT`   | 5       |
| `RATE_LIMIT_WINDOW`  | 10,000 ms |

Both sender-side and receiver-side rate limits are enforced.

**Spam detection:**
- Repeated character ratio: if >80% of a message (>5 chars) is the same
  character, it is blocked (`spam_repeated_chars`).
- Repeated message history: if the last 3 messages from a user are
  identical, the message is blocked (`spam_repeated_message`).

**Cleanup:**
A periodic cleanup runs every 60 seconds to prune stale rate-limit
entries and cap spam history to 200 users.

### AutoMod (Backend Configuration)

Source: `jarvis-rs/crates/jarvis-config/src/schema/livechat.rs`

```toml
[livechat.automod]
enabled = true
filter_profanity = true
rate_limit = 5
max_message_length = 500
spam_detection = true
```

### Nickname System

Nicknames are configurable per the `NicknameConfig`:

| Parameter      | Default  |
|----------------|----------|
| `min_length`   | 1        |
| `max_length`   | 20       |
| `pattern`      | `^[a-zA-Z0-9_\- ]+$` |
| `persist`      | true     |
| `allow_change` | true     |

Nicknames are persisted to `localStorage` and subjected to keyword
filtering before being accepted.

### TOFU Trust Store

The chat panel implements a Trust On First Use (TOFU) model for identity
verification.  When a nickname-fingerprint pair is first seen, it is
recorded in `localStorage` under `jarvis-chat-tofu`.  On subsequent
messages:

- If the fingerprint matches: `trusted` (green checkmark).
- If the fingerprint differs: `changed` (amber warning + system message).
- If no fingerprint is present: `unverified` (gray question mark).

### XSS Prevention

All user-generated content (nicknames, message text, system messages) is
rendered using `element.textContent = value` rather than `innerHTML`,
preventing XSS injection.

---

## Workspace Streaming

**Source:** `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/chat_stream_handlers.rs`, `jarvis-rs/crates/jarvis-app/src/app_state/workspace_capture/`

Jarvis supports live workspace streaming to the chat panel, allowing mobile-connected users to see your desktop workspace in real time.

### Architecture

The chat panel sends a `chat_stream_control` IPC message with an action field:

| Action     | Effect |
|------------|--------|
| `"start"`  | Begins capturing workspace frames on a background thread |
| `"stop"`   | Stops the capture thread |
| `"status"` | Returns whether streaming is currently active |

When streaming is active, a background thread captures workspace frames at a fixed interval (`CHAT_STREAM_FRAME_INTERVAL = 350ms`) and sends them back to the chat WebView as `chat_stream_host_frame` IPC messages containing a JPEG data URL.

### Platform Support

The workspace capture module (`app_state/workspace_capture/`) has per-platform implementations:

| Platform | Status |
|----------|--------|
| macOS    | Native implementation (CoreGraphics) |
| Linux    | Native implementation |
| Windows  | Stub (returns error -- implementation pending) |

---

## Retro Game Emulator

**Source:** `jarvis-rs/crates/jarvis-app/src/app_state/webview_bridge/emulator_handlers.rs`, `jarvis-rs/assets/panels/games/emulator.html`

Jarvis includes a retro game emulator panel that can load ROM files from the user's system.

### IPC Messages

| Kind                 | Direction | Description |
|----------------------|-----------|-------------|
| `emulator_list_roms` | JS -> Rust | Scans `~/ROMs` directory for ROM files and returns a list |
| `emulator_load_rom`  | JS -> Rust | Reads a ROM file and returns its contents as base64-encoded data |

### Supported ROM Formats

The emulator scans for files with these extensions: `.nes`, `.smc`, `.sfc`, `.gb`, `.gbc`, `.gba`, `.nds`, `.n64`, `.z64`, `.v64`, `.bin`, `.cue`, `.iso`, `.md`, `.smd`, `.sms`, `.gg`, `.a26`, `.zip`, `.7z`.

Maximum ROM size: **64 MB**.

### WebView Transparency

The emulator panel uses WebGL for rendering, which requires an opaque (non-transparent) WebView. When navigating to the emulator, the existing transparent WebView is destroyed and recreated with `transparent: false`. When exiting the emulator, the WebView is recreated with the default transparency setting.

---

## Network Configuration Reference

### Presence Configuration

Source: `jarvis-rs/crates/jarvis-config/src/schema/social.rs`

```toml

enabled = true
server_url = ""         # Supabase project ref
heartbeat_interval = 30 # seconds

[livechat.nickname]

```

### Supabase Realtime Connection

| Parameter                          | Value |
|------------------------------------|-------|
| WebSocket URL pattern              | `wss://<project_ref>.supabase.co/realtime/v1/websocket?apikey=<key>&vsn=1.0.0` |
| Heartbeat interval                 | 25 seconds |
| Reconnect base delay               | 1 second |
| Max reconnect delay                | 30 seconds |
| WebSocket connect timeout          | 15 seconds |
| Channel join / broadcast ack       | enabled |
| Self-send on broadcasts            | disabled |

### Relay Server Defaults

| Parameter                  | Default |
|----------------------------|---------|
| Port                       | 8080    |
| Session TTL (no mobile)    | 300 s   |
| Max connections per IP     | 10      |
| Max total sessions         | 1000    |
| Max session ID length      | 64 bytes |
| Hello timeout              | 10 s    |
| Rate window                | 60 s    |
| Max connect rate per IP    | 20      |

---

## Security Model

### End-to-End Encryption

Three encryption contexts exist in Jarvis:

1. **Livechat channel messages** -- encrypted with AES-256-GCM using a
   room key derived via PBKDF2 from the channel name.  Since the room name
   is known to all participants, this provides protection against relay
   snooping but not against other channel members.

2. **Direct messages (DMs)** -- encrypted with AES-256-GCM using a shared
   key derived via ECDH between the two participants.  Only the two
   endpoints can decrypt.

3. **Mobile relay bridge** -- all PTY data is encrypted with AES-256-GCM
   using a shared key derived via ECDH between desktop and mobile.  The
   relay server sees only opaque ciphertext.

### Key Material Isolation

- Private keys (ECDSA, ECDH) live exclusively in the Rust `CryptoService`.
- The WebView receives only opaque key **handles** (u32 integers).
- Encryption/decryption/signing operations are performed Rust-side via IPC.
- The identity file is written with restricted permissions (`0600` on Unix).

### Downgrade Protection

- After a cipher is established on the relay connection, plaintext
  `RelayEnvelope::Plaintext` messages are rejected.
- `PeerDisconnected` from the relay does **not** clear the cipher --
  preventing a relay-in-the-middle from forcing a plaintext downgrade.
- Cipher is only cleared on explicit pairing revocation.

### Identity Verification (TOFU)

The Trust On First Use model records nickname-to-fingerprint bindings.
Key changes trigger visible warnings in the chat UI.  Signature verification
uses the ECDSA public key embedded in each message, checked against the
TOFU store.

### Message Signing

Every chat message includes:
- An ECDSA-P256-SHA256 signature over the canonical string
  `id|userId|nick|ts|text` (or `id|userId|nick|ts|iv|ct` for DMs).
- The sender's SPKI-encoded public key and fingerprint.

Receivers verify signatures Rust-side and display verification status
badges.

### Automod as Defense-in-Depth

Client-side automod provides keyword filtering, rate limiting, and spam
detection on both outgoing and incoming messages.  This is not a security
boundary (clients could be modified), but it protects well-behaved users
from spam and abuse in the shared chat environment.

### SRI for External Dependencies

The Supabase JavaScript SDK loaded in the chat panel is protected with a
`sha384` Subresource Integrity hash and `crossorigin="anonymous"`, ensuring
the script has not been tampered with in transit or at the CDN.

### Rate Limiting (Relay)

The relay server implements per-IP connection limits and global session
caps to prevent resource exhaustion.  Connection rate limiting uses a
sliding window, and stale sessions are reaped automatically.

### Experimental Collab Features

Behind the `experimental-collab` feature flag, the `jarvis-social` crate
includes additional modules for:

- **Pair programming** (`pair/`) -- collaborative terminal sessions with
  driver/navigator roles, remote cursor tracking, and terminal
  input/output relay.
- **Voice chat** (`voice/`) -- WebRTC voice rooms with SDP offer/answer
  and ICE candidate signaling.
- **Screen sharing** (`screen_share/`) -- WebRTC screen sharing with
  configurable quality and SDP/ICE signaling.

These features use the same Supabase Realtime transport for WebRTC
signaling (SDP offers/answers and ICE candidates).

# Renderer & Visual Effects

Jarvis uses a fully GPU-accelerated rendering pipeline built on **wgpu**, the portable Rust graphics API. Every pixel on screen -- the animated hex grid background, the glowing pane borders, the boot animation's sweeping scan line, the CRT scanlines overlaying terminal text -- is rendered through custom WGSL shaders running on the GPU. This document covers every layer of that pipeline, from device initialization through final frame presentation.

---

## Table of Contents

1. [Rendering Pipeline Overview](#rendering-pipeline-overview)
2. [GPU Context Initialization](#gpu-context-initialization)
3. [Surface Management and Resizing](#surface-management-and-resizing)
4. [Background Modes](#background-modes)
5. [The Orb Visualizer](#the-orb-visualizer)
6. [Visual Effects](#visual-effects)
7. [Glassmorphism Effects](#glassmorphism-effects)
8. [Boot Animation Sequence](#boot-animation-sequence)
9. [UI Chrome Rendering](#ui-chrome-rendering)
10. [Quad Renderer](#quad-renderer)
11. [Performance Presets and Tuning](#performance-presets-and-tuning)
12. [Frame Timing and FPS Tracking](#frame-timing-and-fps-tracking)
13. [sRGB Handling and Color Management](#srgb-handling-and-color-management)
14. [Shader Reference](#shader-reference)
15. [Glyph Atlas and Text Rendering](#glyph-atlas-and-text-rendering)
16. [Command Palette](#command-palette)
17. [Assistant Panel](#assistant-panel)
18. [Configuration Reference](#configuration-reference)

---

## Rendering Pipeline Overview

The renderer is organized as the `jarvis-renderer` crate, split into these modules:

| Module | Purpose |
|---|---|
| `gpu` | wgpu device, queue, surface, uniform buffers |
| `background` | Hex grid, gradient, and solid color backgrounds |
| `effects` | Per-pane glow, dim, and scanline post-processing |
| `boot_screen` | Full-screen boot animation with surveillance HUD |
| `quad` | Instanced rectangle drawing for UI chrome |
| `ui` | Tab bar, status bar, pane border data structures |
| `render_state` | Orchestrates all pipelines into per-frame rendering |
| `perf` | Rolling-window FPS timer |
| `assistant_panel` | Chat overlay state management |
| `command_palette` | Fuzzy-searchable action picker |
| `shaders/` | Four WGSL shader files |

### Per-Frame Render Order

Each frame follows a strict two-pass pipeline managed by `RenderState::render_background()`:

1. **Pass 1 -- Background**: Clear the surface to the configured clear color, then run the background shader (hex grid or gradient) as a full-screen triangle.
2. **Pass 2 -- UI Chrome Quads**: Overlay tab bar, status bar, and pane border rectangles via instanced quad drawing.

Text rendering (terminal content, boot screen text) is handled by `glyphon` in additional passes layered on top.

During the boot sequence, a separate three-pass pipeline runs instead:

1. **Boot shader pass**: Full-screen surveillance HUD (scan line, corner brackets, vignette).
2. **Boot quad pass**: Progress bar track and fill rectangles.
3. **Boot text pass**: Title ("J A R V I S"), cycling status messages, percentage counter.

### Key Source Files

- `jarvis-rs/crates/jarvis-renderer/src/render_state/state.rs` -- `RenderState` struct and frame rendering
- `jarvis-rs/crates/jarvis-renderer/src/lib.rs` -- public API re-exports

---

## GPU Context Initialization

The `GpuContext` struct wraps all wgpu resources needed for rendering.

### Initialization Sequence (`GpuContext::new`)

```
Window -> Instance -> Surface -> Adapter -> Device + Queue -> Surface Configuration
```

1. **Create wgpu Instance** with default backends (Vulkan on Windows/Linux, Metal on macOS, DX12 on Windows).
2. **Create Surface** from the `winit` window handle.
3. **Request Adapter** with `HighPerformance` power preference and the surface as a compatibility constraint. If no hardware adapter is found, falls back to a software adapter with `force_fallback_adapter: true`.
4. **Log adapter info** -- the GPU name, device type (discrete/integrated/software), and graphics backend are logged at `INFO` level.
5. **Request Device** with default limits and no special features. The device is labeled `"jarvis-renderer device"`.
6. **Select Surface Format** -- uses the first format reported by `surface.get_capabilities()`, falling back to `Bgra8UnormSrgb` if none is reported.
7. **Configure Surface** with:
   - `PresentMode::Fifo` (vsync, guaranteed available on all platforms)
   - `desired_maximum_frame_latency: 2` (double buffering)
   - `CompositeAlphaMode::Auto`
   - `RENDER_ATTACHMENT` usage

### Struct Layout

```rust
pub struct GpuContext {
    pub device: wgpu::Device,
    pub queue: wgpu::Queue,
    pub surface: wgpu::Surface<'static>,
    pub surface_config: wgpu::SurfaceConfiguration,
    pub size: PhysicalSize,       // { width: u32, height: u32 }
    pub scale_factor: f64,
}
```

### Error Types

```rust
pub enum RendererError {
    SurfaceError(String),     // Surface creation/acquisition failure
    AdapterNotFound,          // No GPU adapter (hardware or software)
    DeviceError(String),      // Device request failure (OOM, etc.)
    TextError(String),        // glyphon text rendering errors
}
```

### Window Transparency (Platform-Conditional)

The application window is created with `with_transparent(true)` **only on macOS**, where it is needed for titlebar blending (content extending behind traffic light buttons). On **Windows and Linux**, the window is opaque (`with_transparent(false)`) because transparent windows cause rendering artifacts -- WebView2 on Windows composites poorly with transparent backgrounds, leading to see-through panels and ghosting when panes are moved.

Similarly, the default `WebViewConfig::transparent` is `true` on macOS and `false` on Windows/Linux. The emulator panel always uses `transparent: false` regardless of platform because WebGL canvases are invisible in transparent WebViews.

### Key Source File

- `jarvis-rs/crates/jarvis-renderer/src/gpu/context.rs`

---

## Surface Management and Resizing

When the window is resized, `GpuContext::resize(width, height)` is called:

1. Clamps both dimensions to a minimum of 1 pixel (prevents zero-size surfaces).
2. Updates the internal `PhysicalSize`.
3. Reconfigures the wgpu surface with the new dimensions.

The `RenderState` wraps this and also updates the uniform buffer's viewport dimensions and aspect ratio so shaders stay correct.

Each frame acquires the next surface texture via `GpuContext::current_texture()`, which calls `surface.get_current_texture()`. If this fails (e.g., surface lost during resize), the error is logged and propagated as `RendererError::SurfaceError`.

---

## Background Modes

The background system determines what is drawn behind all terminal content. It supports six modes defined in the config schema:

### Mode: `hex_grid` (default)

**Visual appearance**: A dark screen overlaid with a faintly glowing hexagonal grid pattern. Individual hex cells fade in and out organically using simplex noise, creating a breathing, living circuit-board aesthetic. The grid edges emit a soft colored glow (cyan by default) that pulses gently over time.

**Implementation**: Rendered entirely in `background.wgsl` via a full-screen triangle (3 vertices, no vertex buffer). The fragment shader:

1. Converts screen UV coordinates to aspect-corrected space.
2. Scales to a hex grid density of 12x.
3. Computes hex cell coordinates and distance-to-nearest-edge using `hex_coords()` and `hex_dist()`.
4. Applies `smoothstep` edge glow -- bright at hex edges (d near 0.5), dark at cell centers.
5. Modulates cell brightness with 2D simplex noise scrolling slowly over time.
6. Adds a global pulse oscillation: `0.8 + 0.2 * sin(time * 0.5)`.
7. Composites with configurable color and opacity.

**Configuration**:
- `background.hex_grid.color` -- hex color string (default: `"#00d4ff"`, a cyan)
- `background.hex_grid.opacity` -- controls overall grid brightness (default: `0.08`, very subtle)
- `background.hex_grid.animation_speed` -- speed multiplier (default: `1.0`)
- `background.hex_grid.glow_intensity` -- glow brightness (default: `0.5`)

### Mode: `solid`

**Visual appearance**: A flat, uniform color filling the entire window. No animation.

**Implementation**: Uses the wgpu clear color directly -- no shader pass is needed. The `BackgroundRenderer` returns the parsed RGB values from config as the clear color.

**Configuration**:
- `background.solid_color` -- hex color string (default: `"#000000"`)

### Mode: `gradient`

**Visual appearance**: A smooth color transition between two or more colors, either linear or radial. Creates depth without the complexity of the hex grid.

**Implementation**: Requires a shader render pass. Colors from config are parsed from hex strings to `[f64; 3]` arrays. The angle is configurable.

**Configuration**:
- `background.gradient.type` -- `"linear"` or `"radial"` (default: `"radial"`)
- `background.gradient.colors` -- array of hex color strings (default: `["#000000", "#0a1520"]`)
- `background.gradient.angle` -- rotation in degrees for linear gradients (default: `180`)

### Mode: `image`

**Visual appearance**: A static image displayed behind terminal content, with optional blur and opacity.

**Implementation**: Config schema is defined but the GPU renderer currently falls back to solid black for image and video modes. The config is ready for future implementation.

**Configuration**:
- `background.image.path` -- file path to the image
- `background.image.fit` -- `"cover"`, `"contain"`, `"fill"`, or `"tile"` (default: `"cover"`)
- `background.image.blur` -- Gaussian blur radius in pixels (default: `0`)
- `background.image.opacity` -- transparency (default: `1.0`)

### Mode: `video`

**Visual appearance**: A looping video playing behind terminal content.

**Implementation**: Config schema defined; GPU renderer falls back to solid black. Reserved for future implementation.

**Configuration**:
- `background.video.path` -- file path to the video
- `background.video.loop` -- whether to loop (default: `true`)
- `background.video.muted` -- mute audio (default: `true`)
- `background.video.fit` -- `"cover"`, `"contain"`, or `"fill"` (default: `"cover"`)

### Mode: `none`

**Visual appearance**: Pure black background with no effects.

**Implementation**: Returns black as the clear color, no shader pass needed.

### Background Pipeline Architecture

The `BackgroundPipeline` creates a wgpu render pipeline with:

- The `background.wgsl` shader compiled at build time via `include_str!`.
- A single uniform buffer holding the shared `GpuUniforms` struct (80 bytes).
- A bind group layout at group 0 binding 0 (shared with other pipelines).
- Alpha blending enabled on the color target.
- Triangle list topology with no vertex buffers (vertices generated in the vertex shader).

Each frame:
1. `BackgroundPipeline::update_uniforms()` uploads the latest `GpuUniforms` via `queue.write_buffer()`.
2. `BackgroundPipeline::render()` records a render pass that either clears to the configured color or loads existing content, then draws 3 vertices (one full-screen triangle).

### Key Source Files

- `jarvis-rs/crates/jarvis-renderer/src/background/renderer.rs` -- `BackgroundRenderer` with mode selection
- `jarvis-rs/crates/jarvis-renderer/src/background/pipeline.rs` -- `BackgroundPipeline` wgpu setup
- `jarvis-rs/crates/jarvis-renderer/src/background/types.rs` -- `BackgroundMode` enum
- `jarvis-rs/crates/jarvis-renderer/src/background/helpers.rs` -- `hex_to_rgb()` color parsing
- `jarvis-rs/crates/jarvis-renderer/src/shaders/background.wgsl` -- hex grid shader
- `jarvis-rs/crates/jarvis-config/src/schema/background.rs` -- config types

---

## The Orb Visualizer

The visualizer system renders an animated entity (typically a glowing orb) that reacts to audio input and application state changes. It is the visual centerpiece of the Jarvis UI.

### Visualizer Types

| Type | Description |
|---|---|
| `orb` (default) | A 3D sphere with inner core, outer shell, wireframe mode, bloom, and rotation |
| `image` | A static or animated image with pulse, rotate, bounce, or float effects |
| `video` | A looping video synced to audio |
| `particle` | A particle system with styles: swirl, fountain, fire, snow, stars, custom |
| `waveform` | An audio spectrum display with bars, line, circular, or mirror styles |
| `none` | Disabled |

### Orb Configuration

```toml
[visualizer]
enabled = true
type = "orb"
position_x = 0.0          # NDC center X (-1.0 to 1.0)
position_y = 0.0          # NDC center Y (-1.0 to 1.0)
scale = 1.0               # Global scale multiplier
anchor = "center"         # center, top-left, top-right, bottom-left, bottom-right
react_to_audio = true     # Pulse with microphone/audio input
react_to_state = true     # Change appearance based on app state

[visualizer.orb]
color = "#00d4ff"          # Primary orb color
secondary_color = "#0088aa"
intensity_base = 1.0
bloom_intensity = 1.0
rotation_speed = 1.0
mesh_detail = "high"       # low, medium, high
wireframe = false
inner_core = true
outer_shell = true
```

### Audio Reactivity

When `react_to_audio = true`, the orb's `audio_level` uniform (0.0 to 1.0) is updated each frame from the microphone input. This value drives:

- Scale pulsing -- the orb grows when audio is louder.
- Intensity modulation -- brighter glow at higher audio levels.
- Surface distortion (in shader) -- the orb's surface warps in response to audio peaks.

### State-Based Changes

The orb changes its visual parameters based on application state. Five states are supported, each with configurable overrides:

| State | Default Scale | Default Intensity | Color Override | Position Override |
|---|---|---|---|---|
| `listening` | 1.0 | 1.0 | None (use base) | None |
| `speaking` | 1.1 | 1.4 | None | None |
| `skill` | 0.9 | 1.2 | `#ffaa00` (amber) | None |
| `chat` | 0.55 | 1.3 | None | x=0.10, y=0.30 |
| `idle` | 0.8 | 0.6 | `#444444` (dim gray) | None |

**Visual effect of states**:
- **Listening**: Full-size orb at normal brightness, ready and alert.
- **Speaking**: Slightly enlarged orb with heightened glow, conveying active output.
- **Skill**: Slightly smaller orb with amber tint, indicating tool/skill execution.
- **Chat**: Orb shrinks and shifts to the upper-left area, making room for the chat panel.
- **Idle**: Subdued gray orb at reduced size, conveying dormancy.

### Uniform Buffer Integration

The orb's parameters flow through `GpuUniforms`:

```rust
pub orb_center_x: f32,   // NDC position
pub orb_center_y: f32,
pub orb_scale: f32,       // From state config
pub power_level: f32,     // Energy level 0.0-1.0
pub audio_level: f32,     // Microphone input level
pub intensity: f32,       // From state config
```

### Key Source Files

- `jarvis-rs/crates/jarvis-config/src/schema/visualizer.rs` -- all visualizer config types
- `jarvis-rs/crates/jarvis-renderer/src/gpu/uniforms.rs` -- orb uniforms in `GpuUniforms`

---

## Visual Effects

The effects system applies post-processing passes to enhance the sci-fi aesthetic. Effects are controlled by a master toggle and individual sub-toggles.

### Scanlines

**Visual appearance**: Faint horizontal dark lines overlaid on the screen, mimicking the visible scan lines of a CRT monitor. At the default intensity (0.08), they are barely perceptible -- a subtle texture that adds depth without obscuring content. At higher intensities, they create a pronounced retro-monitor look with alternating bright and dark horizontal bands.

**Implementation**: In `effects.wgsl`, the fragment shader computes:
```wgsl
let scan_y = in.uv.y * u.screen_height;
let scanline = sin(scan_y * 3.14159265) * 0.5 + 0.5;
color.rgb *= (1.0 - scanline_intensity * (1.0 - scanline));
```

This produces a sine-wave pattern at pixel frequency, darkening every other horizontal line.

**Configuration**:
```toml
[effects.scanlines]
enabled = true
intensity = 0.08    # 0.0 = off, 1.0 = maximum darkness
```

### Vignette

**Visual appearance**: A gradual darkening around the edges of the screen, drawing the eye toward the center. At the default intensity (1.2), the corners are noticeably darker while the center remains fully bright. This creates a spotlight-like focus effect reminiscent of a camera lens or surveillance monitor.

**Implementation**: The boot shader includes a vignette function that computes distance from the UV center (0.5, 0.5) and applies a smooth falloff:
```wgsl
fn vignette(uv: vec2<f32>) -> f32 {
    let d = distance(uv, vec2<f32>(0.5, 0.5));
    return 1.0 - smoothstep(0.4, 0.9, d) * 0.4;
}
```

The vignette intensity is passed through `GpuUniforms::vignette_intensity`.

**Configuration**:
```toml
[effects.vignette]
enabled = true
intensity = 1.2     # 0.0 = off, up to 3.0 for extreme darkening
```

### Bloom

**Visual appearance**: A soft light bleed around bright elements, giving them a halo of diffused light. Text and UI elements appear to glow softly, as if emitting light into the surrounding darkness. Multiple blur passes create a progressively smoother, more diffused glow.

**Implementation**: Configured in the schema with intensity and pass count. The bloom pipeline is defined in `BloomConfig` and the pass count is also mirrored in `PerformanceConfig::bloom_passes`.

**Configuration**:
```toml
[effects.bloom]
enabled = true
intensity = 0.9     # Brightness multiplier (0.0-3.0)
passes = 2          # Blur iterations (1-5, more = smoother but costlier)
```

### Glow (Active Pane Border)

**Visual appearance**: A colored luminous border around the currently focused terminal pane. The glow radiates outward from the pane edges, fading smoothly with distance. A subtle inner-edge highlight adds a bright accent just inside the border. The default color is a soft purple (`#cba6f7`), creating a neon-sign effect that clearly marks which pane has keyboard focus.

**Implementation**: In `effects.wgsl`, the shader computes a signed distance field (SDF) from the current fragment to the pane rectangle. For focused panes:

- **Outer glow**: Fragments outside the pane (dist > 0) within the glow width get an additive color blend that fades with `smoothstep`.
- **Inner highlight**: Fragments just inside the border (within 25% of glow width) get a subtle 15% color overlay.

```wgsl
fn sdf_rect(uv: vec2<f32>) -> f32 {
    let center = (pane_min + pane_max) * 0.5;
    let half_size = (pane_max - pane_min) * 0.5;
    let d = abs(uv - center) - half_size;
    return length(max(d, vec2(0.0))) + min(max(d.x, d.y), 0.0);
}
```

**Configuration**:
```toml
[effects.glow]
enabled = true
color = "#cba6f7"   # Glow color (hex string)
width = 2.0         # Glow spread in pixels (0.0-10.0)
intensity = 0.0     # CSS box-shadow intensity (0.0-1.0)
```

### Inactive Pane Dimming

**Visual appearance**: Unfocused panes appear visually receded, with their content rendered at reduced brightness. This creates a clear visual hierarchy -- the active pane is fully bright while background panes are muted.

**Implementation**: The `EffectsRenderer::dim_factor(is_focused)` method returns:
- `1.0` for focused panes (full brightness)
- `dim_opacity` (default 0.6) for unfocused panes when dimming is enabled
- `1.0` for unfocused panes when dimming or effects are disabled

In the shader, unfocused pane colors are multiplied by the dim factor:
```wgsl
if u.is_focused < 0.5 && u.dim_factor < 0.999 {
    color = vec4<f32>(color.rgb * u.dim_factor, color.a);
}
```

**Configuration**:
```toml
[effects]
inactive_pane_dim = true
dim_opacity = 0.6   # 0.0 = fully transparent, 1.0 = no dimming
```

### Flicker

**Visual appearance**: A very subtle, rapid brightness oscillation across the entire screen, simulating the imperceptible flicker of a CRT electron gun or a fluorescent light. At the default amplitude (0.004), it is nearly invisible -- just enough to add organic life to the display without being distracting.

**Implementation**: The flicker amplitude is passed to shaders via `GpuUniforms::flicker_amplitude`. It modulates the final pixel brightness with a time-varying offset.

**Configuration**:
```toml
[effects.flicker]
enabled = true
amplitude = 0.004   # 0.0 = off, 0.05 = very noticeable
```

### CRT Curvature

**Visual appearance**: Barrel distortion that curves the screen edges inward, simulating the convex glass of a CRT monitor. The center of the screen appears normal while edges and corners are progressively distorted.

**Implementation**: Defined in config as `crt_curvature` (boolean, default `false`). Currently marked as future/no-op in the schema -- the config field exists but the shader implementation is not yet active.

**Configuration**:
```toml
[effects]
crt_curvature = false   # Currently no-op; reserved for future use
```

| `low` | Off | Off | Off | Off |
| `medium` | On | Off | Off | Reduced |
| `high` | On | On | On | On |

## Boot Animation Sequence

The boot screen presents a full-screen surveillance-style HUD during application initialization, creating an immersive "powering up" experience.

### Visual Elements

1. **Dark background**: Solid fill using the configured background color (default: Ayu Mirage dark, `#1F2430`).
2. **Sweeping scan line**: A horizontal bright line that continuously sweeps from top to bottom every 1.2 seconds. It has a bright core and a soft trailing glow, rendered in the accent color. Looks like a radar sweep or security scanner.
3. **Corner brackets**: Four L-shaped brackets at each corner of the screen, drawn in the accent color. They scale with screen size (6% of the smaller dimension for arm length, 4% margin from edges, 2px line thickness). They evoke a heads-up display or targeting reticle.
4. **Vignette**: Edge darkening that focuses attention toward the center (40% darkening at corners).
5. **Title text**: "J A R V I S" displayed in monospace font, centered horizontally at 44% from the top. Font size scales with window height (4% of height, minimum 24px).
6. **Status messages**: Military/intelligence-themed messages that cycle every 1.5 seconds, displayed above the progress bar in the muted text color. The 14 default messages are:
   - PROVISIONING ARMAMENTS
   - CALIBRATING SENSOR ARRAY
   - ESTABLISHING SECURE CHANNELS
   - INITIALIZING NEURAL INTERFACE
   - DEPLOYING COUNTERMEASURES
   - SYNCHRONIZING THREAT MATRIX
   - LOADING TACTICAL OVERLAYS
   - VERIFYING BIOMETRIC CLEARANCE
   - ACTIVATING PERIMETER DEFENSE
   - COMPILING INTELLIGENCE BRIEFS
   - SCANNING FREQUENCY SPECTRUM
   - ENGAGING QUANTUM ENCRYPTION
   - BOOTSTRAPPING CORE SYSTEMS
   - SYSTEM ONLINE
7. **Progress bar**: Centered at 62% down the screen, 35% of window width, 4px tall. A dark track with the accent-colored fill growing left to right as progress advances from 0% to 100%.
8. **Percentage counter**: Displayed to the right of the progress bar in muted text.

### Timing

- Default total duration: **4.5 seconds**.
- Message change interval: **1.5 seconds** (cycles through 3 messages before completing).
- Can be skipped immediately with any key press (when `skip_on_key = true`).
- Progress is calculated as `elapsed / duration`, clamped to `[0.0, 1.0]`.

### Color Scheme (Defaults)

| Element | Color | Hex |
|---|---|---|
| Background | Dark blue-gray | `#1F2430` |
| Accent (brackets, scan line, progress) | Warm gold | `#FFCC66` |
| Muted text (status, percentage) | Gray-blue | `#707A8C` |
| Progress track | Very dark blue | `#171B24` |

### Render Pipeline

The `BootScreen` struct owns three sub-renderers:

1. A wgpu render pipeline using `boot.wgsl` for the full-screen HUD shader.
2. A `QuadRenderer` (separate instance from the main UI) for the progress bar.
3. A `BootTextRenderer` wrapping `glyphon` for GPU-accelerated text.

The boot shader uses a 48-byte `BootUniforms` struct:

```rust
pub struct BootUniforms {
    pub time: f32,
    pub progress: f32,
    pub screen_width: f32,
    pub screen_height: f32,
    pub accent_r: f32,
    pub accent_g: f32,
    pub accent_b: f32,
    pub bg_r: f32,
    pub bg_g: f32,
    pub bg_b: f32,
    pub opacity: f32,
    pub _pad: f32,
}
```

### Configuration

```toml
[startup.boot_animation]
enabled = true
duration = 4.5
skip_on_key = true
music_enabled = true
voiceover_enabled = true
```

## UI Chrome Rendering

UI chrome refers to the non-content visual elements surrounding the terminal grid: the tab bar, status bar, and pane borders.

### Tab Bar

**Visual appearance**: A dark horizontal bar spanning the full window width at the top. The active tab is highlighted with a slightly lighter background. Each tab shows its title text.

**Dimensions**: 32px tall (constant, `DEFAULT_TAB_BAR_HEIGHT`).

**Colors**:
- Bar background: `[0.12, 0.12, 0.14, 1.0]` (very dark gray)
- Active tab highlight: `[0.22, 0.22, 0.26, 1.0]` (slightly lighter gray)

**Tab width**: Evenly distributed across the window width (`window_width / tab_count`).

**Data structures**:
```rust
pub struct Tab {
    pub pane_id: u32,      // For click-to-focus
    pub title: String,
    pub is_active: bool,
}

pub struct TabBar {
    pub tabs: Vec<Tab>,
    pub active_tab: usize,
    pub height: f32,       // 32.0
}
```

### Status Bar

**Visual appearance**: A dark semi-transparent bar at the bottom of the window with three text zones (left, center, right). Displays mode indicators, connection status, and other runtime information.

**Dimensions**: 24px tall (constant, `DEFAULT_STATUS_BAR_HEIGHT`).

**Colors**:
- Background: `[0.1, 0.1, 0.1, 0.9]` (near-black, 90% opaque)
- Foreground (text): `[0.9, 0.9, 0.9, 1.0]` (light gray)

**Data structure**:
```rust
pub struct StatusBar {
    pub left_text: String,
    pub center_text: String,
    pub right_text: String,
    pub height: f32,          // 24.0
    pub bg_color: [f32; 4],
    pub fg_color: [f32; 4],
}
```

### Pane Borders

**Visual appearance**: Colored rectangles drawn at the edges of each terminal pane. Focused panes get the glow effect (if enabled); unfocused panes show a simple border line.

**Data structure**:
```rust
pub struct PaneBorder {
    pub rect: Rect,            // Bounding rectangle
    pub color: [f32; 4],       // RGBA
    pub width: f32,            // Line width in pixels
    pub is_focused: bool,      // Drives glow effect
}
```

### Content Area Calculation

`UiChrome::content_rect(window_width, window_height)` computes the remaining area after subtracting chrome elements:

```
content.y      = tab_bar.height (or 0 if no tab bar)
content.height = window_height - tab_bar.height - status_bar.height
content.width  = window_width
content.x      = 0
```

This rectangle is clamped to never go negative.

### Pane Gap

Adjacent panes are separated by a configurable gap:

```toml
[layout]
panel_gap = 6    # Pixels between panes (0-20)
```

## Quad Renderer

The `QuadRenderer` is a general-purpose GPU-accelerated filled rectangle renderer used for all UI chrome backgrounds (tab bar, status bar, progress bars).

### Architecture

Uses **instanced drawing** to batch up to 256 rectangles into a single draw call:

- **Unit quad**: 4 vertices forming a `[0,0]` to `[1,1]` square, indexed with 6 indices (two triangles: 0-1-2 and 0-2-3).
- **Instance buffer**: Each instance carries a `QuadInstance` (32 bytes: rect `[x, y, w, h]` + color RGBA).
- **Uniform buffer**: Viewport resolution (16 bytes: `[width, height, pad, pad]`).

### Vertex Shader

The shader scales the unit quad by the instance's rect dimensions and translates to the instance's position, then converts from pixel coordinates to NDC:

```wgsl
let pixel_x = instance.rect.x + vertex.position.x * instance.rect.z;
let pixel_y = instance.rect.y + vertex.position.y * instance.rect.w;
let ndc_x = (pixel_x / uniforms.resolution.x) * 2.0 - 1.0;
let ndc_y = 1.0 - (pixel_y / uniforms.resolution.y) * 2.0;
```

### Fragment Shader

Simply passes through the instance color:

```wgsl
fn fs_main(in: VertexOutput) -> @location(0) vec4<f32> {
    return in.color;
}
```

### Per-Frame Usage

1. `QuadRenderer::prepare()` uploads instance data and viewport resolution to the GPU.
2. `QuadRenderer::render()` binds the pipeline, vertex/index/instance buffers, and issues an indexed instanced draw call.
3. Skips the draw call entirely if instance count is 0.

### Chrome Quad Generation

`RenderState::prepare_chrome_quads()` builds the quad list from the `UiChrome` state:

1. If a tab bar exists, push a full-width dark background quad, then a highlight quad for the active tab.
2. If a status bar exists, push its background quad.
3. Upload all quads to the GPU.

## Performance Presets and Tuning

Four quality presets control the trade-off between visual fidelity and GPU/CPU load.

### Preset Definitions

| Setting | Low | Medium | High (default) | Ultra |
|---|---|---|---|---|
| Frame rate | 60 | 60 | 60 | 60 |
| Pane glow | Off | On | On | On |
| Pane dim | Off | Off | On | On |
| Scanlines | Off | Off | On | On |
| Bloom passes | 0 | 1 | 2 | 2+ |
| Orb quality | low | medium | high | high |
| Effects master | Off | On | On | On |

### Configuration

```toml
[performance]
preset = "high"        # low, medium, high, ultra
frame_rate = 60        # Target FPS
orb_quality = "high"   # low, medium, high
bloom_passes = 2       # Number of blur iterations (1-5)

[performance.preload]
themes = true
games = false
fonts = true
```

### How Presets Affect the Renderer

`EffectsRenderer::from_performance_preset()` maps the preset string to concrete `EffectsConfig` values:

- **Low**: Sets `enabled = false`, disabling all effects globally. Dim opacity is 1.0 (no dimming). This is suitable for low-end hardware or when maximum terminal responsiveness is needed.
- **Medium**: Enables the effects master switch. Turns on glow only. Dim and scanlines are disabled. A balanced choice for integrated GPUs.
- **High/Ultra**: Enables all effects: glow, dim (at 0.6 opacity), and scanlines. Full visual fidelity.

Any unrecognized preset string is treated as "high".

## Frame Timing and FPS Tracking

The `FrameTimer` provides a rolling-window average of frame durations for performance monitoring.

### How It Works

1. A `VecDeque<Duration>` stores the last 120 frame durations.
2. `begin_frame()` is called at the start of each frame. It records the elapsed time since the last call and pushes it to the deque.
3. When the deque exceeds 120 samples, the oldest is dropped.
4. `fps()` computes `sample_count / total_duration` -- the harmonic mean FPS over the window.
5. `frame_time_ms()` computes `(total_duration / sample_count) * 1000` -- average frame time in milliseconds.

### Properties

- **120-sample window**: At 60 FPS, this covers 2 seconds of history. Smooths out transient spikes while remaining responsive to sustained performance changes.
- **Initial state**: Returns 0.0 for both FPS and frame time until at least one frame has been recorded.
- **Zero protection**: If total duration is zero or negative (all durations are sub-nanosecond), returns 0.0 FPS.

### First Frame Logging

The renderer logs the first successful frame presentation exactly once using an `AtomicBool` guard:

```
INFO First frame presented (1920x1080, format=Bgra8UnormSrgb)
```

### GPU-Side Time Tracking

The `GpuUniforms::update_time(dt)` method accumulates elapsed time for shader animations. It wraps at 21600 seconds (6 hours) to prevent f32 precision loss:

```rust
self.time = (self.time + dt) % 21600.0;
```

## sRGB Handling and Color Management

### Surface Format Selection

The renderer uses the surface's preferred texture format, falling back to `Bgra8UnormSrgb`. On most platforms:

- **Windows (DX12)**: `Bgra8UnormSrgb`
- **macOS (Metal)**: `Bgra8UnormSrgb`
- **Linux (Vulkan)**: `Bgra8UnormSrgb` or `Bgra8Unorm`

The selected format is logged at startup along with all available formats.

### sRGB Conversion in Shaders

The boot shader (`boot.wgsl`) includes explicit sRGB-to-linear conversion functions for correct color blending:

```wgsl
fn srgb_to_linear(c: f32) -> f32 {
    if c <= 0.04045 {
        return c / 12.92;
    }
    return pow((c + 0.055) / 1.055, 2.4);
}

fn srgb3(c: vec3<f32>) -> vec3<f32> {
    return vec3<f32>(srgb_to_linear(c.x), srgb_to_linear(c.y), srgb_to_linear(c.z));
}
```

Config colors are specified in sRGB (hex strings like `"#FFCC66"`). When the surface format is an sRGB format (`*Srgb`), wgpu automatically applies the sRGB OETF on output. The boot shader converts input colors from sRGB to linear space before blending so that the automatic sRGB output encoding produces correct results.

### Hex Color Parsing

The `hex_to_rgb()` helper parses 6-digit hex color strings (with or without `#` prefix) into normalized `[f64; 3]` RGB values:

```rust
pub fn hex_to_rgb(hex: &str) -> Option<[f64; 3]> {
    let hex = hex.strip_prefix('#').unwrap_or(hex);
    if hex.len() != 6 { return None; }
    let r = u8::from_str_radix(&hex[0..2], 16).ok()?;
    let g = u8::from_str_radix(&hex[2..4], 16).ok()?;
    let b = u8::from_str_radix(&hex[4..6], 16).ok()?;
    Some([r as f64 / 255.0, g as f64 / 255.0, b as f64 / 255.0])
}
```

Invalid colors fall back to sensible defaults (typically cyan `[0.0, 0.83, 1.0]` for the hex grid, or black `[0.0, 0.0, 0.0]` for solid backgrounds).
