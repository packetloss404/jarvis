# =============================================================================
# rust-release.yml — Release workflow for Jarvis Rust binary
# =============================================================================
#
# Builds release binaries for all platforms and creates a GitHub Release.
#
# Triggers on version tags (e.g., v0.2.0) or manual dispatch.

name: Rust Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "jarvis-rs -> target"

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Install Apple certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE" && -n "$MACOS_CERTIFICATE_PWD" ]]; then
            echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p actions build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p actions build.keychain
            security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
            rm certificate.p12
          else
            echo "Skipping Apple certificate install"
          fi

      - name: Build macOS package
        env:
          JARVIS_VERSION: ${{ steps.version.outputs.version }}
          CODE_SIGN_IDENTITY: ${{ secrets.MACOS_CODE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_ID" && -n "$APPLE_ID_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            ./scripts/package-macos.sh --release --notarize
          else
            ./scripts/package-macos.sh --release
          fi
        working-directory: jarvis-rs

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: jarvis-rs/target/release/jarvis-macos-*.dmg

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jarvis-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "jarvis-rs -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb1-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libwayland-dev libgtk-3-dev \
            libsoup-3.0-dev libwebkit2gtk-4.1-dev libxdo-dev

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build Linux packages
        env:
          JARVIS_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/package-linux.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            jarvis-rs/target/release/jarvis-linux-*.tar.gz
            jarvis-rs/target/release/jarvis_*.deb

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: jarvis-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "jarvis-rs -> target"

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build Windows packages
        shell: pwsh
        env:
          JARVIS_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/package-windows.ps1 -Version $env:JARVIS_VERSION

      - name: Generate winget manifests
        shell: pwsh
        env:
          JARVIS_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/generate-winget-manifests.ps1 -Version $env:JARVIS_VERSION

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            jarvis-rs/target/release/Jarvis.msi
            jarvis-rs/target/release/jarvis-windows-x64.zip
            jarvis-rs/packaging/windows/winget/${{ steps.version.outputs.version }}/*.yaml

  create-release:
    name: Create Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi
        working-directory: .

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Jarvis v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/macos-binaries/jarvis-macos-*.dmg
            artifacts/linux-binaries/jarvis-linux-*.tar.gz
            artifacts/linux-binaries/jarvis_*.deb
            artifacts/windows-binaries/Jarvis.msi
            artifacts/windows-binaries/jarvis-windows-x64.zip
            artifacts/windows-binaries/**/*.yaml
